 if single phase\n\nAll acronyms defined on first use. All section titles in plain language (no internal branding)."},{"title":"Pillar Narrative Rules","content":"Each pillar subsection has TWO narrative layers (not three — the old Layer 3 \"alternatives considered\" is removed):\n\nLayer 1 — What was decided and how it works:\nFind the matching pillar template from KB['guidelines']['pillarTemplates'] and generate content based on the selected option. Include partner-specific details when known.\n\nLayer 2 — What this requires from the partner:\nWeave triggered rule THEN/BECAUSE into the narrative. Frame as requirements (\"this requires...\") or implications (\"as a consequence...\"). Use the rule's 'because' field as reasoning. NEVER include rule IDs. NEVER include \"Alternative considered\" paragraphs.\n\nExample (correct):\n\"Because Cooltix displays tickets grouped by purchase order, there is no per-ticket interface where resale CTAs can be embedded. Instead, the integration uses Generic URL with Login Trust: Cooltix's backend generates a per-user tokenized URL via the menta API, and the user arrives pre-authenticated at Ticket Management.\"\n\nExample (wrong — DO NOT DO THIS):\n\"SAL (Smart Access Layer) is incompatible with Cooltix's ticket visualization (R1) (R2). Alternative considered: Static URL was not selected because...\" "},{"title":"Client-Lens Audit Checklist (Step 4 — mandatory before delivery)","content":"Run these checks on the generated document BEFORE presenting it:\n\n4.1 Terminology check:\n• Search for: \"Render Ticket\", \"SuperSwap\", R[0-9]+, \"PREC[\", \"DEC[\", \"AC[\"\n• Verify every acronym defined on first use\n• Check section titles for internal branding\n\n4.2 Client-relevance filter:\n• For each paragraph: \"Does the partner need this to understand or implement?\"\n• Remove all \"Alternative considered\" paragraphs\n• Remove all rule IDs\n• Remove internal override callouts\n• Remove features not being implemented\n• Remove operations purely menta's responsibility\n• Check preconditions table — remove non-design-affecting rows\n\n4.3 Missing content check:\n• Development requirements table exists?\n• API summary table exists?\n• Webhook catalog exists?\n• Terminology glossary exists?\n• Communications section populated?\n• Phasing section exists?\n\n4.4 Redundancy check:\n• No principle stated more than twice\n• No section telling the client how their own system works\n• No placeholder data from discovery forms\n\n4.5 \"What would I ask?\" check:\nRead each section as the partner's developer. Common missing answers:\n\"What endpoint do I call?\", \"What's in the payload?\", \"What do I do when I receive this webhook?\", \"What does this look like in the UI?\"\nIf the answer isn't in the document, add it or mark as TBD."},{"title":"Typography & Layout","content":"Font: Lexend throughout (changed from Arial, March 2026)\nPage size: A4\nHeader: \"CONFIDENTIAL\" left, \"menta tech <> [Partner] — Integration Design\" right\nSection titles (H1): 18pt bold, black (#111827)\nSubsection titles (H2): 14pt bold, black\nBody text: 11pt regular, color #111827\nTable headers: Bold, white text on menta blue (#2563EB) background\nTable body: 11pt, alternating white/light gray (#F3F4F6) rows\nCallout blocks: Yellow (#FEF9C3) with left blue border, bold title — used sparingly for critical notes or items pending validation\nPage numbers: Centered at bottom\nTOC: Built manually with Paragraph entries — NEVER use docx-js TableOfContents (renders empty)\n\nColor scheme:\nPrimary blue: #2563EB | Dark text: #111827 | Muted: #6B7280\nSurface: #FFFFFF | Light gray: #F3F4F6 | Highlight yellow: #FEF9C3"},{"title":"Communications — Templates & Defaults","content":"Default guidance to weave into the §10 Communications section of the Integration Design Document.\n\nmenta buyer confirmation email:\nBy default menta sends a purchase confirmation email to the buyer (without the ticket — ticket delivery is always the partner's responsibility). When the partner's ticket delivery email already contains all relevant purchase information (identifiers, amount, event, seat info), menta's confirmation email should be DISABLED at onboarding to avoid duplicate communication. The goal is for the buyer to receive a single unified communication from the partner. Configurable in the menta backoffice.\n\nES:\nEmail de confirmación al comprador (menta): Por defecto menta envía un email de confirmación de compra al comprador (sin el ticket — la entrega del ticket siempre es responsabilidad del partner). Cuando el email de entrega del ticket del partner ya contiene toda la información relevante de la compra (identificadores, monto, evento, seat info), el confirmation email de menta debe deshabilitarse en onboarding para evitar comunicación duplicada. El objetivo es que el comprador reciba una única comunicación unificada desde el partner. Configurable en el backoffice de menta."},{"title":"Development Requirements — Default Rows","content":"Default rows that must be included in the §13 \"What [Partner] needs to build\" table for every integration unless explicitly excluded.\n\n• GTM / analytics wiring — Pillar: Communications — Priority: MVP\n  EN: Partner provides their GTM container ID at onboarding. menta injects it across all customer-facing pages (event list, event page, checkout, confirmation). menta fires standard ecommerce dataLayer events at key checkout milestones (add to cart, begin checkout, purchase), which the partner can consume via GTM to forward to GA4, Meta Pixel, or other destinations. The dataLayer schema is shared during implementation.\n  ES: El partner provee su GTM container ID en onboarding. menta lo inyecta en todas las páginas customer-facing (event list, event page, checkout, confirmation). menta dispara eventos estándar de ecommerce en el dataLayer en los milestones clave del checkout (add to cart, begin checkout, purchase), que el partner puede consumir vía GTM para forwardear a GA4, Meta Pixel u otros destinos. El schema del dataLayer se comparte durante implementación."},{"title":"Operations — Currency","content":"Default Currency subsection for the §9 Operations & Contingency section.\n\nEN — Currency:\nThe event's currency is the official currency for the resale transaction — listings, buyer payments, and fee calculations all happen in that currency.\n\nOn the payment side, Stripe provides flexibility in both directions:\n• Buyer payments (pay-ins): Stripe's Adaptive Pricing can present the amount in the buyer's local currency when it differs from the event currency. Stripe manages the conversion directly.\n• Seller payouts: Stripe supports payouts in multiple currencies. When the seller's bank account is in a different currency than the event, Stripe handles the FX conversion. Sellers can register multiple bank accounts with different currencies.\n\nThe event currency is the base and Stripe handles all conversions on both ends.\n\nES — Moneda:\nLa moneda del evento es la moneda oficial de la transacción de resale — listings, pagos del comprador y cálculos de fees ocurren en esa moneda.\n\nDel lado de pagos, Stripe provee flexibilidad en ambas direcciones:\n• Pagos del comprador (pay-ins): Stripe's Adaptive Pricing puede presentar el monto en la moneda local del comprador cuando difiere de la moneda del evento. Stripe maneja la conversión directamente.\n• Payouts al vendedor: Stripe soporta payouts en múltiples monedas. Cuando la cuenta bancaria del vendedor está en una moneda distinta a la del evento, Stripe maneja la conversión FX. Los vendedores pueden registrar múltiples cuentas bancarias con monedas distintas.\n\nLa moneda del evento es la base y Stripe maneja todas las conversiones en ambos extremos."},{"title":"Business Rules — Fee Treatment","content":"Default Fee treatment paragraph for the §8 Business Rules (or §9 Operations/Invoicing) section.\n\nEN — Fee treatment (buyer and seller):\nFees are configured per show in the menta dashboard — no API call is required. Defaults can be set globally and overridden per event; changes take effect immediately. The configured fee is the final, VAT-inclusive amount the user sees and pays (for example, entering 10% means the buyer pays exactly 10%, and that figure already includes the applicable VAT). If the partner needs a specific net-of-VAT fee, the gross must be calculated upstream and entered in the dashboard (e.g. for a 27% VAT jurisdiction, a 10% net fee is configured as 12.7% gross).\n\nES — Tratamiento de fees (buyer y seller):\nLos fees se configuran por show en el dashboard de menta — no requiere llamadas a la API. Se pueden definir defaults globales y overrides por evento; los cambios aplican inmediatamente. El fee configurado es el monto final, VAT-inclusive, que el usuario ve y paga (por ejemplo, si se ingresa 10%, el comprador paga exactamente 10%, y ese valor ya incluye el VAT aplicable). Si el partner necesita un fee net-of-VAT específico, el bruto debe calcularse upstream e ingresarse en el dashboard (ej. para una jurisdicción con VAT del 27%, un 10% neto se configura como 12.7% bruto)."}]}}}</script>
<script>
const BASE = JSON.parse(document.getElementById('kb-data').textContent);
const LS_RULES = 'menta_kb_rules_v1';
const LS_INTEGRATIONS = 'menta_kb_integrations_v1';
const LS_TEST_STATUS = 'menta_kb_test_status_v1';
const LS_DECISIONS = 'menta_kb_decisions_v1';
const LS_PILLAR_TPL = 'menta_kb_pillar_tpl_v1';

function loadRules(){try{const s=localStorage.getItem(LS_RULES);if(s)return JSON.parse(s);}catch(e){}return BASE.rules;}
function loadDecisions(){try{const s=localStorage.getItem(LS_DECISIONS);if(s)return JSON.parse(s);}catch(e){}return BASE.decisions;}
function loadPillarTemplates(){try{const s=localStorage.getItem(LS_PILLAR_TPL);if(s)return JSON.parse(s);}catch(e){}return (BASE.guidelines&&BASE.guidelines.pillarTemplates&&BASE.guidelines.pillarTemplates.sections)||[];}
function loadTestStatus(){const defs=BASE.defaultTestStatus||{};try{const s=localStorage.getItem(LS_TEST_STATUS);if(s){const saved=JSON.parse(s);const merged={...defs};Object.keys(saved).forEach(k=>{merged[k]={...(merged[k]||{}),...saved[k]};});return merged;}}catch(e){}return defs;}

// Normalize IDs: "1.0" -> "1", "4.1" -> "4.1"
function normId(id){const s=String(id);return s.endsWith('.0')?s.slice(0,-2):s;}

// Parse DEC[x]=value AND PREC[y]=value from test triggers
function parseTrigger(trigger){
  if(!trigger) return [];
  return trigger.split(/\s+AND\s+/i).map(p=>{
    const m=p.trim().match(/^(DEC|PREC)\[([^\]]+)\]\s*=\s*(.+)$/i);
    return m?{type:m[1].toUpperCase(),id:normId(m[2].trim()),value:m[3].trim()}:null;
  }).filter(Boolean);
}

// Check if a test's trigger conditions all match the integration config
function testMatches(test, cfg){
  const conds=parseTrigger(test.trigger);
  if(!conds.length) return false;
  return conds.every(c=>{
    const key=c.type+'_'+c.id;
    const sel=cfg[key];
    if(!sel) return false;
    const sv=sel.toLowerCase(), cv=c.value.toLowerCase();
    return sv.includes(cv)||cv.includes(sv);
  });
}

// Check if a rule mentions any selected option value
function ruleMatches(rule, cfg){
  if(!rule.if) return false;
  const text=(rule.if+' '+(rule.then||'')).toLowerCase();
  return Object.values(cfg).some(v=>v&&text.includes(v.toLowerCase()));
}

const {useState,useMemo,useEffect,useRef,useCallback}=React;

// Parse text and render DEC[x] / PREC[x] as clickable chips (without prefix)
function RichText({text, search, onDecClick, onPrecClick}){
  if(!text) return null;
  const s=String(text);
  const parts=s.split(/(DEC\[[^\]]+\]|PREC\[[^\]]+\])/g);
  const nodes=parts.map((p,i)=>{
    if(/^DEC\[/.test(p)){const name=p.replace(/^DEC\[/,'').replace(/\]$/,'');
      return React.createElement('span',{key:i,className:'ref-dec',title:'Click to view pillar',onClick:()=>onDecClick&&onDecClick(p)},name);}
    if(/^PREC\[/.test(p)){const name=p.replace(/^PREC\[/,'').replace(/\]$/,'');
      return React.createElement('span',{key:i,className:'ref-prec',title:'Click to view pre-condition',onClick:()=>onPrecClick&&onPrecClick(p)},name);}
    if(search){
      const q=search.toLowerCase(),ql=p.toLowerCase(),idx=ql.indexOf(q);
      if(idx!==-1) return React.createElement('span',{key:i},p.slice(0,idx),
        React.createElement('mark',null,p.slice(idx,idx+q.length)),p.slice(idx+q.length));
    }
    return p;
  });
  return React.createElement('span',null,...nodes);
}

const SI=()=>React.createElement('svg',{viewBox:'0 0 20 20',fill:'currentColor'},
  React.createElement('path',{fillRule:'evenodd',d:'M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z',clipRule:'evenodd'}));

/* ── Condition builder helpers ── */
function parseConditions(text){
  if(!text)return[];
  return text.split('\n').map(l=>l.trim()).filter(Boolean).map(line=>{
    const l=line.replace(/^AND\s+/i,'');
    let m=l.match(/^DEC\[([^\]]+)\]\s*(=|≠|!=)\s*(.+)$/);
    if(m)return{type:'DEC',category:m[1],op:m[2]==='!='?'≠':m[2],value:m[3].trim()};
    m=l.match(/^PREC\[([^\]]+)\]\s*(=|≠|!=)\s*(.+)$/);
    if(m)return{type:'PREC',category:m[1],op:m[2]==='!='?'≠':m[2],value:m[3].trim()};
    m=l.match(/^AC\[([^\]]+)\]$/);
    if(m)return{type:'AC',text:m[1]};
    return{type:'FREE',text:l};
  });
}
function serializeConditions(conds){
  return conds.map((c,i)=>{
    const pfx=i>0?'AND ':'';
    if(c.type==='DEC')return pfx+'DEC['+c.category+'] '+(c.op||'=')+' '+c.value;
    if(c.type==='PREC')return pfx+'PREC['+c.category+'] '+(c.op||'=')+' '+c.value;
    if(c.type==='AC')return pfx+'AC['+c.text+']';
    return pfx+(c.text||'');
  }).join('\n');
}
function ConditionBuilder({value,onChange}){
  const conds=useMemo(()=>parseConditions(value),[value]);
  const decs=BASE.decisions;
  const precs=BASE.preconditions;
  const getOpts=(type,cat)=>{const list=type==='DEC'?decs:precs;const it=list.find(d=>d.category===cat);return it?it.options:[];};
  const upd=(idx,field,val)=>{const nc=[...conds];nc[idx]={...nc[idx],[field]:val};if(field==='category')nc[idx].value='';onChange(serializeConditions(nc));};
  const rm=idx=>onChange(serializeConditions(conds.filter((_,i)=>i!==idx)));
  const add=type=>{
    const nc=[...conds];
    if(type==='DEC')nc.push({type:'DEC',category:decs[0]?.category||'',op:'=',value:''});
    else if(type==='PREC')nc.push({type:'PREC',category:precs[0]?.category||'',op:'=',value:''});
    else nc.push({type:'FREE',text:''});
    onChange(serializeConditions(nc));};
  return React.createElement('div',{className:'cond-builder'},
    conds.map((c,i)=>React.createElement('div',{key:i},
      i>0&&React.createElement('div',{className:'cond-and'},'AND'),
      React.createElement('div',{className:'cond-row'},
        React.createElement('select',{className:'cond-sel',value:c.type,style:{width:85},onChange:e=>{
          const t=e.target.value;const nc=[...conds];
          if(t==='DEC')nc[i]={type:'DEC',category:decs[0]?.category||'',op:'=',value:''};
          else if(t==='PREC')nc[i]={type:'PREC',category:precs[0]?.category||'',op:'=',value:''};
          else if(t==='AC')nc[i]={type:'AC',text:''};
          else nc[i]={type:'FREE',text:c.text||c.value||''};
          onChange(serializeConditions(nc));}},
          React.createElement('option',{value:'DEC'},'Pillar'),
          React.createElement('option',{value:'PREC'},'Pre-cond'),
          React.createElement('option',{value:'AC'},'Assertion'),
          React.createElement('option',{value:'FREE'},'Free text')),
        (c.type==='DEC'||c.type==='PREC')&&React.createElement('select',{className:'cond-sel',value:c.category,style:{maxWidth:200},
          onChange:e=>upd(i,'category',e.target.value)},
          (c.type==='DEC'?decs:precs).map(d=>React.createElement('option',{key:d.id,value:d.category},d.category))),
        (c.type==='DEC'||c.type==='PREC')&&React.createElement('select',{className:'cond-sel',value:c.op||'=',style:{width:36},
          onChange:e=>upd(i,'op',e.target.value)},
          React.createElement('option',{value:'='},'='),React.createElement('option',{value:'≠'},'≠')),
        (c.type==='DEC'||c.type==='PREC')&&React.createElement('select',{className:'cond-sel',value:c.value,style:{maxWidth:220},
          onChange:e=>upd(i,'value',e.target.value)},
          React.createElement('option',{value:''},'— select —'),
          getOpts(c.type,c.category).map(o=>React.createElement('option',{key:o,value:o},o))),
        (c.type==='AC'||c.type==='FREE')&&React.createElement('input',{className:'cond-free',value:c.text||'',
          placeholder:c.type==='AC'?'Assertion...':'Free text condition...',
          onChange:e=>{const nc=[...conds];nc[i]={...nc[i],text:e.target.value};onChange(serializeConditions(nc));}}),
        React.createElement('button',{className:'cond-del',onClick:()=>rm(i),title:'Remove'},'×')))),
    React.createElement('div',{style:{display:'flex',gap:4,marginTop:2}},
      React.createElement('button',{className:'cond-add',onClick:()=>add('DEC')},'+ Pillar'),
      React.createElement('button',{className:'cond-add',onClick:()=>add('PREC')},'+ Pre-condition'),
      React.createElement('button',{className:'cond-add',onClick:()=>add('FREE')},'+ Other')));
}

/* ── Pillar template matcher ── */
function findPillarTemplate(category, templates){
  if(!templates||!templates.length)return null;
  const cat=category.toLowerCase();
  const map=[
    ['events data','1. Events Data'],
    ['ticket data','2. Ticket Data'],
    ['access to sell','3. Access to Sell'],
    ['access to buy','4. Access to Buy'],
    ['auth','5. Authentication'],
    ['price info','7. Price Info'],
    ['market making','9. Market Making'],
    ['devoluciones','10. Refunds'],
    ['refund','10. Refunds'],
    ['chargeback','10. Refunds'],
    ['event activation','']
  ];
  for(const[keyword,tplTitle]of map){
    if(cat.includes(keyword)&&tplTitle){
      const idx=templates.findIndex(t=>t.title.startsWith(tplTitle.split('.')[0]+'.'));
      if(idx>=0)return{index:idx,section:templates[idx]};
    }
  }
  // Also check for Change Ticket Owner → 6. ChangeTicketOwner (not a decision but for future)
  return null;
}

/* ── Render pillar template content ── */
function PillarTplContent({content}){
  if(!content)return React.createElement('div',{className:'pil-tpl-empty'},'No pillar template linked to this decision.');
  return React.createElement('div',{className:'pil-tpl'},
    content.split('\n').map((line,i)=>{
      if(!line.trim())return React.createElement('div',{key:i,style:{height:6}});
      if(line.startsWith('Option:')||line.startsWith('Scenario:')||line.startsWith('Sub-decision')||line.startsWith('Structural note')||line.startsWith('Overview')||line.startsWith('What menta')||line.startsWith('Combination logic')||line.startsWith('Describe:')||line.startsWith('Document:'))
        return React.createElement('div',{key:i,className:'pil-tpl-heading'},line);
      if(line.startsWith('•'))
        return React.createElement('div',{key:i,className:'pil-tpl-bullet'},line);
      return React.createElement('div',{key:i,className:'pil-tpl-line'},line);
    }));
}

/* ── Decisions / Integration Pillars ── */
function DecisionsTab({search,lang,jumpTo,onJumpHandled}){
  const ref=useRef({});
  const [decisions,setDecisions]=useState(loadDecisions);
  const [pillarTpls,setPillarTpls]=useState(loadPillarTemplates);
  const [selected,setSelected]=useState(null);
  const [editing,setEditing]=useState(false);
  const [draft,setDraft]=useState(null);
  const [draftTpl,setDraftTpl]=useState(null);
  const [saved,setSaved]=useState(false);
  const rules=useMemo(()=>loadRules(),[]);
  const L=(obj,field)=>lang==='es'?(obj[field+'_es']||obj[field]||''):(obj[field+'_en']||obj[field]||'');

  const saveAll=useCallback((newDecs,newTpls)=>{
    setDecisions(newDecs);setPillarTpls(newTpls);
    try{localStorage.setItem(LS_DECISIONS,JSON.stringify(newDecs));localStorage.setItem(LS_PILLAR_TPL,JSON.stringify(newTpls));}catch(e){}
    setSaved(true);setTimeout(()=>setSaved(false),2000);
  },[]);

  const items=useMemo(()=>{
    if(!search)return decisions;
    const q=search.toLowerCase();
    return decisions.filter(d=>(d.category||'').toLowerCase().includes(q)||(d.category_en||'').toLowerCase().includes(q)||(d.category_es||'').toLowerCase().includes(q)||d.options.some(o=>o.toLowerCase().includes(q))||(d.description||'').toLowerCase().includes(q)||(d.description_en||'').toLowerCase().includes(q)||(d.description_es||'').toLowerCase().includes(q));
  },[search,decisions]);

  useEffect(()=>{
    if(!jumpTo)return;
    const id=jumpTo.replace(/^DEC\[/,'').replace(/\]$/,'');
    // try to select the pillar
    const match=decisions.find(d=>normId(d.id)===id||d.category===id);
    if(match){setSelected(match.id);setEditing(false);setDraft(null);setDraftTpl(null);}
    else{const el=ref.current[id];if(el)el.scrollIntoView({behavior:'smooth',block:'center'});}
    onJumpHandled&&onJumpHandled();
  },[jumpTo]);

  // Find related rules for a decision
  const getRelatedRules=useCallback((dec)=>{
    const cat=dec.category;
    return rules.filter(r=>{
      const txt=(r.if||'')+' '+(r.then||'');
      return txt.includes('DEC['+cat+']')||txt.includes('DEC['+normId(dec.id)+']');
    });
  },[rules]);

  // Start editing
  const startEdit=useCallback(()=>{
    const dec=decisions.find(d=>d.id===selected);
    if(!dec)return;
    const tplMatch=findPillarTemplate(dec.category,pillarTpls);
    setDraft(JSON.parse(JSON.stringify(dec)));
    setDraftTpl(tplMatch?{index:tplMatch.index,content:tplMatch.section.content}:null);
    setEditing(true);
  },[selected,decisions,pillarTpls]);

  const cancelEdit=useCallback(()=>{setEditing(false);setDraft(null);setDraftTpl(null);},[]);

  const saveEdit=useCallback(()=>{
    if(!draft)return;
    const newDecs=decisions.map(d=>d.id===draft.id?draft:d);

              React.createElement('tr',{className:'tr-t',key:t.id},

function GuidelinesTab(){

  const current=g[active]||{};
  return React.createElement('div',{className:'guidelines-wrap'},
    React.createElement('div',{className:'guidelines-nav'},

    React.createElement('div',{className:'guidelines-body'},

}

/* ── App ── */
function App(){
  const [tab,setTab]=useState('rules');
  const [search,setSearch]=useState('');
  const [editMode,setEditMode]=useState(false);
  const [lang,setLang]=useState('en');
  const [jumpDec,setJumpDec]=useState(null);
  const [jumpPrec,setJumpPrec]=useState(null);

  const handleDecClick=useCallback(ref=>{setTab('decisions');setSearch('');setJumpDec(ref);},[]);
  const handlePrecClick=useCallback(ref=>{setTab('preconditions');setSearch('');setJumpPrec(ref);},[]);

  function exportFile(){
    const savedRules=loadRules();
    const savedDecs=loadDecisions();
    const savedTpls=loadPillarTemplates();
    const upd={...BASE,rules:savedRules,decisions:savedDecs};
    if(upd.guidelines&&upd.guidelines.pillarTemplates){upd.guidelines={...upd.guidelines,pillarTemplates:{...upd.guidelines.pillarTemplates,sections:savedTpls}};}
    const el=document.getElementById('kb-data');
    const orig=el.textContent;
    el.textContent=JSON.stringify(upd);
    const html='<!DOCTYPE html>\n'+document.documentElement.outerHTML;
    el.textContent=orig;
    const blob=new Blob([html],{type:'text/html'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a');a.href=url;a.download='integration-design-map.html';a.click();URL.revokeObjectURL(url);
  }

  const cleanRules=BASE.rules.filter(r=>r.connector!=='DRAFT').length;
  const draftRules=BASE.rules.filter(r=>r.connector==='DRAFT').length;

  const tabs=[
    {id:'decisions',label:'Integration Pillars',count:BASE.decisions.length},
    {id:'preconditions',label:'Pre-conditions',count:BASE.preconditions.length},
    {id:'acceptance',label:'Acceptance Criteria',count:(BASE.acceptance_criteria||[]).length},
    {id:'rules',label:'Rules',count:cleanRules+'+'+draftRules},
    {id:'tests',label:'Tests',count:BASE.tests.length},
    {id:'guidelines',label:'Guidelines',count:null},
  ];
  function chTab(id){setTab(id);setSearch('');}
  const tabLabels={decisions:'integration pillars',preconditions:'pre-conditions',acceptance:'acceptance criteria',rules:'rules',tests:'tests',guidelines:'guidelines'};
  return React.createElement('div',null,
    React.createElement('header',{className:'hdr'},
      React.createElement('div',{className:'logo'},'menta',React.createElement('span',null,'tech')),
      React.createElement('nav',{className:'nav'},tabs.map(t=>React.createElement('button',{key:t.id,className:'nbtn'+(tab===t.id?' on':''),onClick:()=>chTab(t.id)},
        t.label,t.count!==null&&React.createElement('span',{className:'bdg'},t.count)))),
      React.createElement('div',{className:'hdr-r'},
        React.createElement('div',{className:'lang-toggle'},
          React.createElement('button',{className:'lang-btn'+(lang==='en'?' on':''),onClick:()=>setLang('en')},'EN'),
          React.createElement('button',{className:'lang-btn'+(lang==='es'?' on':''),onClick:()=>setLang('es')},'ES')),
        tab==='rules'&&React.createElement('button',{className:'btn'+(editMode?' edit-on':''),onClick:()=>setEditMode(!editMode)},editMode?'✓ Done editing':'✏️ Edit'),
        React.createElement('button',{className:'btn exp',onClick:exportFile},'↓ Export'))),
    tab!=='guidelines'&&React.createElement('div',{className:'tb'},
      React.createElement('div',{className:'sw'},React.createElement(SI),
        React.createElement('input',{className:'si',placeholder:'Search '+(tabLabels[tab]||tab)+'...',value:search,onChange:e=>setSearch(e.target.value)}))),
    tab==='guidelines'&&React.createElement(GuidelinesTab,null),
    tab==='decisions'&&React.createElement(DecisionsTab,{search,lang,jumpTo:jumpDec,onJumpHandled:()=>setJumpDec(null)}),
    tab==='preconditions'&&React.createElement(PreTab,{search,lang,jumpTo:jumpPrec,onJumpHandled:()=>setJumpPrec(null)}),
    tab==='acceptance'&&React.createElement(AcceptanceTab,{search,lang}),
    tab==='rules'&&React.createElement(RulesTab,{search,editMode,lang,onDecClick:handleDecClick,onPrecClick:handlePrecClick}),
    tab==='tests'&&React.createElement(TestsTab,{search,lang}));
}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
