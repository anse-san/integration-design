riority":"HIGH","action":"Create an event with installment-based tickets (e.g., 3 payment phases as separate products). Purchase phase 1. Call GetUserData() for that user.","expected":"Phase 1 and phase 2 products do not appear in the GetUserData() response — they are not final tickets with event access. Only the phase 3 product (the actual ticket with QR code, issued after final payment) appears.","sanity":"• In Cooltix's model, each installment phase is a separate product. Only the final product grants event access.\n• Verify that intermediate products are never returned regardless of payment status.\n• Verify that the final product only appears after all phases are paid and the QR is issued."},{"id":"CBO-13","section":"Change Ticket Owner","trigger":"Auth methodology=Checkout Guest\nAND Change Ticket Owner=Requires account (Cuenta obligatoria)","priority":"CRITICAL","action":"Complete a resale purchase as a buyer whose email does not exist in the partner's system. Verify the CTO webhook is received and the partner creates a guest account before executing ownership transfer.","expected":"The partner creates a guest account for the buyer email, then executes CTO: invalidates old ticket, creates new ticket with new QR, delivers to buyer. The buyer can see their ticket in My Tickets.","sanity":"• Verify the account is the same type as a primary guest account.\n• If the buyer later registers with the same email, verify the account is upgraded (not duplicated).\n• Verify the buyer receives the ticket delivery (PDF/wallet) from the partner, not from menta."},{"id":"DAT-17.a","section":"Event Data","section_es":"Datos de Eventos","section_en":"Event Data","trigger":"Events data=API menta AND Acceptance criteria includes event image propagation","action":"Crear un evento en el partner con una imagen principal adjunta. El partner envía el payload POST /v1/events a menta. Inspeccionar tanto el dashboard de menta como el marketplace customer-facing.","action_es":"Crear un evento en el partner con una imagen principal adjunta. El partner envía el payload POST /v1/events a menta. Inspeccionar tanto el dashboard de menta como el marketplace customer-facing.","action_en":"Create an event on the partner with a primary image attached. The partner sends the POST /v1/events payload to menta. Inspect both the menta dashboard and the customer-facing marketplace.","expected":"La imagen del evento se renderiza correctamente en el dashboard de menta y en el marketplace de reventa customer-facing.","expected_es":"La imagen del evento se renderiza correctamente en el dashboard de menta y en el marketplace de reventa customer-facing.","expected_en":"The event image renders correctly in the menta dashboard and on the customer-facing resale marketplace.","sanity":"","sanity_es":"","sanity_en":""},{"id":"DAT-17.b","section":"Event Data","section_es":"Datos de Eventos","section_en":"Event Data","trigger":"Events data=External API AND Acceptance criteria includes event image propagation","action":"Crear un evento en el partner con una imagen principal adjunta. menta consulta la API externa del partner para sincronizar el evento. Inspeccionar tanto el dashboard de menta como el marketplace customer-facing.","action_es":"Crear un evento en el partner con una imagen principal adjunta. menta consulta la API externa del partner para sincronizar el evento. Inspeccionar tanto el dashboard de menta como el marketplace customer-facing.","action_en":"Create an event on the partner with a primary image attached. menta queries the partner's External API to sync the event. Inspect both the menta dashboard and the customer-facing marketplace.","expected":"La imagen del evento se renderiza correctamente en el dashboard de menta y en el marketplace de reventa customer-facing.","expected_es":"La imagen del evento se renderiza correctamente en el dashboard de menta y en el marketplace de reventa customer-facing.","expected_en":"The event image renders correctly in the menta dashboard and on the customer-facing resale marketplace.","sanity":"","sanity_es":"","sanity_en":""},{"id":"CBO-14","section":"Change Ticket Owner","section_es":"Cambio de Titular","section_en":"Change Ticket Owner","trigger":"Change Ticket Owner=Cuenta guest suficiente","action":"Completar una compra de reventa como un buyer cuyo email no existe en la plataforma del partner. El partner recibe el webhook ticket.updated, crea programáticamente una cuenta guest para ese email, y ejecuta el CTO asignando el ticket nuevo a esa cuenta.","action_es":"Completar una compra de reventa como un buyer cuyo email no existe en la plataforma del partner. El partner recibe el webhook ticket.updated, crea programáticamente una cuenta guest para ese email, y ejecuta el CTO asignando el ticket nuevo a esa cuenta.","action_en":"Complete a resale purchase as a buyer whose email does not exist in the partner's platform. The partner receives the ticket.updated webhook, programmatically creates a guest account for that email, and executes the CTO assigning the new ticket to that account.","expected":"Una cuenta guest existe en la plataforma para el email del buyer después del CTO. El buyer puede ver su ticket en 'My Tickets'. El buyer nunca ve un flujo de signup ni de login durante la compra en menta.","expected_es":"Una cuenta guest existe en la plataforma para el email del buyer después del CTO. El buyer puede ver su ticket en 'My Tickets'. El buyer nunca ve un flujo de signup ni de login durante la compra en menta.","expected_en":"A guest account exists on the platform for the buyer's email after the CTO. The buyer can see their ticket in 'My Tickets'. The buyer never sees a signup or login flow during purchase on menta.","sanity":"","sanity_es":"","sanity_en":""},{"id":"SEL-07","section":"Resale Selling","section_es":"Reventa — Venta","section_en":"Resale Selling","trigger":"Access to sell=Generic URL (Login Trust)","action":"Acceder como seller a la vista 'My Tickets' del partner con un usuario en tres estados: (A) todos los tickets disponibles, (B) algunos tickets listados, (C) todos los tickets vendidos en reventa.","action_es":"Acceder como seller a la vista 'My Tickets' del partner con un usuario en tres estados: (A) todos los tickets disponibles, (B) algunos tickets listados, (C) todos los tickets vendidos en reventa.","action_en":"Access the partner's 'My Tickets' view as a seller with a user in three states: (A) all tickets available, (B) some tickets listed, (C) all tickets sold in resale.","expected":"El CTA cambia según el estado: (A) 'Sell' cuando todos están disponibles, (B) 'Sell/Edit' cuando algunos están listados, (C) 'View details' cuando todos están vendidos.","expected_es":"El CTA cambia según el estado: (A) 'Sell' cuando todos están disponibles, (B) 'Sell/Edit' cuando algunos están listados, (C) 'View details' cuando todos están vendidos.","expected_en":"The CTA changes based on state: (A) 'Sell' when all are available, (B) 'Sell/Edit' when some are listed, (C) 'View details' when all are sold.","sanity":"","sanity_es":"","sanity_en":""},{"id":"BUY-09","section":"Resale Buying","section_es":"Reventa — Compra","section_en":"Resale Buying","trigger":"Access to buy=API menta (SAL)","action":"Como buyer, visitar la página de un evento que tiene al menos una categoría sold-out en el primary con listings de reventa activos, y al menos una categoría disponible en primary. El partner llama GET /v1/wrapper/accesslayer?type=buy para renderizar los componentes de reventa.","action_es":"Como buyer, visitar la página de un evento que tiene al menos una categoría sold-out en el primary con listings de reventa activos, y al menos una categoría disponible en primary. El partner llama GET /v1/wrapper/accesslayer?type=buy para renderizar los componentes de reventa.","action_en":"As a buyer, visit an event page that has at least one category sold-out on primary with active resale listings, and at least one category available on primary. The partner calls GET /v1/wrapper/accesslayer?type=buy to render the resale components.","expected":"En la categoría sold-out aparece un CTA de reventa con el floor price (precio más bajo actualmente listado). En la categoría disponible aparece un banner de reventa debajo de la opción de compra primaria.","expected_es":"En la categoría sold-out aparece un CTA de reventa con el floor price (precio más bajo actualmente listado). En la categoría disponible aparece un banner de reventa debajo de la opción de compra primaria.","expected_en":"In the sold-out category, a resale CTA appears showing the floor price (lowest currently listed price). In the available category, a resale banner appears below the primary purchase option.","sanity":"","sanity_es":"","sanity_en":""},{"id":"BUY-10","section":"Resale Buying","section_es":"Reventa — Compra","section_en":"Resale Buying","trigger":"Access to buy=API menta (SAL)","action":"Visitar la página de un evento completamente sold-out en el primary (todas las categorías agotadas) pero con listings de reventa activos.","action_es":"Visitar la página de un evento completamente sold-out en el primary (todas las categorías agotadas) pero con listings de reventa activos.","action_en":"Visit the page of an event fully sold-out on primary (all categories depleted) but with active resale listings.","expected":"El partner redirige al usuario al marketplace de reventa completo de menta para ese evento. La redirección preserva el evento en contexto.","expected_es":"El partner redirige al usuario al marketplace de reventa completo de menta para ese evento. La redirección preserva el evento en contexto.","expected_en":"The partner redirects the user to menta's full resale marketplace for that event. The redirect preserves the event context.","sanity":"","sanity_es":"","sanity_en":""},{"id":"COM-01","section":"Communications","section_es":"Comunicaciones","section_en":"Communications","trigger":"Acceptance criteria includes buyer confirmation email disabled","action":"Completar una compra de reventa exitosa. Inspeccionar la bandeja de entrada del buyer.","action_es":"Completar una compra de reventa exitosa. Inspeccionar la bandeja de entrada del buyer.","action_en":"Complete a successful resale purchase. Inspect the buyer's inbox.","expected":"El buyer recibe un solo email — el email de entrega del ticket del partner, que contiene toda la información de compra. No se recibe ningún email de confirmación con branding de menta.","expected_es":"El buyer recibe un solo email — el email de entrega del ticket del partner, que contiene toda la información de compra. No se recibe ningún email de confirmación con branding de menta.","expected_en":"The buyer receives a single email — the partner's ticket delivery email, containing all purchase information. No confirmation email with menta branding is received.","sanity":"","sanity_es":"","sanity_en":""},{"id":"OPS-04","section":"Operations","section_es":"Operaciones","section_en":"Operations","trigger":"Always applies","action":"Un usuario con listings activos o historial de reventa cambia su email en el backoffice del partner. El partner notifica a menta del cambio vía el canal acordado.","action_es":"Un usuario con listings activos o historial de reventa cambia su email en el backoffice del partner. El partner notifica a menta del cambio vía el canal acordado.","action_en":"A user with active listings or resale history changes their email in the partner's backoffice. The partner notifies menta of the change via the agreed channel.","expected":"El registro de identidad del usuario en menta se actualiza al nuevo email. Los listings activos y los payouts pendientes permanecen asociados al usuario correcto.","expected_es":"El registro de identidad del usuario en menta se actualiza al nuevo email. Los listings activos y los payouts pendientes permanecen asociados al usuario correcto.","expected_en":"The user's identity record in menta is updated to the new email. Active listings and pending payouts remain associated with the correct user.","sanity":"","sanity_es":"","sanity_en":""},{"id":"MKT-02","section":"Market Data","section_es":"Market Data","section_en":"Market Data","trigger":"Market Making — Ticket Leads=Ticket Holders","action":"menta consulta el endpoint HTTP del partner para solicitar los ticket holders de un evento. El partner responde con el set de registros (event/show ID, ticketId, buyer identifier, price, currency).","action_es":"menta consulta el endpoint HTTP del partner para solicitar los ticket holders de un evento. El partner responde con el set de registros (event/show ID, ticketId, buyer identifier, price, currency).","action_en":"menta queries the partner's HTTP endpoint to request the ticket holders for an event. The partner responds with the record set (event/show ID, ticketId, buyer identifier, price, currency).","expected":"menta recibe los registros y los ingiere correctamente. Los ticket holders quedan marcados como elegibles para recibir alertas de demanda de reventa si el partner habilita la feature.","expected_es":"menta recibe los registros y los ingiere correctamente. Los ticket holders quedan marcados como elegibles para recibir alertas de demanda de reventa si el partner habilita la feature.","expected_en":"menta receives the records and ingests them correctly. The ticket holders are marked as eligible to receive resale demand alerts if the partner enables the feature.","sanity":"","sanity_es":"","sanity_en":""}],"integrationTests":[],"defaultTestStatus":{},"defaultIntegrations":{},"guidelines":{"preconditions":{"title":"Guía: Pre-conditions","intro":"Una pre-condition describe una característica de la plataforma del partner que está dada — no es una decisión de integración, sino una realidad de la plataforma. Las pre-conditions determinan cómo debe comportarse menta para adaptarse al entorno del partner.","sections":[{"title":"¿Qué es una pre-condition?","content":"Una característica de la plataforma del partner que:\n• Afecta el diseño o comportamiento de la integración\n• Está fuera del control de menta\n• Tiene opciones finitas y conocidas\n• Cambia la configuración de reglas o el flujo técnico\n\nDiferencia clave con las Decisiones: las Decisiones son elecciones arquitectónicas de integración (qué método usar). Las Pre-conditions son hechos sobre la plataforma (cómo funciona la plataforma hoy)."},{"title":"¿Cuándo agregar una nueva?","content":"Agregar una nueva pre-condition cuando:\n• Se identifica una característica de la plataforma que genera comportamientos distintos en menta\n• Esa característica no es configurable desde menta sino que depende del partner\n• La característica tiene al menos dos opciones posibles\n• Existe al menos una regla que depende de ella"},{"title":"¿Cómo definirla?","content":"• Nombre: Sustantivo que describe la característica (ej. 'Protección/Tecnología', 'Visualización de tickets')\n• Opciones: Lista de valores posibles, preferiblemente mutuamente excluyentes\n• Descripción: Qué característica de la plataforma describe y por qué importa para la integración\n• No incluir en el nombre o descripción 'qué hacer' — eso va en las Reglas"}]},"rules":{"title":"Guía: Reglas","intro":"Una regla describe el comportamiento requerido de la integración dado un conjunto de decisiones y pre-conditions. Las reglas son la fuente de verdad técnica del diseño de integración.","sections":[{"title":"Estructura de una regla","content":"Cada regla tiene cuatro componentes:\n\n• IF: Una o más condiciones (DEC[x] = valor, PREC[y] = valor)\n• Conector: REQUIRES, IMPLIES o EXCLUDES\n• THEN: El comportamiento o configuración resultante\n• BECAUSE: El razonamiento técnico o de negocio — siempre incluirlo"},{"title":"Tipos de conector","content":"• REQUIRES: La condición IF hace obligatoria la configuración en THEN. Sin THEN, la integración no funciona.\n• IMPLIES: La condición IF lógicamente resulta en el comportamiento de THEN. Puede haber excepciones.\n• EXCLUDES: Dos opciones son técnicamente incompatibles. No pueden coexistir.\n• DRAFT: Regla propuesta pero pendiente de validación con el partner o el equipo."},{"title":"Buenas prácticas","content":"• Usar DEC[x] y PREC[y] explícitamente en el IF para que sean trazables\n• BECAUSE debe explicar la causa raíz, no repetir el THEN\n• Cada regla debe ser falseable: si el IF es verdadero, el THEN siempre aplica\n• Preferir una regla específica a una regla genérica con muchas excepciones\n• Marcar como DRAFT las reglas no validadas — no eliminarlas prematuramente"},{"title":"Price Structure: ticketOption vs priceType vs section","content":"menta's ticket data model has three fields for ticket classification. Understanding their visibility and rule implications is critical for correct integration design.\n\n• ticketOption — buyer-facing category name. First rule axis.\n• priceType — seller-facing variant. Second rule axis (Advanced Price Detail). NEVER visible to buyer.\n• section (props.seating.section) — buyer-facing informational context. No rules. Toggleable per event.\n\nCommon mistake: assuming priceType is visible to the buyer. It is not. If the buyer needs to see information that the partner puts in priceType, it must also be mirrored in section.\n\nCommon mistake: putting everything in ticketOption to 'keep it simple'. This eliminates grouping — each combination becomes its own category. Only recommend this when the partner has few combinations AND needs per-combination rules.\n\nDefault recommendation: Path C (ticketOption + priceType + section mirror) unless there's a specific reason for A or B."}]},"testing":{"title":"Guía: Testing","intro":"Los tests verifican que una integración implementa correctamente las reglas y pre-conditions del diseño. Cada integración activa debería tener todos los tests relevantes en estado Pass al entrar a producción.","sections":[{"title":"Nomenclatura","content":"• Formato: IT-[NÚMERO] (ej. IT-01, IT-23)\n• Las secciones agrupan tests por área funcional: Bases de integración, QRs y desbloqueo, Transferencia, SuperSwap, Rules, WillCall, etc.\n• El número es secuencial dentro del total de tests, no por sección"},{"title":"Ciclo de vida de un test","content":"• ○ Pendiente: No testeado aún — estado inicial de todos los tests al comenzar una integración\n• ✓ Pass: Verificado y funcionando correctamente en el entorno de testing o producción\n\nCuando se descubre un problema: dejar en Pendiente y agregar un comentario en el campo de Comments de la integración."},{"title":"Relación con reglas","content":"• Cada regla activa debería tener al menos un test que la valide\n• Los tests de 'Bases de integración' cubren DEC[1] y DEC[2] (Event sync y Ticket sync)\n• Los tests de QRs cubren PREC[2] (Protección) y PREC[10.2] (Change Ticket Owner QR)\n• Los tests de Rules cubren la configuración del dashboard de menta\n• Al agregar una nueva regla, considerar si requiere un nuevo test"},{"title":"¿Cuándo marcar como Pass?","content":"• Cuando se verificó manualmente en el entorno del partner\n• Cuando hay evidencia en logs, screenshots o confirmación del partner\n• No marcar como Pass en base a suposiciones — si no se probó, queda Pendiente"}]},"pillarTemplates":{"title":"Pillar Content Templates","intro":"When generating the Integration Pillars section of a design document, use the content template corresponding to the selected decision option. The description of each pillar is directly driven by the decision made. Only include information from the selected option — never mix options. Add partner-specific details (entity mappings, configurations, constraints) when confirmed. Do not invent information.","sections":[{"title":"1. Events Data","content":"Option: API menta (Push) — Recommended\n• The partner's backend sends CREATE/UPDATE requests directly to menta via POST /v1/events\n• The partner must emit outbound updates whenever an event is created, updated, or canceled\n• The request body depends on the pricing model selected (see Price Info Structure pillar)\n• Benefits: near real-time updates, no polling, most scalable option\n• Limitations: requires emitting outbound updates from the backend\n• Include partner-specific entity mapping when known (e.g., what the partner calls Event/Show/Venue)\n• Include location data requirements if applicable (e.g., for US: state, ZIP, city, address at show level for sales tax)\n\nOption: Endpoint exposed by the platform (Pull)\n• The partner exposes a public URL that menta queries periodically to fetch updates\n• The endpoint must return a JSON array of active events including: title, description, externalReferenceId, location, producers, and shows\n• Within each show: showId, date, primarySalesUrl, images, and ticketOptions (title, ticketId, description, currency)\n• Benefits: easy adoption when an endpoint already exists; partner controls structure and frequency\n• Limitations: data can become stale between polls; polling adds load; not ideal for frequent changes\n\nOption: Manual event upload\n• Events are created manually in the menta dashboard without API integration\n• Benefits: no development required, fastest time to production\n• Limitations: not scalable, manual operations, higher risk of stale data\n\n━━━ Event Structure Mapping ━━━\n\nFor seated events with multiple dimensions of ticket information (e.g. physical section + price tier + product), menta maps the partner's structure to its internal model as follows:\n\n| Partner dimension | menta field | Role |\n| physical section | area | Spatial grouper. Visible to the buyer as the primary grouper in the resale flow. Tickets in the same area are physically together. |\n| tier + product | ticketOption | Pricing category. Each (tier × product) combination defines a unique face value and becomes one ticketOption. |\n| — | priceType | Not used. |\n| — | section (menta) | Not used. |\n\nThe ticketOption label concatenates the dimensions (for example \"[Venue] - [Tier] - [Product]\"). Internally menta creates one ticketOption per (physical section × tier × product) combination. The partner sends their data as-is and menta handles the concatenation and area assignment.\n\nWhat the buyer sees: listings grouped by area, and within each area one row per (tier × product) combination.\n\nWhy this works:\n• Unambiguous pricing: each (tier × product) combination carries a single face value, so no separate priceType axis is required.\n• Spatial grouping: the area groups all tickets within a physical section, matching the partner's seat map layout.\n• Contiguity: two adjacent seats in the same area, same tier, same product are contiguous. At any tier or product boundary they are separate — correct, because different face values should not be mixed.\n• Product enforcement: because product is encoded into the ticketOption, a listing cannot mix (e.g.) Adult and Children, and pricing rules can be set independently per (area × tier × product).\n\nNote on General Admission events: the area field is only needed for seated events with seat maps that have this extra spatial dimension. For GA events or events without a seat map, the ticketOption alone represents the category and area is not needed."},{"title":"2. Ticket Data (Ticket Synchronization)","content":"Structural note: Tightly linked to Access to Sell. The sync model affects how SAL or Static URL works. The partner always remains the source of truth.\n\nWhat menta needs regardless of model:\n• At minimum: ticketId, externalReferenceEventId, showId, ticketOptionId, price, currency, buyer\n• Optionally: priceTypeId, location/seating, props, access URLs/PDFs, operational metadata\n• Ticket nomination: state explicitly whether ticket nomination exists in the secondary market for this partner\n\nOption: PULL — Verification Endpoint (Recommended)\n• Partner exposes an endpoint returning all tickets the user currently owns\n• menta calls it at key points: entering resale flow, before listing, before confirming sale, before completing purchase\n• Endpoint: GET /tickets?user={userEmail} — returns valid tickets with ticketId, eventId, showId, ticketOptionId, price, currency, status\n• Only valid/owned tickets returned; canceled/refunded/transferred omitted\n• Security: IP allowlisting and/or HTTP header with secret key\n• menta does not store historical inventories — always queries directly\n• With SAL: menta automatically calls verification endpoint when user accesses sell URL. No extra steps for partner.\n• Benefits: always reflects real state; minimal operational load; lower risk of stale data\n• Limitations: endpoint must be available during resale flows; must return predefined structure\n\nOption: PUSH — All Tickets\n• Partner sends ALL tickets via POST /v1/tickets at emission, including box office\n• Every subsequent change must also be sent: ownership changes, cancellations, refunds, seat changes, upgrades\n• With SAL: SAL immediately returns statuses since tickets already pushed\n• Benefits: fastest resale flow (no sync delay); complete inventory visibility\n• Limitations: high completeness required; higher data volume; omissions create inconsistent states\n\nOption: PUSH — Only Resellers\n• Partner sends ticket data ONLY when a user wants to list for resale\n• CTA 'Sell' determined by SAL + dashboard rules. Data sent only when user presses 'Sell'\n• With SAL: unknown tickets get status UNKNOWN with requiredAction PUSH_TICKET_TO_MENTA_TECH → partner sends ticket → loading promise → ~1s propagation\n• Benefits: lower data volume; partner is source of truth for which tickets were sent\n• Limitations: slight delay on first listing; no visibility into non-resale inventory"},{"title":"3. Access to Sell","content":"Structural note: Tightly coordinated with Ticket Data. SAL requires ticket data in menta; Generic URL and Static URL both use Ticket Management. The three options represent increasing integration depth.\n\nOption: Smart Access Layer for Tickets (SAL) — Recommended\n• Partner calls GET /v1/wrapper/tickets/render/list with ticketIds (comma-separated), user (email), autologin (optional)\n• menta responds per ticket with: current resale status, available actions, URLs to execute them\n• Per ticket, menta evaluates: eligibility (dashboard rules), listing/sold status, appropriate action\n• Partner's My Tickets UI should: resolve ticketIds, call SAL, display structure.status (AVAILABLE/LISTED/SOLD), render action buttons (primaryButton/secondaryButton/tertiaryButton) with callToAction labels and URLs\n• If no buttons returned → no resale actions for that ticket\n• All eligibility managed by dashboard rules — changes reflected automatically without code changes\n• High-priority endpoint, millisecond response time\n• Requires a per-ticket interface (ticket details screen). Excluded when tickets are grouped by order.\n• Benefits: real-time per-ticket status, contextual actions, rule-driven logic, high volume\n• Limitations: requires integrating SAL call and wiring responses into UI; requires per-ticket view\n\nOption: Generic URL with Login Trust — Mid-level integration\n• Partner's backend calls the menta API with the user's identity (email) to generate a per-user tokenized URL\n• User clicks the URL and arrives at menta's Ticket Management pre-authenticated via Login Trust — no OTP required\n• Ticket Management shows: available tickets, listed tickets, sold tickets. User selects which to sell, sets price, confirms.\n• Used when SAL is excluded (e.g., tickets grouped by order) but partner CAN make backend API calls\n• Same Ticket Management flow as Static URL, but with Login Trust instead of OTP\n• If the user has tickets for multiple events, an event selection step is shown first\n• After listing: user receives listing confirmation email. If returnURL is configured, user is redirected back to partner.\n• Benefits: no per-ticket UI required; frictionless auth (no OTP); partner controls entry point\n• Limitations: user leaves partner platform for Ticket Management; requires one API call per user\n\nOption: Static resale entry URL — Minimal integration\n• Single generic entry point — partner adds a 'Sell tickets' button pointing to a fixed menta URL (same for all users)\n• User authenticates via menta OTP (email or phone verification)\n• After OTP, user lands in Ticket Management with the same flow as Generic URL\n• My Tickets page does not display resale actions per ticket\n• Benefits: zero backend integration; fastest time to production; good for pilots\n• Limitations: no per-ticket state in partner UI; OTP adds friction; generic flow; no dashboard rule reflection in partner UI"},{"title":"4. Access to Buy","content":"Structural note: Starts from event-level journeys (event page, sold-out page, category listings) — unlike Access to Sell which starts from My Tickets.\n\nOption: Smart Access Layer (SAL) — Buy Mode (Recommended)\n• Partner calls GET /v1/wrapper/accesslayer?type=buy&eventId={eventId}&showId={showId}\n• SAL evaluates: resale config by category, visibility rules, floor prices, availability, marketplace signals\n• Returns preconfigured components: purchase banner, purchase modal, buy button (visible only with inventory), category list (ticketOptionId, quantityForSale, floorPrice, CTA), integrated venue map\n• If category disabled in dashboard → not in SAL response. Partner should only render what SAL provides.\n• With seat map: resale seats highlighted with distinctive color + 'Verified Resale' icon; dynamic tooltips on GA sections (count + lowest price); section-filtered redirect to marketplace; all-in pricing (ticket + buyer fee)\n• Non-sold-out events: accessible from seat map + resale banner below map\n• Sold-out events: primary Buy button replaced with 'Official Resale Available' CTA\n• Web Sold Out flag: boolean to trigger resale experience even if internal tickets remain\n• Single endpoint, all components in one call, dashboard changes reflect immediately\n• Benefits: fully dynamic rule-based UI; native consistent experience; no duplicated logic\n• Limitations: requires rendering SAL components; one call per purchase context\n\nOption: Static URL / Redirect to menta\n• Partner adds link (e.g., 'Buy resale tickets') redirecting to menta domain\n• Via API (recommended): GET /v1/marketplace/buyingflow/url/entrypoint with externalReferenceEventId, showId, returnTo (required), ticketOptionId (optional), lang (optional), loginTrust[user] (optional)\n• Manual URL: less flexibility, fewer config options\n• Login Trust can be added via loginTrust[user] parameter\n• Force registration without Login Force: ticket sync endpoint returns 404 for unauthenticated users\n• Benefits: extremely simple; just add a link; enables resale quickly\n• Limitations: no dynamic components; no visibility logic; no advanced capabilities"},{"title":"5. Authentication","content":"Structural note: Not mutually exclusive. Most integrations implement Login Trust + Login Force together. menta OTP is fallback when neither is available.\n\nOption: Login Trust\n• User already authenticated in partner platform (web or app)\n• Partner specifies user identity (email or phone) when generating URL via HTTP endpoint\n• Common fields: userId (preferred), email, or phone number\n• menta does not perform additional authentication — partner auth fully trusted\n• Users never see additional login prompt; identity controlled by partner; ideal for deep integration\n\nOption: Login Force\n• Ensures all resale buyers have valid partner account\n• Flow: (1) menta redirects to partner login URL with returnTo parameter → (2) user signs in/registers → (3) partner calls GET /v1/auth/oneTimeToken with user email → (4) menta returns one-time token → (5) partner redirects back appending oneTimeToken → (6) user resumes authenticated\n• Token valid only briefly, single use\n• Enforces account creation; prevents anonymous purchases; ensures buyers exist in partner ecosystem\n\nOption: menta OTP Authentication\n• menta authenticates via one-time password to email or phone\n• Flow: user enters email/phone → menta sends code → user enters code → session authenticated\n• Requires no auth integration from partner; enables resale on accountless platforms; adds friction\n\nCombination logic: If both Login Trust + Login Force → describe Login Trust for seller flows, Login Force for buyer flows. If only menta OTP → sole auth mechanism, note friction tradeoff."},{"title":"6. ChangeTicketOwner","content":"Overview (constant):\n• Transfers ownership from seller to buyer on the ticketing platform once payment confirmed\n• Ideal: changeTicketOwner(buyerEmail, ticketId) — executes within partner's system\n• Input: buyer email, ticketId\n• Expected behavior: (1) remove from seller, (2) issue to buyer, (3) preserve seller's reporting, (4) mark as resale for analytics, (5) regenerate QR + invalidate original, (6) support reverse action for chargebacks/fraud\n• Integration: Option 1 — menta calls partner endpoint; Option 2 — menta sends webhook, partner handles transfer\n\nThe pillar description must include (partner-specific):\n• Which mechanism: endpoint call (Option 1) or webhook (Option 2)?\n• Buyer visibility: does ticket appear in buyer's My Tickets? Same as primary or different labeling?\n• Seller visibility: remains with 'Sold' label, or removed?\n• Reporting: recorded as resale or as standard transfer? Seller's original order preserved?\n• QR handling: original invalidated? New generated for buyer? Who manages generation? (menta NEVER generates QR)\n• Re-resale/re-transfer: can resale buyer re-list? Can they transfer? Constraints inherited from native mechanism\n• Reverse action: can transfer be reversed for chargebacks/fraud?\n• Payout timing: when does seller receive funds?"},{"title":"7. Price Info Structure","content":"Option: Standard\n• Partner sends only ticketOptions (GA, VIP, etc.)\n• menta treats each as unique category without price variations\n• Single call to POST /v1/events with ticketOptions only, no priceTypes\n• Each ticketOption: title, ticketId, description, currency\n• Benefits: lowest effort, one rule per ticketOption\n• Limitations: no meaningful groupings if multiple prices exist; no alerts beyond ticketOption\n\nOption: Simple Price Detail\n• Partner sends ticketOptions + priceTypes separately\n• menta auto-generates all combinations (N ticketOptions × M priceTypes)\n• ticketOptions: visible to buyer (title, ticketId, description, currency)\n• priceTypes: internal metadata not shown to buyer (priceTypeId, title)\n• Benefits: clear buyer grouping; filters on ticketOption; alerts on category listings; low maintenance\n• Limitations: generates combinations that may not exist in real config; dashboard shows phantom combinations\n\nOption: Advanced Price Detail\n• Partner sends ticketOptions + priceTypes, then explicitly defines real combinations\n• Two API calls: (1) POST /v1/events with both dimensions, (2) POST /v1/events/rules with ruleType: COMBINATION\n• Only explicitly defined combinations exist — no auto-generation\n• Benefits: dashboard reflects real catalog exactly; no phantom combinations; ideal for complex pricing\n• Limitations: requires managing combinations via API; must update when ticketOptions/priceTypes change\n\nThree-field Data Model for Ticket Information:\nmenta uses three distinct fields to carry ticket information, each with a specific role and visibility:\n\n• ticketOption (ticketOptionId) — BUYER-FACING. Represents the access the ticket gives to the event. This is the primary grouping dimension on the resale marketplace and the first axis for pricing rules (min/max price, commission). The buyer sees this when browsing and purchasing.\n\n• priceType (priceTypeId) — SELLER-FACING ONLY. Helps the seller identify which specific ticket variant they are listing (e.g., Adult vs Child, Early Bird vs Regular). The buyer NEVER sees priceType. This is the second axis for rule specificity when using Advanced Price Detail — rules can be set per ticketOption × priceType combination.\n\n• section (props.seating.section) — BUYER-FACING, INFORMATIONAL. Appears as location/context in the resale listing. Purely informational — no pricing rules can be attached to section. Can be toggled on/off per event from the menta dashboard without changing the data model.\n\nWhen guiding the partner on how to map their ticket structure, use this decision framework:\n\nPath A — Merged into ticketOption:\nConcatenate all relevant info into ticketOption (e.g., \"Gold - Adult\"). No priceType needed. Simple data model but each combination becomes a separate category — no grouping. Rules per combination possible. No Advanced Price Detail required.\nBest for: partners with few combinations who want maximum rule control.\n\nPath B — Dimensional split (ticketOption + priceType, hidden from buyer):\nSend the access level as ticketOption (e.g., \"Gold\") and the variant as priceType (e.g., \"Adult\"). Buyer sees only \"Gold\" — all variants grouped. Seller sees \"Gold — Adult\" when listing. Rules per ticketOption × priceType via Advanced Price Detail.\nBest for: partners who want grouping and per-combination rules, and don't need the buyer to see the variant.\n\nPath C — Dimensional split + section mirror (recommended default):\nSame as Path B, plus mirror the variant in props.seating.section on the ticket payload. Buyer sees the variant as informational context in the listing. Seller sees it when listing. Per-event toggle to show/hide section display from the dashboard. Rules apply per ticketOption only (not per variant).\nBest for: partners who want full visibility on both sides with per-event flexibility. The most common recommendation because resale pricing is market-driven and per-variant rules are rarely needed.\n\nThe recommendation depends on two questions:\n1. Does the buyer need to see the variant (e.g., Adult/Child) on the resale marketplace?\n   → No: Path B. Yes: Path A or C.\n2. Do you need different pricing rules per variant?\n   → Yes: Path A (if buyer must see) or Path B (if buyer doesn't need to see). No: Path C."},{"title":"8. SuperSwap / Market Close","content":"Defines when the secondary market closes and how QR codes are handled. Behavior depends on partner's QR protection.\n\nDescribe: (1) partner's QR protection mechanism, (2) agreed close time, (3) sync requirements\n\nScenario: Dynamic QR codes\n• QR codes rotate periodically or are time-limited\n• Conservative resale close time required to ensure buyer receives valid QR before rotation\n• Document the agreed close time relative to the event\n\nScenario: Delayed QR / QR Protect (hidden until close to event)\n• QR codes hidden until configured time before event (e.g., 24h, 48h)\n• If resale must only be enabled while QRs are hidden: menta syncs resale close with QR reveal time\n• Once QR codes become visible, secondary market closes\n• Document: QR reveal time, whether resale must close at that moment, any buffer\n\nScenario: Static / uncovered QR codes\n• QR codes always visible or eliminated/regenerated upon transfer\n• Secondary market close time is flexible — no sync with QR visibility needed\n• Document the agreed close time"},{"title":"9. Market Making","content":"Two sub-dimensions. Partner can implement either, both, or neither.\n\nSub-decision 1: Inventory Data\n• If shared: two endpoints — event-level PUT /v1/marketdata/events/{id}/inventory and granular PUT /v1/marketdata/events/{id}/inventory/details\n• Fields (all optional): capacity, releasedTickets, reservedSpace, soldOut (boolean), soldPercentage (0-100)\n• Enables: sold-out behaviors, marketplace signals, pricing/availability features\n• If not shared: menta operates without primary sales context; features rely on manual config\n\nSub-decision 2: Ticket Leads\n• If shared: four lead types — Ticket Holder (potential seller), Abandoned Cart (potential buyer), Virtual Queue (showed interest), Wishlist (explicit opt-in)\n• Endpoints: POST /v1/marketdata/ticket-leads (individual) or /bulk (up to 1000, can mix types)\n• All leads require at least one buyer identifier (email, phone, or id)\n• Automatic upsert based on buyer + event + show — no duplicates\n• Privacy: id field for GDPR/LGPD; sensitive fields can be hashed\n• If not shared: no demand-side intelligence; no buyer matching or proactive notifications\n\nDocument: (1) which sub-dimensions, (2) for inventory: endpoint model + fields, (3) for leads: lead types + submission method, (4) privacy considerations"},{"title":"10. Refunds, Cancellations & Chargebacks","content":"Default policy (constant):\n• Purchases on the secondary market are final — no refunds except for event cancellation/postponement\n• Buyers are invited to re-list their tickets on the same channel if they cannot attend\n• menta always retains its commission regardless of refund outcomes\n• menta does not handle end-user refund inquiries directly — supports the partner's team\n\nSub-decision A: Listed tickets on primary cancellation/refund\n• [Always applies] When a primary order is canceled/refunded, active listings are automatically delisted\n• Requires: partner notifies menta of ticket cancellation via the existing ticket cancellation integration\n\nSub-decision B: Sold tickets on primary cancellation/refund\n• Describe the agreed option based on the partner's cancellation capabilities (PREC 21.0 + 21.1)\n\nOption: Exclude sold tickets from cancellation\n• Partner cancels only the available and listed tickets. Sold tickets are excluded.\n• Resale buyer keeps their ticket. Seller receives payout for the sold ticket and refund for the rest.\n• Requires: partial cancellation capability + automatic resale detection\n• Pre-payout: payout for the sold ticket proceeds normally\n• Post-payout: no impact on menta\n\nOption: Cancel all — protect resale buyer\n• Partner cancels the entire order (cannot do partial). The resale buyer's ticket remains valid.\n• Seller's payout is cancelled. Pre-payout: value split per contract between menta and partner.\n• Post-payout: partner absorbs the cost of the already-executed payout.\n• Partner must inform the seller about the cancellation and payout impact.\n\nOption: Cancel all — full reversal\n• Everything is cancelled including the resale buyer's ticket. Buyer receives a full refund.\n• Last resort — maximum friction. Only for cases where the resale buyer's ticket cannot be preserved.\n• Partner or menta should communicate to the buyer citing transaction irregularities.\n\nOption: Manual case-by-case\n• No automation. Support team evaluates each case individually. Only viable for low volumes.\n\nSub-decision D: Chargebacks on primary purchases with tickets in resale\n• Describe the agreed notification mechanism: automatic vs manual\n• Pre-payout: chargeback → delist active listings, cancel pending payouts\n• Post-payout: chargeback is the partner's loss (same as today without resale)\n• Optional: collaborate to pause future payouts for users who committed fraud\n\nTiming dimension (applies to Sub B and D):\n• Pre-payout: payout has not been executed yet. Can be cancelled. Value can be split per contract.\n• Post-payout: payout already executed. If partner cancels/chargebacks, partner absorbs the cost.\n\nDocument: (1) partner's cancellation granularity and detection capabilities, (2) agreed Sub B option, (3) chargeback notification mechanism, (4) cost allocation model per contract"}]},"integrationPrinciples":{"title":"Integration Principles","intro":"Foundational rules and reference models that apply to every menta integration. These are non-negotiable constraints that shape all design decisions.","sections":[{"title":"Golden Rules","content":"Two absolute constraints that apply to every integration, regardless of partner, decision, or configuration:\n\n1. menta NEVER participates in ticket delivery, fulfillment, or QR generation\n• The partner's system is always responsible for delivering the ticket/QR to the buyer after a resale transaction (Change Ticket Owner)\n• menta triggers the ownership change — the partner handles the rest\n• This applies to all delivery mechanisms: email PDF, app QR, wallet pass, will call\n\n2. menta NEVER participates in onsales (primary sales)\n• Ticket data only flows to menta when a user wants to list for resale\n• menta does not receive, store, or process the full primary inventory\n• The partner remains the single source of truth for ticket ownership at all times"},{"title":"Authentication Models","content":"Three authentication mechanisms, each tied to specific access methods. Most integrations use Login Trust + Login Force together.\n\nLogin Trust\n• The partner tells menta who the authenticated user is when generating a URL\n• Partner calls menta API with user identity (email, phone, or userId) → menta returns a tokenized URL → user arrives pre-authenticated\n• Used with: SAL (sell), Generic URL with Login Trust (sell)\n• The user never sees an additional login prompt\n\nLogin Force\n• Ensures all resale buyers have a valid account on the partner platform\n• Flow: menta redirects to partner login URL with returnTo → user signs in or registers → partner calls GET /v1/auth/oneTimeToken with user email → menta returns one-time token → partner redirects back appending oneTimeToken → user resumes authenticated\n• Used with: buyer purchase flows (always)\n• The token is single-use and expires quickly\n\nmenta OTP (One-Time Password)\n• menta authenticates the user directly via email or phone code\n• Flow: user enters email/phone → menta sends code → user enters code → session authenticated\n• Used with: Static URL (sell access)\n• Adds friction — used when the partner cannot pass user identity"},{"title":"Auth Model by Access Method","content":"Each access method has a fixed auth model. This is not configurable — it follows from how the URL is generated.\n\n• SAL (sell) → Login Trust — partner passes user identity in the SAL API call\n• Generic URL with Login Trust (sell) → Login Trust — partner calls menta API with user identity, gets tokenized URL to Ticket Management\n• Static URL (sell) → menta OTP — URL is the same for everyone, no identity embedded\n• Any access method (buy/purchase) → Login Force — buyers must have a partner account before purchasing\n\nCombination logic:\n• If both Login Trust + Login Force → Login Trust for seller flows, Login Force for buyer flows\n• If only menta OTP → sole auth mechanism for sell; Login Force still applies for buy"},{"title":"Partner Terminology","content":"In all client-facing documents, flows, and communications:\n• Always use the partner's actual name — never 'la ticketera', '[Partner]', or 'the platform'\n• Define technical terms in the glossary before first use\n• Use 'secondary market' or 'resale' — never 'SuperSwap' in client-facing content\n• 'Integration Pillars' is the client-facing term for integration decisions"}]},"userFlowPrinciples":{"title":"User Flow Principles","intro":"How to construct and interpret user flow diagrams for menta integrations. Covers the decision logic that determines which flow variant applies, the canonical flow templates, and the rules for attributing steps to partner vs menta.","sections":[{"title":"Access to Sell — Decision Logic","content":"The Access to Sell decision (Integration Pillar 5) is the most consequential choice in an integration. It determines the auth model, the flow structure, and the UI approach for the seller experience.\n\nThree options with increasing integration depth:\n\n1. Static URL — zero backend integration\n• Single fixed URL for all users, no user identity embedded\n• User authenticates via menta OTP\n• Destination: Ticket Management (menta-hosted)\n• Good for pilots, minimal effort\n\n2. Generic URL with Login Trust — mid-level integration\n• Partner generates a per-user tokenized URL via menta API\n• User arrives at Ticket Management pre-authenticated (no OTP)\n• Same Ticket Management destination as Static URL\n• Used when SAL is excluded but partner CAN make backend API calls\n\n3. SAL (Smart Access Layer) — full integration\n• Partner calls SAL endpoint with ticketIds, receives per-ticket status + CTA URLs\n• CTAs embedded directly in the partner's per-ticket view\n• No Ticket Management module — user acts within the partner's interface\n• Requires a per-ticket interface (ticket details screen)\n\nDecision tree:\n• IF ticket visualization = Grouped by order → SAL is EXCLUDED (no per-ticket view to anchor CTAs)\n  • IF partner can make API calls → Generic URL with Login Trust\n  • IF partner cannot make API calls → Static URL\n• ELSE (per-ticket view exists) → SAL is available and preferred\n\nKey relationships:\n• Static URL and Generic URL both require Ticket Management activation\n• SAL requires a per-ticket interface (ticket details screen) as a precondition\n• The choice cascades to Authentication (Login Trust vs OTP) automatically"},{"title":"Seller Flow — Variant A: Static URL","content":"Auth: menta OTP → Destination: Ticket Management or direct Selling flow\nZero backend integration from the partner. Single fixed URL for all users.\n\nPreconditions:\n• Access to Sell = Static URL\n• Auth = menta OTP (no Login Trust available)\n• Ticket Management activated\n\nStep-by-step flow:\n\n1. USER HAS TICKETS ON PARTNER PLATFORM [Partner]\nThe user has purchased tickets through the partner's primary sales.\n\n2. USER ACCESSES RESALE CTA [Partner]\nThe user clicks a resale CTA. The CTA wording is dynamic based on ticket state:\n• \"Sell\" — if all tickets are available\n• \"Sell / Edit\" — if some are listed and some available\n• \"View details\" — if all tickets are sold\nThe CTA points to a fixed menta URL (same for all users). No backend integration required.\n\n3. menta OTP AUTHENTICATION [menta]\nThe user lands on a menta-hosted authentication screen. Enters email → receives one-time code → enters code → session authenticated.\n\n4. EVENT SELECTION (if multiple events) [menta]\nIf the user has tickets for multiple events, an event selector is shown. The user selects which event to manage. If only one event, this step is skipped.\n\n5. ROUTING DECISION: TICKET MANAGEMENT vs SELLING FLOW [menta]\nThis is an automatic routing — the user does not see a choice screen:\n• IF the user has listed or sold tickets → goes to TICKET MANAGEMENT (Step 5a)\n• IF the user has only available tickets (nothing listed, nothing sold) → goes directly to SELLING FLOW (Step 6)\n\n5a. TICKET MANAGEMENT — TABS VIEW [menta]\nOnly shown when the user has at least one listed or sold ticket. Three tabs with count badges:\n• AVAILABLE tab — tickets not listed. Each card shows: ticket count, category name, face value, \"Sell\" link. A \"List ticket\" button appears at the top of the tab.\n• LISTED TICKETS tab — tickets currently on the marketplace. Each card shows: ticket count, category name, listed price, \"You will receive\" amount, share icon, three-dot menu (opens listing details / edit / remove).\n• SOLD tab — tickets already sold. Each card shows: ticket count, category name, sale price, payout status. Clicking opens a view-only detail screen (same layout as listing details but without edit capabilities).\n\nFrom Listed tab → clicking the card or three-dot menu opens the LISTING DETAILS screen:\n• Yellow callout if payout account incomplete: \"Action required: complete your account information\" with \"Complete information\" CTA\n• Ticket info: quantity, category name\n• Sale price section: \"You will receive\" amount, \"Service fees\" amount, \"Tickets listed at\" amount (buyer price)\n• Payout timing: \"You'll receive the payment within 72 business hours after the event takes place\"\n• \"Change price\" link to edit the listing price\n• \"Change payout account\" to update payment details\n• \"Delete listing\" CTA (red) to remove from marketplace\n\n6. SELLING FLOW — SET PRICE [menta]\nThe user sets a listing price. Shows: face value reference, service fee, payout amount (\"You will receive\"), and the buyer-facing listed price. The user adjusts the price they want to receive.\n\n7. SELLING FLOW — LISTING SUMMARY [menta]\nReview screen: ticket details, event, category, listing price, estimated payout. User accepts terms and conditions and confirms.\n\n8. SELLING FLOW — CONFIRMATION [menta]\nListing confirmed screen with three CTAs:\n• \"Copy link\" — copy the listing URL to share\n• \"Complete payout account\" — set up payment details (if not yet configured)\n• \"Go back to my account\" — returns the user to the partner's My Tickets section (via returnURL)\n\n9. LISTING CONFIRMATION EMAIL [menta]\nEmail sent to the seller: event name, ticket details, listing price, estimated payout, manage listing link.\n\nPlatform division:\n• Partner nodes: Steps 1-2 (user has ticket, accesses URL)\n• menta nodes: Steps 3-9 (OTP, routing, TM or selling flow, emails)\n• Return to partner: \"Go back to my account\" redirects to partner\n\nMermaid template:\nflowchart TD\n    A[\"User has tickets\\non partner platform\"]:::partner --> B[\"Clicks 'Sell your tickets'\\nfixed URL\"]:::partner\n    B --> C[\"menta OTP:\\nemail → code → verify\"]:::menta\n    C --> D{{\"Has listed\\nor sold tickets?\"}}:::menta\n    D -->|\"Yes\"| E[\"Ticket Management\\nAvailable · Listed · Sold tabs\"]:::menta\n    D -->|\"No\"| F[\"Set price\\nface value · fees · payout\"]:::menta\n    E -->|\"Sell\"| F\n    E -->|\"View listed\"| G[\"Listing details:\\nprice · fees · payout timing\\nChange price · Remove listing\"]:::menta\n    E -->|\"View sold\"| H[\"Sale details (view only)\"]:::menta\n    F --> I[\"Review & confirm listing\\nAccept T&C\"]:::menta\n    I --> J[\"Listing confirmed\\nCopy link · Complete payout\\nGo back to my account\"]:::menta\n    J -->|\"Go back\"| K[\"Returns to partner\\nMy Tickets\"]:::partner\n\n    classDef partner fill:#fee2e2,stroke:#dc2626,stroke-width:2px,color:#991b1b\n    classDef menta fill:#dbeafe,stroke:#0284c7,stroke-width:2px,color:#075985"},{"title":"Seller Flow — Variant B: SAL (Direct CTAs)","content":"Auth: Login Trust (embedded in SAL call) → Destination: Partner's UI with embedded CTAs\nEXCLUDED when ticket visualization = Grouped by order.\n\nPreconditions:\n• Access to Sell = SAL\n• Auth = Login Trust\n• Ticket visualization = Per-ticket interface (ticket details screen)\n\nStep-by-step flow:\n\n1. USER VIEWS MY TICKETS (per-ticket view) [Partner]\nThe user is logged into the partner platform and views their tickets. Each ticket is displayed as an individual item. The partner's backend calls the menta SAL endpoint transparently. The user sees their regular tickets enhanced with resale status and CTAs.\n\n2. PER-TICKET STATUS AND ACTIONS [Partner UI, menta-powered]\nEach ticket card shows its resale status and available actions:\n• AVAILABLE (not listed): \"Sell\" button → opens selling flow\n• LISTED (on marketplace): listed price, \"You will receive\" amount, share icon, three-dot menu → opens listing details\n• SOLD: sale price, payout status → opens view-only sale details\n• No resale actions (event not enabled, market closed): no CTAs rendered\n\nIf SAL endpoint is unavailable, the partner gracefully degrades: tickets show normally without resale CTAs.\n\n3. SELLING FLOW — TICKET SELECTION (conditional) [menta]\nUser clicks \"Sell\". IF more than one available ticket → ticket selection screen. IF exactly one → skipped.\n\n3.5. SELLING FLOW — SET PRICE [menta]\nShows: face value reference, service fee, payout amount.\n\n4. SELLING FLOW — REVIEW & CONFIRM [menta]\nListing summary: ticket details, event, category, listing price, estimated payout. Accept T&C and confirm.\n\n5. SELLING FLOW — CONFIRMATION [menta]\nListing confirmed with CTAs: \"Copy link\", \"Complete payout account\" (if needed), \"Go back to my account\" (returns to partner via returnURL).\n\n6. LISTING CONFIRMATION EMAIL [menta]\nEmail with event, ticket, price, payout, manage link.\n\n7. RETURN TO PARTNER [Partner]\nUser clicks \"Go back to my account\" → returns to partner's My Tickets. SAL now reflects updated status.\n\nPlatform division:\n• Partner nodes: Steps 1-2 (My Tickets with SAL CTAs), Step 7 (return)\n• menta nodes: Steps 3-6 (selling flow, confirmation, email)\n\nMermaid template:\nflowchart TD\n    A[\"User in My Tickets\\n(per-ticket view)\"]:::partner --> B{{\"Ticket resale\\nstatus?\"}}:::partner\n    B -->|\"Available\"| C[\"Sees 'Sell' button\"]:::partner\n    B -->|\"Listed\"| D[\"Sees listed price · payout\\nShare · three-dot menu\"]:::partner\n    B -->|\"Sold\"| E[\"Sees sale price · payout status\"]:::partner\n    C --> F[\"Set price\\nface value · fees · payout\"]:::menta\n    F --> G[\"Review & confirm listing\\nAccept T&C\"]:::menta\n    G --> H[\"Listing confirmed\\nCopy link · Complete payout\\nGo back to my account\"]:::menta\n    H -->|\"Go back\"| I[\"Returns to My Tickets\\n(ticket now shows as Listed)\"]:::partner\n    D --> J[\"Listing details:\\nprice · fees · payout timing\\nChange price · Remove listing\"]:::menta\n    E --> K[\"Sale details (view only)\"]:::menta\n\n    classDef partner fill:#fee2e2,stroke:#dc2626,stroke-width:2px,color:#991b1b\n    classDef menta fill:#dbeafe,stroke:#0284c7,stroke-width:2px,color:#075985"},{"title":"Seller Flow — Variant C: Generic URL with Login Trust","content":"Auth: Login Trust (tokenized URL) → Destination: Ticket Management or direct Selling flow\nUsed when SAL is excluded but partner CAN make API calls.\n\nPreconditions:\n• Access to Sell = Generic URL with Login Trust\n• Auth = Login Trust\n• Ticket Management activated\n• Typical trigger: ticket visualization = Grouped by order (SAL excluded)\n\nStep-by-step flow:\n\n1. USER LOGGED INTO PARTNER PLATFORM [Partner]\nThe user is logged in and navigates to My Tickets.\n\n2. USER SEES RESALE CTA [Partner]\nA resale CTA is visible in My Tickets. The CTA wording is dynamic based on the user's ticket state:\n• \"Sell\" — if all tickets are available (none listed, none sold)\n• \"Sell / Edit\" — if some tickets are listed and some are available\n• \"View details\" — if all tickets are sold\nThe user clicks the CTA. The partner's backend generates a tokenized URL via menta API (Login Trust). This is transparent — the user clicks and arrives at menta without any login screen or OTP prompt.\n\n3. ROUTING DECISION: TICKET MANAGEMENT vs SELLING FLOW [menta]\nAutomatic routing — not a user choice:\n• IF the user has listed or sold tickets → TICKET MANAGEMENT (Step 3a)\n• IF the user has only available tickets → SELLING FLOW directly (Step 4)\n\n3a. TICKET MANAGEMENT — TABS VIEW [menta]\nOnly shown when the user has at least one listed or sold ticket. Three tabs with count badges:\n• AVAILABLE tab — tickets not listed. Each card: ticket count, category, face value, \"Sell\" link. \"List ticket\" button at top.\n• LISTED TICKETS tab — tickets on marketplace. Each card: ticket count, category, listed price, \"You will receive\" amount, share icon, three-dot menu.\n• SOLD tab — sold tickets. Each card: ticket count, category, sale price, payout status.\n\nThree exit paths from Ticket Management:\n• Sell → goes to the Selling Flow (Step 4)\n• Edit → opens Listing Details screen (Step 3b)\n• View details → opens Sale Details screen (Step 3c)\n\n3b. LISTING DETAILS [menta]\nShows all listing information: listed price, payout amount (\"You will receive\"), service fees breakdown, payout timing (\"You'll receive the payment within 72 business hours after the event takes place\").\nThree actions available: Change price, Change payout account, Delete listing.\n\n3c. SALE DETAILS (view only) [menta]\nRead-only view showing: sale price, payout amount, payout status (pending/paid). No actions available — purely informational.\n\n4. SELLING FLOW — TICKET SELECTION (conditional) [menta]\nIF the user has more than one available ticket → ticket selection screen. User selects which tickets to list.\nIF the user has exactly one available ticket → skipped, goes directly to Set Price.\n\n5. SELLING FLOW — SET PRICE [menta]\nThe user sets a listing price. Shows: face value reference, service fees, payout amount (\"You will receive\").\n\n6. SELLING FLOW — LISTING SUMMARY [menta]\nReview: ticket details, event, category, listing price, estimated payout. Accept T&C and confirm.\n\n7. SELLING FLOW — CONFIRMATION [menta]\nListing confirmed with three CTAs:\n• \"Copy link\" — share the listing\n• \"Complete payout account\" — set up payment details\n• \"Go back to my account\" — returns to partner's My Tickets via returnURL\nA listing confirmation email is sent to the seller.\n\n8. RETURN TO PARTNER [Partner]\n\"Go back to my account\" redirects to the partner's My Tickets section.\n\nPlatform division:\n• Partner nodes: Steps 1-2 (logged in, clicks CTA)\n• menta nodes: Steps 3-7 (routing, TM or selling flow, confirmation)\n• Return to partner: Step 8\n\nMermaid template:\nflowchart TD\n    A[\"User logged into partner\\nviews My Tickets\"]:::partner --> B[\"Clicks resale CTA\\n'Sell' / 'Sell-Edit' / 'View details'\"]:::partner\n    B --> C{{\"Has listed or\\nsold tickets?\"}}:::menta\n    C -->|\"Yes\"| D[\"Ticket Management\\nAvailable · Listed · Sold\"]:::menta\n    C -->|\"No\"| E{{\"More than\\none ticket?\"}}:::menta\n    D -->|\"Sell\"| E\n    D -->|\"Edit\"| F[\"Listing details\\nChange price · Change payout · Delete\"]:::menta\n    D -->|\"View details\"| G[\"Sale details (view only)\"]:::menta\n    E -->|\"Yes\"| H[\"Select tickets to list\"]:::menta\n    E -->|\"No\"| I\n    H --> I[\"Set price\\nface value · fees · payout\"]:::menta\n    I --> J[\"Review & confirm\\nAccept T&C\"]:::menta\n    J --> K[\"Listing confirmed\\nCopy link · Payout · Go back\"]:::menta\n    K -->|\"Go back\"| L[\"Returns to partner My Tickets\"]:::partner\n\n    classDef partner fill:#fee2e2,stroke:#dc2626,stroke-width:2px,color:#991b1b\n    classDef menta fill:#dbeafe,stroke:#0284c7,stroke-width:2px,color:#075985"},{"title":"Buyer Flow (Resale Purchase)","content":"The buyer flow covers the full journey from discovering resale availability on an event page to receiving the ticket after purchase. The flow varies based on: Access to Buy decision (SAL vs Static URL), event/category availability state, and authentication model.\n\nAuth model (depends on integration decisions):\n• If Access to Buy = Static URL → buyer authenticates via menta OTP\n• If Access to Buy = SAL → buyer identity may come from Login Trust (no extra auth), Login Force (redirect to partner login before checkout), or no auth needed if partner creates account via CTO webhook\n• Login Force flow when applicable: menta redirects to partner login URL with returnTo → user signs in or registers → partner calls GET /v1/auth/oneTimeToken → partner redirects back with token → user resumes checkout\n\nStep-by-step flow (SAL Buy — primary path):\n\n1. USER BROWSES EVENT PAGE [Partner]\nThe user browses an event on the partner's website or app. The partner's event page renders normally with primary sale information. If resale is enabled for this event, the partner calls the SAL buy endpoint: GET /v1/wrapper/accesslayer?type=buy&eventId={eventId}&showId={showId}.\n\n2. RESALE AVAILABILITY DISPLAY [Partner, menta-powered]\nSAL returns resale components that the partner renders natively on the event page. What the user sees depends on the event/category state:\n\nPath A — Integrated seat map (seated event with resale inventory):\n• Resale-available seats are highlighted with a distinctive color and \"Verified Resale\" icon on the partner's interactive seat map\n• Dynamic tooltips on GA sections show: quantity available for resale + lowest price\n• Clicking a resale seat directs to the menta checkout with that specific seat pre-selected\n\nPath B — Specific category sold out (other categories still available):\n• SAL returns a \"Resale Available\" banner for the sold-out category\n• The banner shows: category name, quantity available for resale, floor price\n• Clicking the banner redirects to the menta marketplace filtered by that category\n\nPath C — All categories sold out:\n• The event page shows a sold-out notice with an \"Official Resale Available\" CTA\n• Depending on partner preference: full redirect to menta marketplace for that event, or a modal explaining \"Sold out — official resale available\" with a CTA\n\nPath D — No seat map, some categories available:\n• SAL returns a resale availability indicator (list component or modal trigger)\n• Shows: category name, quantity for sale, floor price per category\n• Clicking the CTA redirects to the menta resale marketplace\n\nIf no resale inventory exists for this event, SAL returns no components — the event page shows the standard primary sale view without any resale indicators.\n\n3. USER SELECTS RESALE TICKET [menta]\nThe user enters the menta-hosted marketplace experience. Depending on the entry path:\n• From seat map: the specific seat is pre-selected. User sees ticket details: seat location, listing price (all-in: ticket + buyer fee), seller verification badge\n• From category filter: the marketplace shows available resale tickets for that category, sorted by price. Each listing shows: seat/section, all-in price, \"Buy\" CTA\n• From full event redirect: the marketplace shows all available resale tickets organized by category, then by price\n\n4. CHECKOUT — TICKET DETAILS [menta]\nThe user reviews the selected ticket. The checkout screen shows:\n• Event name, date, venue\n• Ticket category, seat/section (if applicable)\n• Price breakdown: listing price, buyer fee, total (all-in price)\n• Buyer information fields (name, email — required for Change Ticket Owner)\n• If Login Force is active: the user is redirected to the partner's login page before reaching this step. After login, they return to checkout with the ticket still selected.\n\n5. PAYMENT [menta]\nThe user enters payment details (credit/debit card via menta's payment processor). The user reviews the final amount (all-in price) and confirms the purchase.\n\n6. PURCHASE CONFIRMATION [menta]\nThe purchase is confirmed. The user sees a confirmation screen with:\n• Purchase summary: event, ticket, seat, price paid\n• \"Your ticket is being prepared\" message (the CTO is being processed)\n• Resale upsell: \"Can't attend? You can sell your ticket on the official resale marketplace\" — this is a strategic touchpoint to inform the buyer about the resale option from day one\n• \"Go to My Tickets\" CTA linking to the partner's My Tickets section\n\n7. PURCHASE CONFIRMATION EMAIL [menta]\nmenta sends a purchase confirmation email to the buyer with: event details, ticket details, price paid, and a \"Go to My Tickets\" link. This email does NOT include the ticket/QR — that is the partner's responsibility.\n\nNOTE: The partner's primary ticket delivery email should also include information about official resale and a \"Sell your ticket\" CTA for future use.\n\n8. TICKET DELIVERY [Partner]\nThe partner handles ticket fulfillment after the CTO completes. What happens depends on the partner's CTO mechanism:\n• If webhook-based: menta sends a CTO webhook → partner processes the ownership change → invalidates the seller's ticket → creates a new ticket with a new QR for the buyer → delivers via the partner's standard mechanism (email PDF, app QR, wallet pass, etc.)\n• If endpoint-based: menta calls the partner's CTO endpoint directly\n\nThe buyer receives the ticket through the partner's standard delivery channel. menta does not participate in ticket delivery, QR generation, or fulfillment.\n\n9. TICKET AVAILABLE IN MY TICKETS [Partner]\nThe buyer can view and access their new ticket in the partner's My Tickets section. The ticket functions exactly like a primary-sale ticket — same QR, same access control, same venue entry experience.\n\nBuyer flow for Static URL access (simplified):\nWhen Access to Buy = Static URL, the partner adds a \"Buy resale tickets\" link redirecting to a menta-hosted page. The buyer authenticates via menta OTP (if no Login Trust). The rest of the flow (steps 3-9) is identical.\n\nCommunications summary (all triggered by a single purchase):\n• menta → buyer: Purchase confirmation email (no ticket)\n• Partner → buyer: Ticket delivery email with QR/access (triggered by CTO webhook)\n• menta → seller: Sale notification email with payout details\n• menta → seller: Payout confirmation when funds are released\n\nPlatform division:\n• Partner nodes: Steps 1-2 (event page, resale indicators), Step 8-9 (ticket delivery, My Tickets)\n• menta nodes: Steps 3-7 (marketplace, checkout, payment, confirmation, email)\n• Cross-platform: Congrats page resale upsell, partner's ticket delivery email sell CTA\n\nCRITICAL: User flow diagrams must NOT show backend actions as nodes. \"CTO webhook\", \"creates buyer account\", \"calls menta API\" are infrastructure. The user only experiences: selects ticket → checkout → pays → confirmation → new ticket appears.\n\nMermaid template (SAL Buy):\nflowchart TD\n    A[\"User on event page\"]:::partner --> B{{\"Event / category\\navailability?\"}}:::partner\n    B -->|\"Map\"| C[\"Sees resale seats highlighted\\non interactive map\"]:::partner\n    B -->|\"Category\\nsold out\"| D[\"Sees 'Resale Available'\\nbanner for category\"]:::partner\n    B -->|\"All\\nsold out\"| E[\"Sees 'Official Resale\\nAvailable' CTA\"]:::partner\n    B -->|\"No map,\\nsome available\"| F[\"Sees resale indicators\\nper category\"]:::partner\n    C --> G[\"Selects specific resale seat\"]:::partner\n    D --> H[\"Clicks banner →\\nmarketplace filtered by category\"]:::menta\n    E --> I[\"Clicks CTA →\\nfull event marketplace\"]:::menta\n    F --> I\n    G --> J[\"Reviews ticket details\\nAll-in price displayed\"]:::menta\n    H --> J\n    I --> J\n    J --> K[\"Enters buyer info\\nLogin Force redirect if needed\"]:::menta\n    K --> L[\"Payment · confirms purchase\"]:::menta\n    L --> M[\"Purchase confirmation\\nResale upsell CTA\"]:::menta\n    M --> N[\"Confirmation email sent\\n(no ticket — partner delivers)\"]:::menta\n    N --> O[\"Partner delivers new ticket\\n(new QR, partner's channel)\"]:::partner\n    O --> P[\"Ticket available in\\npartner My Tickets\"]:::partner\n\n    classDef partner fill:#fee2e2,stroke:#dc2626,stroke-width:2px,color:#991b1b\n    classDef menta fill:#dbeafe,stroke:#0284c7,stroke-width:2px,color:#075985"},{"title":"Platform Division Rules","content":"User flow diagrams show what the user sees and does. They must clearly indicate which platform's UI the user is interacting with at each step.\n\nNEVER include backend/API calls as diagram nodes. The API handoff (partner calling menta API, menta returning tokenized URL, CTO webhook, account creation) is infrastructure — it happens behind the scenes.\n\nPurchase Flow (Primary Market):\n• All nodes = Partner — the entire purchase journey happens on the partner's platform\n\nSeller Flow:\n• Partner nodes: Only the entry point — user in 'My Tickets' view + clicks the sell CTA/link. These are the only steps on the partner's UI.\n• menta nodes: Everything from the moment the user arrives at menta (pre-authenticated via Login Trust or post-OTP) onwards — event selection, Ticket Management, ticket selection, price setting, listing summary, confirmation, emails.\n• Partner return node: The returnURL redirect back to the partner's My Tickets (if configured).\n\nBuyer Flow:\n• Partner nodes: Event page browsing, resale inventory display (even if via SAL components — the user sees them on the partner's page), seat selection on map, post-CTO ticket delivery, My Tickets (final destination)\n• Transition: Login Force redirect chain (partner → menta → partner → menta) — show as a single \"Login redirect\" step, not 4 separate nodes\n• menta nodes: Marketplace browse, checkout (ticket details + buyer info + fee breakdown), payment, purchase confirmation\n• Partner node: Post-CTO ticket delivery and My Tickets view\n\nGranularity rules for flow diagrams:\nThe following should be SEPARATE nodes (they represent distinct screens or user decisions):\n• Routing decision: TM vs selling flow (automatic, based on having listed/sold tickets)\n• Ticket Management tabs view (only when user has listed or sold tickets)\n• Price setting (simplified: face value, fees, payout amount)\n• Listing summary / T&C acceptance\n• Listing confirmation with CTAs (copy link, payout, go back to partner)\n• Listing details screen (for listed tickets: price breakdown, payout timing, change/remove)\n• Checkout ticket details (price breakdown, buyer info)\n• Payment (entering payment details)\n• Purchase confirmation with resale upsell\n\nThe following should be COMPRESSED into one node or omitted:\n• SAL API calls (infrastructure)\n• CTO webhook/endpoint (infrastructure)\n• Account creation (infrastructure)\n• Payment processing (user just sees a loading state)\n• Token generation for Login Trust (infrastructure)\n\nCRITICAL RULE — No backend actions in user flow diagrams:\nUser flow diagrams show what the USER sees and does. They must NEVER include:\n• \"Partner calls menta API\" — infrastructure, not user-visible\n• \"menta returns tokenized URL\" — infrastructure\n• \"CTO webhook sent to partner\" — infrastructure\n• \"Partner creates buyer account\" — infrastructure\n• \"menta processes payment\" — infrastructure\n\nCorrect node: \"Arrives pre-authenticated at Ticket Management\"\nWrong node: \"Cooltix calls menta API with user identity (Login Trust)\"\n\nCorrect node: \"Purchase confirmation\"\nWrong node: \"menta triggers CTO webhook to Cooltix\"\n\nCorrect node: \"New ticket available in partner My Tickets\"\nWrong node: \"Partner receives webhook, creates account, executes CTO, generates new QR\"\n\nCommunications touchpoints to annotate (as notes or annotations, not flow nodes):\n• Listing confirmation email — sent after successful listing (menta → seller)\n• Sale notification email — sent when a listed ticket is sold (menta → seller)\n• Purchase confirmation email — sent after successful purchase (menta → buyer, no ticket)\n• Ticket delivery — partner sends new ticket to buyer after CTO (partner → buyer)\n• Payout confirmation — sent when seller funds are released (menta → seller)\n• Primary purchase confirmation: should include resale info + sell CTA (partner → buyer, cross-platform requirement)\n• Primary purchase congrats page: should include resale info + sell CTA (cross-platform requirement)"},{"title":"Visual Standards for Flow Diagrams","content":"Platform color scheme (consistent across all diagrams and flow explorers):\n\nPartner:\n• Fill: #fee2e2 (light red)\n• Stroke: #dc2626 (red)\n• Text: #991b1b (dark red)\n• Mermaid classDef: classDef partner fill:#fee2e2,stroke:#dc2626,stroke-width:2px,color:#991b1b\n\nmenta tech:\n• Fill: #dbeafe (light blue)\n• Stroke: #0284c7 (blue)\n• Text: #075985 (dark blue)\n• Mermaid classDef: classDef menta fill:#dbeafe,stroke:#0284c7,stroke-width:2px,color:#075985\n\nDiagram conventions:\n• Language: English always (even for Spanish-speaking partners)\n• Theme: neutral, Background: white, Width: 800px\n• Flow direction: Top-down (TD)\n• Node shapes: Rounded rectangles for actions, double-brace diamond for decisions\n• Labels: Short, 2-3 words per line\n• Partner references: Always actual partner name, never 'ticketera'\n• Branch cleanup: Only show applicable branches based on the partner's decisions\n• Auth visibility: Show OTP steps for Static URL, Login Trust URL generation for Generic URL/SAL, Login Force redirect chain for buyers"}]},"documentGeneration":{"title":"Document Generation Rules","intro":"Rules for generating client-facing Integration Design Documents. These rules were derived from a full audit of the Cooltix integration document (March 2026) and codify what works, what fails, and what the client actually needs.","sections":[{"title":"Document Structure — Required Sections","content":"Every Integration Design Document must include these sections in order:\n\n1. Executive Summary — partner, type, scope, timeline, 2-3 sentence context\n2. Terminology — define all key terms: Secondary market, Ticket Management, Login Trust, Login Force, CTO, SAL, Face value, Webhook. Add partner-specific terms as needed.\n3. Design Inputs & Foundation\n   3.1 Reference documentation (discovery form, call transcript, API docs, sandbox, test event)\n   3.2 Platform preconditions — FILTERED: only preconditions that affect design decisions. The client knows their own system.\n4. Architecture & Core Principles — constant across integrations (orchestration layer, source of truth, white-label, what menta doesn't do)\n5. Integration Pillars — summary table + one subsection per pillar with two layers: (1) what was decided, (2) what it requires from the partner\n6. Seller Flow — user flow diagram (not backend flow)\n7. Buyer Flow — user flow diagram (not backend flow)\n8. Business Rules — client-facing, plain language\n9. Operations & Contingency — only items requiring partner action\n10. Communications — who sends what, triggers, content summary\n11. API Summary — consolidated endpoint table with direction, purpose, when to call\n12. Webhook Catalog — event types, descriptions, expected partner actions\n13. Development Requirements — THE #1 DELIVERABLE. Table of everything the partner must build.\n14. Phasing — MVP vs Future scope boundaries\n15. Limitations — with mitigation plans\n16. Approval — signature block\n\nSections 11-14 are new as of March 2026 and must always be included."},{"title":"Content Rules — NEVER in client-facing content","content":"These items must NEVER appear in the client-facing document. They are menta-internal:\n\n• Rule IDs (R1, R2, R44, etc.) — menta's internal traceability codes. The client has no context. The prose must stand on its own.\n• \"Alternative considered\" paragraphs — internal decision logs showing why other options were rejected. The client needs what WAS chosen, not what was discarded.\n• Internal override callout boxes (e.g., \"R16 Override\") — exposing internal rule engine mechanics.\n• \"SuperSwap\" — internal menta branding. Use \"Market Close\" or \"Secondary Market Close.\"\n• \"Render Ticket\" — internal endpoint name. Describe the behavior instead.\n• Rules that don't apply — telling the client \"R23 doesn't apply\" is noise about rules they don't know exist.\n• Features not being implemented — don't oversell future possibilities (wish lists, buy orders) unless in scope.\n• Operational items purely menta's responsibility — payout detail changes, internal support processes.\n• The client's own system described back to them — don't explain how their CTO works when they told you. Focus on what menta ADDS.\n• Placeholder data from discovery forms — \"Test 1 / placeholder\" is unprofessional. Write \"To be configured\" instead.\n• Preconditions that don't affect design — invoicing software names, KYC details, fraud prevention methods. The client knows their own platform."},{"title":"Content Rules — ALWAYS in client-facing content","content":"These items must ALWAYS be present:\n\n• Terminology glossary (§2) — define SAL, CTO, Login Trust, Login Force, Ticket Management, OTP, Face value, Webhook\n• Preconditions table filtered to design-affecting only (~15-18 rows, not 36+)\n• \"What [Partner] needs to build\" table (§13) — consolidated requirements with: Requirement, Description, Priority (MVP/Future), Pillar reference. This is the #1 deliverable.\n• API endpoint summary (§11) — all endpoints in one table with direction, purpose, when to call\n• Webhook catalog (§12) — event types, descriptions, expected partner actions. Highlight which webhooks require immediate action.\n• Communications table (§10) — who sends what, when, with what content\n• Phasing section (§14) — MVP scope vs future scope, even
