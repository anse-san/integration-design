<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>menta — Integration Design Map</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f9fb;--surface:#fff;--border:#d1d5db;--text:#111827;--muted:#6b7280;
  --accent:#2563eb;--accent-bg:#eff6ff;--accent-bd:#93c5fd;
  --req:#b45309;--req-bg:#fef9c3;--req-bd:#fde047;
  --imp:#1d4ed8;--imp-bg:#dbeafe;--imp-bd:#93c5fd;
  --exc:#c2410c;--exc-bg:#ffedd5;--exc-bd:#fdba74;
  --dft:#6d28d9;--dft-bg:#ede9fe;--dft-bd:#c4b5fd;
  --prec-color:#15803d;--prec-bg:#f0fdf4;--prec-bd:#86efac;
  --sec-bg:#1e3a5f;--sec-fg:#fff;
  --crit:#dc2626;--crit-bg:#fef2f2;
  --high:#ea580c;--high-bg:#fff7ed;
  --med:#ca8a04;--med-bg:#fefce8;
  --low:#16a34a;--low-bg:#f0fdf4;
}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:13px}

/* ── header ── */
.hdr{background:var(--surface);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:16px;height:56px;position:sticky;top:0;z-index:100;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.logo{font-size:17px;font-weight:700;letter-spacing:-.4px;white-space:nowrap}.logo span{color:var(--accent)}
.nav{display:flex;gap:2px;flex:1}
.nbtn{padding:5px 13px;border-radius:5px;border:none;background:none;cursor:pointer;font-size:13px;font-weight:500;color:var(--muted);transition:all .15s;white-space:nowrap}
.nbtn:hover{background:var(--bg);color:var(--text)}.nbtn.on{background:var(--accent-bg);color:var(--accent)}
.bdg{background:#e5e7eb;color:var(--muted);border-radius:9px;padding:1px 6px;font-size:11px;font-weight:600;margin-left:3px}
.nbtn.on .bdg{background:var(--accent);color:#fff}
.hdr-r{display:flex;gap:8px;align-items:center;margin-left:auto;flex-shrink:0}
.btn{padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:12px;font-weight:600;color:var(--text);transition:all .15s;white-space:nowrap}
.btn:hover{border-color:var(--accent);color:var(--accent)}
.btn.edit-on{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.exp{border-color:#16a34a;color:#16a34a}.btn.exp:hover{background:#f0fdf4}

/* ── toolbar ── */
.tb{padding:14px 24px 0;display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.sw{position:relative;flex:1;min-width:200px;max-width:400px}
.sw svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--muted);width:14px;height:14px;pointer-events:none}
.si{width:100%;padding:7px 10px 7px 30px;border:1px solid var(--border);border-radius:6px;font-size:13px;background:var(--surface);outline:none}
.si:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(37,99,235,.12)}
.fg{display:flex;gap:5px;flex-wrap:wrap}
.fb{padding:4px 11px;border-radius:16px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:11px;font-weight:600;color:var(--muted);transition:all .15s}
.fb:hover{border-color:var(--accent);color:var(--accent)}.fb.on{background:var(--accent);border-color:var(--accent);color:#fff}
.fb.dft-f{border-color:var(--dft-bd);color:var(--dft)}.fb.dft-f.on{background:var(--dft);border-color:var(--dft);color:#fff}

/* ── content ── */
.ct{padding:14px 24px 40px}

/* ── cards ── */
.g2{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:10px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 16px;transition:box-shadow .15s}
.card:hover{box-shadow:0 2px 8px rgba(0,0,0,.07)}
.card.jump-hl{border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.15);animation:pulse .6s ease}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(37,99,235,.4)}70%{box-shadow:0 0 0 8px rgba(37,99,235,0)}100%{box-shadow:0 0 0 3px rgba(37,99,235,.15)}}
.cid{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.ctitle{font-size:14px;font-weight:600;margin-bottom:8px}
.pills{display:flex;flex-wrap:wrap;gap:5px}
.pill{padding:2px 9px;border-radius:10px;font-size:11px;font-weight:500;background:var(--bg);border:1px solid var(--border)}

/* ── cross-reference chips ── */
.ref-dec{display:inline;background:var(--accent-bg);color:var(--accent);border:1px solid var(--accent-bd);border-radius:3px;padding:0 4px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;line-height:1.6}
.ref-dec:hover{background:#dbeafe;text-decoration:underline}
.ref-prec{display:inline;background:var(--prec-bg);color:var(--prec-color);border:1px solid var(--prec-bd);border-radius:3px;padding:0 4px;font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;line-height:1.6}
.ref-prec:hover{background:#dcfce7;text-decoration:underline}

/* ── rules table ── */
.rt{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05);margin-top:12px}
.rt thead th{padding:8px 12px;background:#f3f4f6;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);border-bottom:2px solid var(--border);text-align:left;white-space:nowrap}
.rt thead th.c-con{text-align:center;width:110px}
.rt thead th.c-id{width:52px}
.rt thead th.c-bec{width:27%}
.tr-sec td{background:var(--sec-bg);color:var(--sec-fg);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;padding:7px 12px}
.tr-r td{padding:9px 12px;border-bottom:1px solid #f0f0f0;vertical-align:top}
.tr-r:last-child td{border-bottom:none}
.tr-r:hover td{background:#fafafa}
.tr-r.dft td{background:#faf9ff}.tr-r.dft:hover td{background:#f3f0ff}
.td-id{font-size:11px;font-weight:700;color:var(--muted);white-space:nowrap}
.td-if,.td-then{font-size:12px;line-height:1.6;white-space:pre-line}
.td-con{text-align:center;vertical-align:middle!important}
.cp{display:inline-block;padding:4px 10px;border-radius:4px;font-size:11px;font-weight:700;letter-spacing:.04em;white-space:nowrap}
.c-REQUIRES{background:var(--req-bg);color:var(--req);border:1px solid var(--req-bd)}
.c-IMPLIES{background:var(--imp-bg);color:var(--imp);border:1px solid var(--imp-bd)}
.c-EXCLUDES{background:var(--exc-bg);color:var(--exc);border:1px solid var(--exc-bd)}
.c-DRAFT{background:var(--dft-bg);color:var(--dft);border:1px solid var(--dft-bd)}
.td-bec{font-size:11px;color:var(--muted);line-height:1.55;font-style:italic;white-space:pre-line}
.dft-tag{display:inline-block;margin-left:5px;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:700;background:var(--dft-bg);color:var(--dft);border:1px solid var(--dft-bd);font-style:normal;vertical-align:middle}
.edit-ta{width:100%;border:1px solid var(--accent);border-radius:4px;padding:4px 6px;font-size:12px;font-family:inherit;line-height:1.5;resize:vertical;background:#fafeff;min-height:48px}
.edit-ta:focus{outline:none;box-shadow:0 0 0 2px rgba(37,99,235,.15)}
.edit-sel{width:100%;border:1px solid var(--accent);border-radius:4px;padding:3px 6px;font-size:11px;font-weight:700;font-family:inherit;background:#fafeff;cursor:pointer}
.btn-del{margin-top:4px;padding:2px 7px;border-radius:4px;border:1px solid #fca5a5;background:#fef2f2;color:#dc2626;cursor:pointer;font-size:10px;font-weight:700}
.btn-del:hover{background:#fee2e2}
.btn-add-rule{margin-top:6px;padding:5px 12px;border-radius:5px;border:1px dashed var(--accent);background:var(--accent-bg);color:var(--accent);cursor:pointer;font-size:11px;font-weight:600;width:100%}
.btn-add-rule:hover{background:#dbeafe}

/* ── tests table ── */
.tt{width:100%;border-collapse:collapse;background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.05);margin-top:12px}
.tt thead th{padding:8px 12px;background:#f3f4f6;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);border-bottom:2px solid var(--border);text-align:left}
.tt thead th.c-prio{width:80px;text-align:center}.tt thead th.c-tid{width:80px}.tt thead th.c-trig{width:20%}
.tr-tsec td{background:var(--sec-bg);color:var(--sec-fg);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.09em;padding:6px 12px}
.tr-t td{padding:9px 12px;border-bottom:1px solid #f0f0f0;vertical-align:top;font-size:12px;line-height:1.5}
.tr-t:last-child td{border-bottom:none}.tr-t:hover td{background:#fafafa}
.td-tid{font-family:monospace;font-size:11px;font-weight:700;color:var(--muted);white-space:nowrap}
.td-trig{font-family:monospace;font-size:11px;color:#374151;line-height:1.4}
.td-prio{text-align:center;white-space:nowrap}
.prio{display:inline-block;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:700}
.p-CRITICAL{background:var(--crit-bg);color:var(--crit)}
.p-HIGH{background:var(--high-bg);color:var(--high)}
.p-MEDIUM{background:var(--med-bg);color:var(--med)}
.p-LOW{background:var(--low-bg);color:var(--low)}
.priority-bar{display:flex;gap:6px;flex-wrap:wrap;padding:0 24px 12px}
.pf-btn{padding:5px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:12px;font-weight:600;color:var(--muted);transition:all .15s;display:flex;align-items:center;gap:6px}
.pf-btn:hover{border-color:var(--accent);color:var(--accent)}
.pf-btn .pf-count{font-size:11px;font-weight:700;padding:1px 6px;border-radius:10px;background:#f3f4f6;color:var(--muted);transition:all .15s}
.pf-btn.on-CRITICAL{border-color:var(--crit);background:var(--crit-bg);color:var(--crit)}
.pf-btn.on-CRITICAL .pf-count{background:var(--crit);color:#fff}
.pf-btn.on-HIGH{border-color:var(--high);background:var(--high-bg);color:var(--high)}
.pf-btn.on-HIGH .pf-count{background:var(--high);color:#fff}
.pf-btn.on-MEDIUM{border-color:var(--med);background:var(--med-bg);color:var(--med)}
.pf-btn.on-MEDIUM .pf-count{background:var(--med);color:#fff}
.pf-btn.on-LOW{border-color:var(--low);background:var(--low-bg);color:var(--low)}
.pf-btn.on-LOW .pf-count{background:var(--low);color:#fff}
.td-san{font-size:11px;color:var(--muted);white-space:pre-line;line-height:1.5}

/* ── test status (configurator) ── */
.ts-btn{padding:2px 8px;border-radius:3px;border:1px solid var(--border);background:var(--bg);font-size:10px;font-weight:700;cursor:pointer;transition:all .15s}
.ts-btn.pass{background:#f0fdf4;border-color:#86efac;color:#16a34a}
.ts-btn.fail{background:#fef2f2;border-color:#fca5a5;color:#dc2626}
.ts-btn.pending{background:#fefce8;border-color:#fde047;color:#ca8a04}

/* ── configurator ── */
.cfg-layout{display:grid;grid-template-columns:380px 1fr;gap:20px;align-items:start}
@media(max-width:900px){.cfg-layout{grid-template-columns:1fr}}
.cfg-panel{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;position:sticky;top:74px}
.cfg-panel-hdr{padding:12px 16px;background:#f3f4f6;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.cfg-panel-hdr h3{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted)}
.cfg-section{padding:12px 16px;border-bottom:1px solid #f0f0f0}
.cfg-section:last-child{border-bottom:none}
.cfg-section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:10px}
.cfg-item{margin-bottom:10px}
.cfg-item-label{font-size:11px;font-weight:600;color:var(--text);margin-bottom:5px;display:flex;align-items:center;gap:6px}
.cfg-item-id{font-size:10px;font-weight:700;color:var(--accent);background:var(--accent-bg);border:1px solid var(--accent-bd);border-radius:3px;padding:0 4px}
.cfg-opts{display:flex;flex-wrap:wrap;gap:4px}
.cfg-opt{padding:3px 9px;border-radius:12px;border:1px solid var(--border);background:var(--bg);font-size:11px;cursor:pointer;transition:all .15s;color:var(--text)}
.cfg-opt:hover{border-color:var(--accent);color:var(--accent)}
.cfg-opt.sel{background:var(--accent);border-color:var(--accent);color:#fff}
.cfg-name-input{width:100%;padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-size:13px;font-weight:600;background:var(--surface);outline:none}
.cfg-name-input:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(37,99,235,.12)}
.integ-tabs{display:flex;gap:6px;flex-wrap:wrap;padding:14px 24px 0}
.integ-tab{padding:5px 13px;border-radius:16px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:12px;font-weight:600;color:var(--muted);display:flex;align-items:center;gap:5px;transition:all .15s}
.integ-tab:hover{border-color:var(--accent);color:var(--accent)}
.integ-tab.on{background:var(--accent);border-color:var(--accent);color:#fff}
.integ-tab .del-integ{font-size:14px;opacity:.6;line-height:1}.integ-tab .del-integ:hover{opacity:1}
.btn-new-integ{padding:5px 13px;border-radius:16px;border:1px dashed var(--accent);background:var(--accent-bg);cursor:pointer;font-size:12px;font-weight:600;color:var(--accent)}
.btn-new-integ:hover{background:#dbeafe}
.results-panel{display:flex;flex-direction:column;gap:16px}
.result-block{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.result-block-hdr{padding:10px 16px;background:#f3f4f6;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.result-block-hdr h3{font-size:12px;font-weight:700;color:var(--text);display:flex;align-items:center;gap:8px}
.result-count{font-size:11px;font-weight:600;color:var(--muted);background:#e5e7eb;border-radius:10px;padding:1px 7px}
.no-integ{text-align:center;padding:60px 20px;color:var(--muted)}
.no-integ-icon{font-size:40px;margin-bottom:12px}
.progress-bar-wrap{height:6px;background:#e5e7eb;border-radius:3px;overflow:hidden;width:120px}
.progress-bar{height:100%;background:#16a34a;border-radius:3px;transition:width .3s}
.progress-label{font-size:11px;color:var(--muted);margin-left:6px}
.cfg-scroll{max-height:calc(100vh - 140px);overflow-y:auto}

.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty-icon{font-size:36px;margin-bottom:10px}
mark{background:#fef08a;border-radius:2px;padding:0 1px}

/* Integration test checklist */
.itest-section{margin-bottom:0;}
.itest-sec-hdr{display:flex;justify-content:space-between;align-items:center;padding:7px 14px;background:var(--header-bg);color:var(--header-fg);font-weight:600;font-size:12px;letter-spacing:.5px;text-transform:uppercase;position:sticky;top:0;z-index:1;}
.itest-sec-count{font-weight:400;opacity:.8;font-size:11px;}
.itest-row{display:flex;align-items:flex-start;gap:10px;padding:9px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;}
.itest-row:hover{background:var(--hover);}
.itest-pass{background:#f0fdf4 !important;}.itest-pass:hover{background:#dcfce7 !important;}
.itest-check{font-size:15px;min-width:18px;text-align:center;margin-top:1px;}.itest-pass .itest-check{color:#16a34a;}.itest-pending .itest-check{color:#94a3b8;}
.itest-id{font-size:11px;color:var(--muted);min-width:46px;font-family:monospace;margin-top:2px;}
.itest-name{font-size:13px;line-height:1.4;color:var(--fg);}

/* ── Card descriptions ── */
.card-desc{font-size:12px;color:var(--muted);line-height:1.5;margin:4px 0 8px;padding:0 2px;}
.card{cursor:pointer}

/* ── Pillar detail view ── */
.pil-detail{padding:14px 24px 40px;max-width:900px}
.pil-back{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:12px;font-weight:600;color:var(--muted);margin-bottom:16px;transition:all .15s}
.pil-back:hover{border-color:var(--accent);color:var(--accent)}
.pil-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.pil-title{font-size:22px;font-weight:700;color:var(--text)}
.pil-edit-btn{padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:12px;font-weight:600;color:var(--text);transition:all .15s}
.pil-edit-btn:hover{border-color:var(--accent);color:var(--accent)}
.pil-edit-btn.on{background:var(--accent);border-color:var(--accent);color:#fff}
.pil-desc{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:20px;padding:10px 14px;background:#f9fafb;border-radius:8px;border-left:3px solid var(--accent)}
.pil-docs{display:inline-flex;align-items:center;gap:4px;font-size:12px;color:var(--accent);text-decoration:none;margin-bottom:20px}
.pil-docs:hover{text-decoration:underline}
.pil-section{margin-bottom:24px}
.pil-section-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}
.pil-opt{margin-bottom:12px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:8px}
.pil-opt-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:4px}
.pil-opt-desc{font-size:12px;color:var(--muted);line-height:1.5}
.pil-tpl{padding:14px 18px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:8px;font-size:12.5px;line-height:1.65;color:var(--text);white-space:pre-line}
.pil-tpl-line{padding:2px 0}
.pil-tpl-bullet{padding:2px 0 2px 10px;border-left:2px solid #e2e8f0}
.pil-tpl-heading{font-weight:700;color:var(--accent);margin-top:8px;margin-bottom:2px}
.pil-tpl-empty{color:var(--muted);font-style:italic;padding:20px;text-align:center}
.pil-related{margin-top:6px}
.pil-rule-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:12px;border:1px solid var(--border);background:var(--bg);font-size:11px;color:var(--muted);margin:3px 3px 3px 0;cursor:default}
.pil-rule-chip .cp{padding:2px 5px;font-size:9px}
.pil-edit-area{width:100%;border:1px solid var(--accent);border-radius:6px;padding:8px 10px;font-size:12.5px;font-family:inherit;line-height:1.55;resize:vertical;background:#fafeff;min-height:60px}
.pil-edit-area:focus{outline:none;box-shadow:0 0 0 2px rgba(37,99,235,.15)}
.pil-edit-small{width:100%;border:1px solid var(--accent);border-radius:4px;padding:5px 8px;font-size:12px;font-family:inherit;background:#fafeff}
.pil-edit-small:focus{outline:none;box-shadow:0 0 0 2px rgba(37,99,235,.15)}
.pil-save-bar{position:sticky;bottom:0;background:var(--surface);border-top:1px solid var(--border);padding:10px 0;display:flex;gap:8px;align-items:center;z-index:10}
.pil-save-btn{padding:6px 16px;border-radius:6px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-size:12px;font-weight:600;transition:all .15s}
.pil-save-btn:hover{background:#1d4ed8}
.pil-cancel-btn{padding:6px 16px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--muted);cursor:pointer;font-size:12px;font-weight:600}
.pil-saved-msg{font-size:11px;color:#16a34a;font-weight:600;margin-left:8px}

/* ── Condition builder (rule editing) ── */
.cond-builder{display:flex;flex-direction:column;gap:4px}
.cond-row{display:flex;gap:4px;align-items:center;flex-wrap:wrap}
.cond-sel{border:1px solid var(--accent);border-radius:4px;padding:3px 6px;font-size:11px;font-family:inherit;background:#fafeff;cursor:pointer}
.cond-sel:focus{outline:none;box-shadow:0 0 0 2px rgba(37,99,235,.15)}
.cond-and{font-size:10px;font-weight:700;color:var(--muted);padding:1px 6px}
.cond-free{flex:1;border:1px solid var(--accent);border-radius:4px;padding:3px 6px;font-size:11px;font-family:inherit;background:#fafeff;min-width:120px}
.cond-free:focus{outline:none;box-shadow:0 0 0 2px rgba(37,99,235,.15)}
.cond-del{border:none;background:none;color:#dc2626;cursor:pointer;font-size:14px;padding:0 3px;line-height:1}
.cond-add{border:1px dashed var(--accent);background:var(--accent-bg);color:var(--accent);border-radius:4px;padding:3px 8px;font-size:10px;cursor:pointer;font-weight:600}
.cond-add:hover{background:#dbeafe}

/* ── Language toggle ── */
.lang-toggle{display:flex;gap:0;border:1px solid var(--border);border-radius:6px;overflow:hidden;margin-left:auto}
.lang-btn{padding:5px 12px;border:none;background:var(--bg);cursor:pointer;font-size:11px;font-weight:700;color:var(--muted);transition:all .15s}
.lang-btn:not(:last-child){border-right:1px solid var(--border)}
.lang-btn.on{background:var(--accent);color:#fff}
.card-docs-link{display:inline-block;font-size:11px;color:var(--dec-color);text-decoration:none;margin-bottom:8px;}
.card-docs-link:hover{text-decoration:underline;}
.opts-with-desc{display:flex;flex-direction:column;gap:4px;margin-top:4px;}
.opt-row{display:flex;flex-direction:column;gap:2px;}
.opt-desc{font-size:11px;color:var(--muted);line-height:1.4;padding:2px 6px 4px 6px;border-left:2px solid var(--border);}

/* ── Tests view toggle ── */
.tests-view-toggle{display:flex;gap:8px;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--bg);}
.tvt-btn{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--bg);color:var(--muted);font-size:13px;cursor:pointer;transition:all .15s;}
.tvt-btn.on{background:var(--accent);color:#fff;border-color:var(--accent);}
.tvt-btn:hover:not(.on){background:var(--hover);}

/* ── Guidelines tab ── */
.guidelines-wrap{display:flex;height:calc(100vh - 110px);overflow:hidden;}
.guidelines-nav{width:220px;min-width:220px;border-right:1px solid var(--border);padding:16px 0;display:flex;flex-direction:column;gap:4px;background:var(--sidebar);}
.g-tab-btn{text-align:left;padding:10px 16px;border:none;background:none;cursor:pointer;font-size:13px;color:var(--fg);border-radius:0;transition:background .15s;}
.g-tab-btn.on{background:var(--hover);font-weight:600;color:var(--accent);border-left:3px solid var(--accent);}
.g-tab-btn:hover:not(.on){background:var(--hover);}
.guidelines-body{flex:1;overflow-y:auto;padding:32px 40px;max-width:760px;}
.g-title{font-size:22px;font-weight:700;color:var(--fg);margin:0 0 8px;}
.g-intro{font-size:14px;color:var(--muted);line-height:1.6;margin:0 0 24px;padding:12px 16px;background:var(--hover);border-radius:8px;border-left:3px solid var(--accent);}
.g-section{margin-bottom:24px;}
.g-section-title{font-size:15px;font-weight:600;color:var(--fg);margin:0 0 8px;padding-bottom:6px;border-bottom:1px solid var(--border);}
.g-section-body{font-size:13px;color:var(--fg);line-height:1.6;}
.g-bullet{padding:3px 0 3px 8px;border-left:2px solid var(--border);}
.g-para{margin:4px 0;}

/* ── Integration tests in tests tab ── */
.sec-hdr-row{background:var(--header-bg);color:var(--header-fg);font-weight:600;font-size:12px;padding:6px 12px;letter-spacing:.4px;}
</style>
</head>

<script id="kb-data" type="application/json">{"decisions":[{"id":"1.0","category":"Events data","options":["API menta","External API","Manual upload"],"description":"How menta receives your event data to enable secondary market sales. Defines the sync mechanism between the partner platform and menta.","optionDescriptions":{"API menta":"Recommended. Your backend pushes CREATE/UPDATE directly to menta in real time. Scalable, requires sending notifications from your backend.","External API":"menta polls your platform periodically (pull). Easy to adopt if you already have an event feed, but data may lag between polls.","Manual upload":"For pilots or low-volume cases. Events are loaded without APIs. Not scalable for production."},"docs":"https://docs.mentatech.io/es/guides/eventData","category_en":"Events Data","category_es":"Datos de Eventos","description_en":"How menta receives your event data to enable secondary market sales. Defines the sync mechanism between the partner platform and menta.","description_es":"Cómo menta recibe los datos de eventos para habilitar ventas en el mercado secundario. Define el mecanismo de sincronización entre la plataforma del partner y menta."},{"id":"2.0","category":"Ticket data","options":["API menta (Only resellers)","GetUserData()"],"description":"How menta receives ticket data for users who want to resell. Only users who opt into resale are shared — not the full inventory.","optionDescriptions":{"API menta (Only resellers)":"Your platform sends via POST the tickets of users who want to sell. Only opt-in tickets are shared; no hashing required.","GetUserData()":"Your platform exposes an endpoint that menta queries when it needs to verify a specific user's tickets (pull model). Always reflects real-time state."},"docs":"https://docs.mentatech.io/es/guides/ticketSync","category_en":"Ticket Data","category_es":"Datos de Tickets","description_en":"How menta receives ticket data for users who want to resell. Only users who opt into resale are shared — not the full inventory.","description_es":"Cómo menta recibe los datos de tickets de usuarios que quieren revender. Solo se comparten los usuarios que optan por la reventa — no el inventario completo."},{"id":"4.0","category":"Market Making — Inventory","options":["API menta (Live)","External API (Deferred)","Nothing"],"description":"Whether and how the partner shares primary sales inventory data (capacity, sold-out status, occupancy) with menta. This data enables sold-out behaviors, marketplace signals, and demand-driven features.","optionDescriptions":{"API menta (Live)":"The partner sends real-time inventory updates via PUT /v1/marketdata. Two endpoints available: event-level update (complete inventory of an event/show) and granular/batch update (by ticketOption, priceType, or combination). Most accurate — always reflects current state.","External API (Deferred)":"menta polls the partner's endpoint periodically. Data may be stale between polling intervals. All actions dependent on this data (sold-out %, availability, demand metrics) are limited to the polling frequency.","Nothing":"No inventory data is shared. menta operates without primary sales context. Sold-out detection, marketplace signals, and demand-driven features are not available or rely on manual configuration."},"docs":"https://docs.mentatech.io/es/guides/inventory","category_en":"Market Making — Inventory","category_es":"Market Making — Inventario","description_en":"Whether and how the partner shares primary sales inventory data (capacity, sold-out status, occupancy) with menta. This data enables sold-out behaviors, marketplace signals, and demand-driven features.","description_es":"Si el partner comparte datos de inventario de ventas primarias (capacidad, estado sold-out, ocupación) con menta y cómo lo hace. Estos datos habilitan comportamientos de sold-out, señales del marketplace y funcionalidades basadas en demanda."},{"id":"4.1","category":"Market Making — Ticket Leads","options":["Ticket Holders","Abandoned Cart","Virtual Queue","Wishlist","N/A"],"description":"Which types of user data the partner shares with menta to feed demand generation engines. Multiple lead types can be selected. Ticket Leads help menta identify potential sellers and buyers for the secondary market.","optionDescriptions":{"Ticket Holders":"Users who purchased a ticket — potential resale sellers. Required: event/show IDs, ticketId, buyer identifier, price, currency. Sent via POST /v1/marketdata/ticket-leads (individual) or /bulk (up to 1000 per request).","Abandoned Cart":"Users who started a primary purchase but didn't complete — potential resale buyers. Required: event/show IDs, buyer identifier. Optional: price, ticketId, ticketOptionId.","Virtual Queue":"Users who were in the virtual queue but didn't purchase — showed real-time interest. Required: event/show IDs, buyer identifier. Optional: queue metadata (position, wait time, exit reason).","Wishlist":"Users who subscribed for availability notifications — highest quality lead, explicit opt-in. Required: event/show IDs, buyer identifier. Optional: ticketOptionId, preference metadata.","N/A":"No ticket lead data is shared. menta operates without demand-side intelligence. Demand generation, buyer matching, and proactive notifications are not available."},"docs":"https://docs.mentatech.io/es/guides/marketdata","category_en":"Market Making — Ticket Leads","category_es":"Market Making — Ticket Leads","description_en":"Which types of user data the partner shares with menta to feed demand generation engines. Multiple lead types can be selected. Ticket Leads help menta identify potential sellers and buyers for the secondary market.","description_es":"Qué tipos de datos de usuarios comparte el partner con menta para alimentar los motores de generación de demanda. Se pueden seleccionar múltiples tipos de leads. Los Ticket Leads ayudan a menta a identificar potenciales vendedores y compradores para el mercado secundario."},{"id":"5.0","category":"Access to sell","options":["API menta (SAL)","Generic URL (Login Trust)","Static URL","N/A"],"description":"How users enter the resale listing flow from \"My Tickets\" in the partner platform. Three options with increasing integration depth: Static URL (zero integration), Generic URL (API call + Login Trust), SAL (full per-ticket embedding).","optionDescriptions":{"API menta (SAL)":"Smart Access Layer (recommended). Your backend queries the SAL endpoint with the user's ticketIds and receives status + CTA URLs per ticket. CTAs embedded directly in the partner's per-ticket view. Enables contextual sell buttons. Requires a per-ticket interface (ticket details screen).","Generic URL (Login Trust)":"Partner generates a per-user tokenized URL via menta API. User clicks the URL and arrives at menta's Ticket Management pre-authenticated (Login Trust). Used when SAL is excluded (e.g., tickets grouped by order) but the partner can make backend API calls. Same Ticket Management experience as Static URL, but without OTP friction.","Static URL":"A single fixed \"Sell tickets\" link redirects all users to a generic menta page. User authenticates via menta OTP, then lands in Ticket Management. Minimal integration, good for pilots. No per-ticket context in the partner UI.","N/A":"No sell access configured."},"docs":"https://docs.mentatech.io/es/guides/accessToSell-into","category_en":"Access to Sell","category_es":"Acceso a Vender","description_en":"How users enter the resale listing flow from \"My Tickets\" in the partner platform. Three options with increasing integration depth: Static URL (zero integration), Generic URL (API call + Login Trust), SAL (full per-ticket embedding).","description_es":"Cómo los usuarios ingresan al flujo de publicación de reventa desde \"Mis Tickets\" en la plataforma del partner. Tres opciones con profundidad de integración creciente: Static URL (cero integración), Generic URL (llamada API + Login Trust), SAL (embebido completo por ticket)."},{"id":"6.0","category":"Access to buy","options":["API menta (SAL)","Static URL","N/A"],"description":"How resale inventory is surfaced on event pages and how users enter the buy flow in the marketplace.","optionDescriptions":{"API menta (SAL)":"Embedded components via SAL. The resale marketplace integrates directly in your event page with real-time state.","Static URL":"Static link to the menta marketplace. No deep UI integration.","N/A":"No buy access configured."},"docs":"https://docs.mentatech.io/es/guides/accessToBuy","category_en":"Access to Buy","category_es":"Acceso a Comprar","description_en":"How resale inventory is surfaced on event pages and how users enter the buy flow in the marketplace.","description_es":"Cómo se muestra el inventario de reventa en las páginas de eventos y cómo los usuarios ingresan al flujo de compra en el marketplace."},{"id":"7.0","category":"Price info structure","options":["Simple price detail","Advanced price detail","Standard"],"description":"How price categories and types are structured in the platform. Defines pricing rule granularity in menta.","optionDescriptions":{"Standard":"Standard structure with ticketOptionId but no specific price detail breakdown.","Simple price detail":"Each ticketOption encodes the full pricing context — for example by concatenating orthogonal dimensions like tier and product — and carries its own face value. No separate priceType axis is required. This is the **preferred default** when the partner's pricing dimensions can be collapsed into a single composite key. One ticketOption is created per unique combination (e.g. area × tier × product) with its own face value. No rules-endpoint combination definition is required.","Advanced price detail":"Use **only** when multiple priceTypes genuinely apply to the **same** ticketOption — i.e. same category/same access but different buyer segments (for example adult/child with different fees, or early bird/phase 1/phase 2 where face value resolves on a different axis). Requires the partner to send ticketOptions and priceTypes separately and define valid combinations via POST /v1/events/rules. If the dimensions can be concatenated into the ticketOption without ambiguity, use Simple Price Detail instead."},"category_en":"Price Info Structure","category_es":"Estructura de Precios","description_en":"How price categories and types are structured in the platform. Defines pricing rule granularity in menta.","description_es":"Cómo se estructuran las categorías y tipos de precio en la plataforma. Define la granularidad de las reglas de precio en menta.","optionDescriptions_es":{"Simple price detail":"Cada ticketOption encapsula el contexto de pricing completo — por ejemplo, concatenando dimensiones ortogonales como tier y producto — y lleva su propio face value. No se requiere un eje priceType separado. Es el modelo **preferido por defecto** cuando las dimensiones de pricing del partner se pueden colapsar en una sola clave compuesta. Para cada combinación única (ej. área × tier × producto) se crea un ticketOption con su face value correspondiente. No requiere definir combinaciones vía el endpoint de rules.","Advanced price detail":"Usar **solamente** cuando múltiples priceTypes genuinamente aplican a la **misma** ticketOption — es decir, misma categoría/mismo acceso pero diferentes segmentos de comprador (por ejemplo, adulto/niño con fees distintos, o early bird/phase 1/phase 2 donde el face value se resuelve en otra dimensión). Requiere que el partner envíe ticketOptions y priceTypes por separado y defina las combinaciones válidas vía POST /v1/events/rules. Si las dimensiones pueden concatenarse en el ticketOption sin ambigüedad, usar Simple Price Detail en su lugar.","Standard":"Standard structure with ticketOptionId but no specific price detail breakdown."}},{"id":"8.0","category":"Auth","options":["Login Trust","Login Force","Menta Auth"],"description":"How menta identifies the user during resale interactions. Options are not mutually exclusive — most integrations use Login Trust + Login Force together.","optionDescriptions":{"Login Trust":"The partner tells menta who the authenticated user is when generating the sell/buy URL. Seamless experience — no re-login required.","Login Force":"Ensures all resale buyers have an account on the platform. Unauthenticated users are redirected to login before proceeding.","Menta Auth":"OTP via menta. For platforms without user accounts or that cannot share authenticated identity. Adds more friction for the user."},"docs":"https://docs.mentatech.io/es/guides/auth","category_en":"Authentication","category_es":"Autenticación","description_en":"How menta identifies the user during resale interactions. Options are not mutually exclusive — most integrations use Login Trust + Login Force together.","description_es":"Cómo menta identifica al usuario durante las interacciones de reventa. Las opciones no son mutuamente excluyentes — la mayoría de las integraciones usan Login Trust + Login Force juntos."},{"id":"10.0","category":"Devoluciones, cancelaciones y contracargos","options":["Desliste automático de listados","Excluir vendidos de cancelación","Cancelar todo — proteger comprador","Cancelar todo — reversión completa","Gestión manual caso a caso","Contracargo: notificación automática","Contracargo: notificación manual"],"description":"Cómo se gestionan las devoluciones, cancelaciones y contracargos de compras primarias cuando impactan el mercado secundario. Cubre: qué sucede con tickets listados (Sub A), qué sucede con tickets ya vendidos (Sub B), y gestión de contracargos (Sub D). Nota: las compras en el mercado secundario son finales — no se aceptan devoluciones excepto por cancelación o reprogramación del evento. menta siempre retiene sus comisiones.","optionDescriptions":{"Desliste automático de listados":"[Sub A — siempre aplica] Cuando la ticketera cancela la orden, menta desactiva automáticamente las publicaciones activas de esos tickets. Requiere que la ticketera notifique la cancelación a menta.","Excluir vendidos de cancelación":"[Sub B] La ticketera NO cancela los tickets ya vendidos. Solo cancela los disponibles y listados. El comprador de reventa mantiene su ticket. El vendedor recibe payout por el vendido y reembolso por los demás. Requiere PREC cancelación parcial + detección automática.","Cancelar todo — proteger comprador":"[Sub B] La ticketera cancela toda la orden (no puede hacer parcial). El ticket del comprador de reventa se mantiene válido. Se anula el payout del vendedor. Pre-payout: el valor se reparte según contrato. Post-payout: la ticketera absorbe el costo.","Cancelar todo — reversión completa":"[Sub B] Se cancela todo incluyendo el ticket del comprador de reventa. El comprador recibe reembolso. Escenario de último recurso — genera fricción máxima.","Gestión manual caso a caso":"[Sub B] No hay automatización. El equipo de soporte evalúa cada caso individualmente. Viable solo para volúmenes bajos.","Contracargo: notificación automática":"[Sub D] La ticketera marca tickets como anulados/contracargueados en su sistema y esa acción fluye a menta automáticamente. menta deslista publicaciones y anula payouts pendientes. Post-payout: pérdida de la ticketera.","Contracargo: notificación manual":"[Sub D] La ticketera informa a menta manualmente sobre contracargos. menta ejecuta las acciones correspondientes. No escalable para volúmenes altos."},"category_en":"Refunds, Cancellations & Chargebacks","category_es":"Devoluciones, Cancelaciones y Contracargos","description_en":"How refunds, cancellations, and chargebacks from primary purchases are handled when they impact the secondary market. Covers: what happens with listed tickets (Sub A), what happens with already-sold tickets (Sub B), and chargeback management (Sub D). Note: secondary market purchases are final — no refunds except for event cancellation or rescheduling. menta always retains its commissions.","description_es":"Cómo se gestionan las devoluciones, cancelaciones y contracargos de compras primarias cuando impactan el mercado secundario. Cubre: qué sucede con tickets listados (Sub A), qué sucede con tickets ya vendidos (Sub B), y gestión de contracargos (Sub D). Nota: las compras en el mercado secundario son finales — no se aceptan devoluciones excepto por cancelación o reprogramación del evento. menta siempre retiene sus comisiones."},{"id":"11.0","category":"Event Activation","options":["All events","Selected events","N/A"],"description":"Which partner events are activated for the menta secondary market.","optionDescriptions":{"All events":"All partner events are automatically enabled for resale.","Selected events":"Only events specifically selected and activated in the menta dashboard.","N/A":"No event activation configured."},"category_en":"Event Activation","category_es":"Activación de Eventos","description_en":"Which partner events are activated for the menta secondary market.","description_es":"Qué eventos del partner se activan para el mercado secundario de menta."}],"preconditions":[{"id":"1.0","category":"Visualización de tickets","options":["Agrupados por orden","Interfaz ticket details","Ninguna interfaz","Tickets individuales"],"description":"Cómo muestra la plataforma los tickets al usuario en la sección 'Mis Tickets'. Determina qué interfaces de gestión de reventa son necesarias.","optionDescriptions":{"Agrupados por orden":"Los tickets se muestran agrupados por orden de compra, no individualmente. Requiere Ticket Management para gestión individual en reventa.","Interfaz ticket details":"La plataforma tiene una pantalla dedicada de detalle por ticket donde se integran los CTAs de reventa.","Ninguna interfaz":"No hay interfaz de tickets. Los CTAs de reventa deben construirse desde cero o usar URL estática.","Tickets individuales":"Cada ticket se muestra como ítem independiente. Integración directa de CTAs via SAL."},"category_en":"Ticket Visualization","category_es":"Visualización de Tickets","description_en":"How the platform displays tickets to the user in the 'My Tickets' section. Determines which resale management interfaces are needed.","description_es":"Cómo muestra la plataforma los tickets al usuario en la sección 'Mis Tickets'. Determina qué interfaces de gestión de reventa son necesarias.","options_en":["Grouped by order","Ticket details interface","No interface","Individual tickets"],"optionDescriptions_en":{"Agrupados por orden":"Tickets are displayed grouped by purchase order, not individually. Requires Ticket Management for individual ticket resale management.","Interfaz ticket details":"The platform has a dedicated per-ticket detail screen where resale CTAs can be integrated.","Ninguna interfaz":"No ticket interface exists. Resale CTAs must be built from scratch or use a static URL.","Tickets individuales":"Each ticket is displayed as an independent item. Direct CTA integration via SAL is possible."}},{"id":"2.0","category":"Protección/Tecnología","options":["Qr lock","Qr delay (Diferido)","Qr dinámico","Código de Barras","QR Estático","Ninguna"],"description":"Mecanismo de protección del QR que usa la plataforma para evitar fraude y duplicación. Determina el comportamiento del Change Ticket Owner y el proceso de desbloqueo.","optionDescriptions":{"Qr lock":"El QR está bloqueado hasta el horario de desbloqueo configurado. No visible para el usuario antes del evento.","Qr delay (Diferido)":"El QR se vuelve válido con un delay después del primer escaneo. Protección contra capturas de pantalla.","Qr dinámico":"El QR rota periódicamente (cada pocos segundos). La protección más robusta contra fraude.","Código de Barras":"Código de barras estático. Sin protección dinámica. Menor seguridad.","QR Estático":"QR fijo sin rotación. Fácil de copiar o compartir.","Ninguna":"Sin protección de QR. Mayor riesgo de fraude post-venta en reventa."},"category_en":"QR Protection","category_es":"Protección de QR","description_en":"QR protection mechanism used by the platform to prevent fraud and duplication. Determines Change Ticket Owner behavior and the unlock process.","description_es":"Mecanismo de protección del QR que usa la plataforma para evitar fraude y duplicación. Determina el comportamiento del Change Ticket Owner y el proceso de desbloqueo.","options_en":["QR Lock","QR Delay (Deferred)","Dynamic QR","Barcode","Static QR","None"],"optionDescriptions_en":{"Qr lock":"QR is locked until the configured unlock time. Not visible to the user before the event.","Qr delay (Diferido)":"QR becomes valid with a delay after the first scan. Protection against screenshots.","Qr dinámico":"QR rotates periodically (every few seconds). The most robust fraud protection.","Código de Barras":"Static barcode. No dynamic protection. Lower security.","QR Estático":"Fixed QR without rotation. Easy to copy or share.","Ninguna":"No QR protection. Higher risk of post-sale fraud in resale."}},{"id":"3.0","category":"QR ticket delivery","options":["Link a QR en el mail","PDF en el mail","Un pdf por ticket","QR en el body","Add to wallet","App Móvil Propia"],"description":"Cómo entrega la plataforma el QR/ticket al comprador. Afecta directamente el flujo de Change Ticket Owner (cambio de titular) y la seguridad post-venta.","optionDescriptions":{"Link a QR en el mail":"El mail incluye un link que abre el QR. Change Ticket Owner requiere revocar o redirigir el link al nuevo titular.","PDF en el mail":"El ticket llega como adjunto PDF. Change Ticket Owner requiere reenviar un nuevo PDF al comprador de reventa.","Un pdf por ticket":"PDF individual por ticket. Mayor granularidad para el Change Ticket Owner ticket por ticket.","QR en el body":"QR embebido directamente en el cuerpo del mail. Mayor riesgo: el vendedor retiene el QR en su historial.","Add to wallet":"Integración con Apple/Google Wallet. Change Ticket Owner requiere actualizar la Wallet Pass al nuevo titular.","App Móvil Propia":"El QR solo es accesible via la app del partner. Change Ticket Owner actualiza el estado del ticket en la app."},"category_en":"QR Ticket Delivery","category_es":"Entrega de QR/Ticket","description_en":"How the platform delivers the QR/ticket to the buyer. Directly affects the Change Ticket Owner flow and post-sale security.","description_es":"Cómo entrega la plataforma el QR/ticket al comprador. Afecta directamente el flujo de Change Ticket Owner y la seguridad post-venta.","options_en":["Link to QR in email","PDF in email","One PDF per ticket","QR in email body","Add to wallet","Proprietary mobile app"],"optionDescriptions_en":{"Link a QR en el mail":"The email includes a link that opens the QR. Change Ticket Owner requires revoking or redirecting the link to the new owner.","PDF en el mail":"Ticket arrives as a PDF attachment. Change Ticket Owner requires sending a new PDF to the resale buyer.","Un pdf por ticket":"Individual PDF per ticket. Greater granularity for per-ticket Change Ticket Owner.","QR en el body":"QR embedded directly in the email body. Higher risk: seller retains the QR in their email history.","Add to wallet":"Apple/Google Wallet integration. Change Ticket Owner requires updating the Wallet Pass to the new owner.","App Móvil Propia":"QR only accessible via the partner's app. Change Ticket Owner updates the ticket status in the app."}},{"id":"4.0","category":"Estructura de precios","options":["Only category","Category w/ 1 price","Category w/ >1 price"],"description":"Cómo están estructuradas las categorías y precios en la plataforma. Define qué tan detallada debe ser la configuración de reglas de precio en menta.","optionDescriptions":{"Only category":"Solo hay categorías sin distinción de tipos de precio. Reglas configuradas a nivel categoría.","Category w/ 1 price":"Una categoría tiene un único precio. Estructura simple y directa.","Category w/ >1 price":"Una categoría puede tener múltiples variantes de precio (Early bird, Regular, VIP). Requiere priceTypeId y permite reglas por precio."},"category_en":"Price Structure","category_es":"Estructura de Precios","description_en":"How categories and prices are structured in the platform. Defines how detailed the price rule configuration in menta needs to be.","description_es":"Cómo están estructuradas las categorías y precios en la plataforma. Define qué tan detallada debe ser la configuración de reglas de precio en menta.","options_en":["Only category","Category with 1 price","Category with >1 price"],"optionDescriptions_en":{"Only category":"Only categories exist without price type distinctions. Rules configured at category level.","Category w/ 1 price":"A category has a single price. Simple and direct structure.","Category w/ >1 price":"A category can have multiple price variants (Early bird, Regular, VIP). Requires priceTypeId and allows per-price rules."}},{"id":"5.0","category":"Will call / Retiro","options":["Yes (con order id)","No","Retiro físico obligatorio"],"description":"Si la plataforma ofrece retiro físico de tickets en taquilla. El comprador de reventa necesita recibir un código de retiro válido.","optionDescriptions":{"Yes (con order id)":"Hay will call identificado por ID de orden. menta debe asociar el orderId correcto al comprador de reventa.","No":"No hay retiro físico. Entrega digital únicamente.","Retiro físico obligatorio":"Todo ticket debe retirarse físicamente. Impacta el flujo de entrega post-Change Ticket Owner."},"category_en":"Will Call / Pickup","category_es":"Will Call / Retiro","description_en":"Whether the platform offers physical ticket pickup at the box office. The resale buyer needs to receive a valid pickup code.","description_es":"Si la plataforma ofrece retiro físico de tickets en taquilla. El comprador de reventa necesita recibir un código de retiro válido.","options_en":["Yes (with order ID)","No","Mandatory physical pickup"],"optionDescriptions_en":{"Yes (con order id)":"Will call identified by order ID. menta must associate the correct orderId to the resale buyer.","No":"No physical pickup. Digital delivery only.","Retiro físico obligatorio":"All tickets must be physically picked up. Impacts post-Change Ticket Owner delivery flow."}},{"id":"6.0","category":"Transfer/share","options":["Transfer (Cambio Titular)","Share (Compartir)","Transfer accepted","Regenerate QR","No regen QR","Transferencia No Permitida"],"description":"Capacidades de transferencia y compartición de tickets de la plataforma. Define qué restricciones aplican sobre tickets publicados en reventa.","optionDescriptions":{"Transfer (Cambio Titular)":"Transferencia completa de propiedad. Cambia el dueño registrado del ticket.","Share (Compartir)":"Compartir acceso sin transferir propiedad. El ticket sigue siendo del comprador original.","Transfer accepted":"La transferencia requiere aceptación explícita del receptor antes de completarse.","Regenerate QR":"Al transferir, se genera un nuevo QR para el receptor. El original queda inválido.","No regen QR":"El QR no se regenera al transferir. Riesgo de que el vendedor retenga acceso.","Transferencia No Permitida":"No se pueden transferir tickets. Simplifica el Change Ticket Owner al eliminar conflictos de propiedad."},"category_en":"Transfer / Share","category_es":"Transferencia / Compartir","description_en":"Ticket transfer and sharing capabilities of the platform. Defines what restrictions apply to tickets listed for resale.","description_es":"Capacidades de transferencia y compartición de tickets de la plataforma. Define qué restricciones aplican sobre tickets publicados en reventa.","options_en":["Transfer (Ownership change)","Share (No ownership change)","Transfer requires acceptance","Regenerate QR","No QR regeneration","Transfer not allowed"],"optionDescriptions_en":{"Transfer (Cambio Titular)":"Full ownership transfer. Changes the registered owner of the ticket.","Share (Compartir)":"Sharing access without transferring ownership. The ticket remains with the original buyer.","Transfer accepted":"Transfer requires explicit acceptance from the recipient before completion.","Regenerate QR":"On transfer, a new QR is generated for the recipient. The original becomes invalid.","No regen QR":"QR is not regenerated on transfer. Risk that the seller retains access.","Transferencia No Permitida":"Tickets cannot be transferred. Simplifies Change Ticket Owner by eliminating ownership conflicts."}},{"id":"7.0","category":"Nominación","options":["Yes (Estricta)","No (Solo comprador)"],"description":"Si los tickets están nominados: atados a la identidad del portador para el control de acceso en la puerta del evento.","optionDescriptions":{"Yes (Estricta)":"Nominación estricta, se verifica identidad en la puerta. El comprador de reventa debe nominar el ticket a su nombre antes del evento.","No (Solo comprador)":"Solo el comprador original está registrado, no se verifica identidad en el acceso."},"category_en":"Ticket Nomination","category_es":"Nominación","description_en":"Whether tickets are nominated: tied to the bearer's identity for access control at the event gate.","description_es":"Si los tickets están nominados: atados a la identidad del portador para el control de acceso en la puerta del evento.","options_en":["Yes (Strict)","No (Buyer only)"],"optionDescriptions_en":{"Yes (Estricta)":"Strict nomination — identity is verified at the gate. The resale buyer must nominate the ticket in their name before the event.","No (Solo comprador)":"Only the original buyer is registered. Identity is not verified at access."}},{"id":"8.0","category":"Auth methodology","options":["Account & Login","Checkout Guest","Valida Email antes","No valida Email"],"description":"Cómo maneja la plataforma la autenticación de usuarios en el flujo de compra primaria. Determina cómo debe configurarse Login Force para la reventa.","optionDescriptions":{"Account & Login":"Flujo estándar de cuenta y login. Login Force puede integrarse directamente.","Checkout Guest":"Se puede comprar sin crear cuenta. Login Force debe forzar creación de cuenta o login antes de la reventa.","Valida Email antes":"Se valida el email antes de completar la compra.","No valida Email":"Sin validación de email. Mayor riesgo de identidades inválidas en la reventa."},"category_en":"Auth Methodology","category_es":"Metodología de Autenticación","description_en":"How the platform handles user authentication in the primary purchase flow. Determines how Login Force should be configured for resale.","description_es":"Cómo maneja la plataforma la autenticación de usuarios en el flujo de compra primaria. Determina cómo debe configurarse Login Force para la reventa.","options_en":["Account & Login","Guest checkout","Validates email first","Does not validate email"],"optionDescriptions_en":{"Account & Login":"Standard account and login flow. Login Force can be directly integrated.","Checkout Guest":"Purchases can be made without creating an account. Login Force must force account creation or login before resale.","Valida Email antes":"Email is validated before completing the purchase.","No valida Email":"No email validation. Higher risk of invalid identities in resale."}},{"id":"9.0","category":"Auth Data","options":["Phone number","Email"],"description":"Identificador principal del usuario en la plataforma. Define cómo menta identifica al usuario y cómo se envían comunicaciones transaccionales.","optionDescriptions":{"Phone number":"El teléfono es el identificador principal. Se usa como alias en el campo buyerEmail y se requiere soporte para OTP si es necesario.","Email":"El email es el identificador principal. Integración estándar con todos los flujos de menta."},"category_en":"Auth Data","category_es":"Datos de Autenticación","description_en":"The user's primary identifier on the platform. Defines how menta identifies the user and how transactional communications are sent.","description_es":"Identificador principal del usuario en la plataforma. Define cómo menta identifica al usuario y cómo se envían comunicaciones transaccionales.","options_en":["Phone number","Email"],"optionDescriptions_en":{"Phone number":"Phone is the primary identifier. Used as alias in the buyerEmail field; OTP support required if needed.","Email":"Email is the primary identifier. Standard integration with all menta flows."}},{"id":"10.0","category":"Change Ticket Owner","options":["Solo identificador (email)","Cuenta guest suficiente","Cuenta completa obligatoria"],"description":"Qué nivel de cuenta requiere el Change Ticket Owner (CTO) para ejecutar la transferencia del ticket al comprador.","optionDescriptions":{"Solo identificador (email)":"El CTO acepta directamente un identificador (email) sin necesidad de que exista un usuario en la plataforma. menta pasa el email del comprador y el partner ejecuta el CTO. No se requiere ninguna acción de creación de cuenta.","Cuenta guest suficiente":"El CTO requiere que exista al menos un registro de usuario (guest) en la plataforma. El partner crea programáticamente la cuenta guest al recibir el webhook de reventa completada, y luego ejecuta el CTO. El comprador no ve ningún redirect ni login.","Cuenta completa obligatoria":"El CTO requiere una cuenta completa con registro y login previo. Requiere Login Force: menta redirige al comprador a la plataforma del partner para autenticarse antes de completar la compra."},"category_en":"Change Ticket Owner","category_es":"Cambio de Titular","description_en":"What level of account does the Change Ticket Owner (CTO) require to execute the ticket transfer to the buyer.","description_es":"Qué nivel de cuenta requiere el Change Ticket Owner (CTO) para ejecutar la transferencia del ticket al comprador.","options_en":["Requires account (Mandatory)","Does not require account (Guest)"],"optionDescriptions_en":{"Solo identificador (email)":"CTO accepts an identifier (email) directly without requiring a user record on the platform. menta passes the buyer email and the partner executes CTO. No account creation needed.","Cuenta guest suficiente":"CTO requires at least a guest user record on the platform. The partner programmatically creates the guest account upon receiving the completed resale webhook, then executes CTO. The buyer sees no redirect or login.","Cuenta completa obligatoria":"CTO requires a full account with prior registration and login. Requires Login Force: menta redirects the buyer to the partner platform to authenticate before completing the purchase."}},{"id":"10.2","category":"Change Ticket Owner — QR","options":["Regenerates QR code","Doesnt regenerate QR","Only on front"],"description":"Si la plataforma regenera el QR del ticket al ejecutar el Change Ticket Owner. Determina el nivel de seguridad post-venta para el vendedor y el comprador.","optionDescriptions":{"Regenerates QR code":"Se genera un nuevo QR único para el comprador de reventa. El QR del vendedor queda inválido. Opción más segura.","Doesnt regenerate QR":"El QR original sigue siendo válido. Riesgo de que el vendedor pueda retener acceso al evento.","Only on front":"Solo se actualiza visualmente en el frontend, sin invalidar el QR original en el sistema de acceso."},"category_en":"Change Ticket Owner — QR","category_es":"Cambio de Titular — QR","description_en":"Whether the platform regenerates the ticket's QR when executing the Change Ticket Owner. Determines the post-sale security level for seller and buyer.","description_es":"Si la plataforma regenera el QR del ticket al ejecutar el Change Ticket Owner. Determina el nivel de seguridad post-venta para el vendedor y el comprador.","options_en":["Regenerates QR code","Does not regenerate QR","Only on frontend"],"optionDescriptions_en":{"Regenerates QR code":"A new unique QR is generated for the resale buyer. The seller's QR becomes invalid. Most secure option.","Doesnt regenerate QR":"The original QR remains valid. Risk that the seller may retain access to the event.","Only on front":"Only updated visually on the frontend, without invalidating the original QR in the access control system."}},{"id":"11.0","category":"Abonos","options":["Un qr por función","Un qr para todo el abono","Configurable","Credencial Física (RFID)","No tienen"],"description":"Si la plataforma vende abonos (season tickets) y cómo gestiona el acceso por sesión individual. Afecta la posibilidad de revender sesiones individuales.","optionDescriptions":{"Un qr por función":"Cada sesión del abono tiene su propio QR único. Permite venta de sesiones individuales en reventa.","Un qr para todo el abono":"Un único QR da acceso a todas las sesiones. Complica la reventa parcial de sesiones.","Configurable":"Configurable por evento o tipo de abono.","Credencial Física (RFID)":"El acceso es por credencial física (chip RFID). La reventa requiere re-emisión de la credencial.","No tienen":"No hay abonos. Todos los tickets son de función única."},"category_en":"Season Passes","category_es":"Abonos","description_en":"Whether the platform sells season passes (abonos) and how it manages access per individual session. Affects the ability to resell individual sessions.","description_es":"Si la plataforma vende abonos (season tickets) y cómo gestiona el acceso por sesión individual. Afecta la posibilidad de revender sesiones individuales.","options_en":["One QR per session","One QR for entire pass","Configurable","Physical credential (RFID)","No season passes"],"optionDescriptions_en":{"Un qr por función":"Each session of the season pass has its own unique QR. Allows selling individual sessions in resale.","Un qr para todo el abono":"A single QR grants access to all sessions. Complicates partial session resale.","Configurable":"Configurable per event or season pass type.","Credencial Física (RFID)":"Access is via physical credential (RFID chip). Resale requires credential reissuance.","No tienen":"No season passes. All tickets are for single events."}},{"id":"13.0","category":"Planimetría","options":["Desarrollo propio","Tercero","No tienen"],"description":"Si la plataforma tiene mapa interactivo de asientos para la selección de ubicaciones. Afecta el flujo de compra en el marketplace y la gestión de asientos en reventa.","optionDescriptions":{"Desarrollo propio":"Mapa interactivo propio del partner. menta debe integrarse con su API para reservar y liberar asientos.","Tercero":"Mapa de proveedor tercero (ej. Ticketmaster, TIXR). Integración via la API del proveedor.","No tienen":"Sin mapa interactivo. Tickets de campo abierto o categoría sin asiento asignado."},"category_en":"Seat Map","category_es":"Planimetría","description_en":"Whether the platform has an interactive seat map for seat selection. Affects the purchase flow in the marketplace and seat management in resale.","description_es":"Si la plataforma tiene mapa interactivo de asientos para la selección de ubicaciones. Afecta el flujo de compra en el marketplace y la gestión de asientos en reventa.","options_en":["In-house development","Third-party provider","No seat maps"],"optionDescriptions_en":{"Desarrollo propio":"Partner's own interactive seat map. menta must integrate with their API to reserve and release seats.","Tercero":"Third-party seat map provider (e.g., Ticketmaster, TIXR). Integration via the provider's API.","No tienen":"No interactive seat map. General admission or category-based tickets without assigned seats."}},{"id":"14.0","category":"Extras / Upselling","options":["Bundles","Add ons (Servicios)","Perks","Cuotas","App","Seguro de Tickets"],"description":"Productos o servicios adicionales que la plataforma vende junto con los tickets. Define qué sucede con estos extras en una transacción de reventa.","optionDescriptions":{"Bundles":"Paquetes que combinan múltiples tickets u opciones a precio especial.","Add ons (Servicios)":"Servicios adicionales vendidos con el ticket: estacionamiento, merchandise, catering.","Perks":"Beneficios incluidos con ciertos tickets: meet & greet, zona exclusiva, acceso anticipado.","Cuotas":"Opción de pago en cuotas. Los tickets con cuotas pendientes no deben estar disponibles para reventa.","App":"Acceso exclusivo o experiencia mejorada via app móvil del partner.","Seguro de Tickets":"Seguro de cancelación o protección del ticket. Define si se transfiere con la reventa."},"category_en":"Extras / Upselling","category_es":"Extras / Upselling","description_en":"Additional products or services the platform sells alongside tickets. Defines what happens with these extras in a resale transaction.","description_es":"Productos o servicios adicionales que la plataforma vende junto con los tickets. Define qué sucede con estos extras en una transacción de reventa.","options_en":["Bundles","Add-ons (Services)","Perks","Installments","App","Ticket insurance"],"optionDescriptions_en":{"Bundles":"Packages combining multiple tickets or options at a special price.","Add ons (Servicios)":"Additional services sold with the ticket: parking, merchandise, catering.","Perks":"Benefits included with certain tickets: meet & greet, exclusive area, early access.","Cuotas":"Installment payment option. Tickets with pending installments must not be available for resale.","App":"Exclusive access or enhanced experience via the partner's mobile app.","Seguro de Tickets":"Cancellation insurance or ticket protection. Defines whether it transfers with resale."}},{"id":"15.0","category":"Transferencia de Servicios","options":["Se transfieren con ticket","Se separan (queda al vendedor)"],"description":"Qué sucede con los extras/servicios adicionales cuando un ticket es transferido en una venta de reventa.","optionDescriptions":{"Se transfieren con ticket":"Los extras se transfieren al comprador de reventa junto con el ticket base.","Se separan (queda al vendedor)":"Los extras quedan con el vendedor original. El comprador de reventa solo obtiene el ticket base."},"category_en":"Service Transfer","category_es":"Transferencia de Servicios","description_en":"What happens with extras/additional services when a ticket is transferred in a resale transaction.","description_es":"Qué sucede con los extras/servicios adicionales cuando un ticket es transferido en una venta de reventa.","options_en":["Transfer with ticket","Separated (stays with seller)"],"optionDescriptions_en":{"Se transfieren con ticket":"Extras are transferred to the resale buyer along with the base ticket.","Se separan (queda al vendedor)":"Extras stay with the original seller. The resale buyer only gets the base ticket."}},{"id":"16.0","category":"Upgrades / Cambios","options":["Permite cambio ubicación","No permite cambios"],"description":"Si la plataforma permite cambios de asiento o upgrades de categoría post-compra. Afecta el estado del ticket si ya está publicado en reventa.","optionDescriptions":{"Permite cambio ubicación":"Se puede cambiar de asiento o zona después de comprar. Si el ticket está publicado en menta, se debe actualizar o retirar el listing.","No permite cambios":"Sin cambios post-compra. El estado del ticket en menta es estable."},"category_en":"Upgrades / Changes","category_es":"Upgrades / Cambios","description_en":"Whether the platform allows seat changes or category upgrades post-purchase. Affects the ticket status if already listed for resale.","description_es":"Si la plataforma permite cambios de asiento o upgrades de categoría post-compra. Afecta el estado del ticket si ya está publicado en reventa.","options_en":["Allows seat/category changes","No changes allowed"],"optionDescriptions_en":{"Permite cambio ubicación":"Seat or zone changes are allowed after purchase. If the ticket is listed on menta, the listing must be updated or withdrawn.","No permite cambios":"No post-purchase changes. The ticket status in menta is stable."}},{"id":"17.0","category":"Lógica Promociones (2x1)","options":["1 Ticket (vale x2)","2 Tickets separados"],"description":"Cómo modela la plataforma las promociones del tipo 2x1 (dos entradas por el precio de una).","optionDescriptions":{"1 Ticket (vale x2)":"Un solo ticket físico representa dos accesos. menta lo trata como un ticket con valor doble.","2 Tickets separados":"Dos tickets individuales con precio reducido. Cada uno se revende por separado."},"category_en":"Promotion Logic (2-for-1)","category_es":"Lógica de Promociones (2x1)","description_en":"How the platform models 2-for-1 promotions (two tickets for the price of one).","description_es":"Cómo modela la plataforma las promociones del tipo 2x1 (dos entradas por el precio de una).","options_en":["1 Ticket (valid for 2)","2 Separate tickets"],"optionDescriptions_en":{"1 Ticket (vale x2)":"A single physical ticket represents two accesses. menta treats it as a ticket with double value.","2 Tickets separados":"Two individual tickets at reduced price. Each one is resold separately."}},{"id":"18.0","category":"Control de Acceso/Demanda","options":["Blacklists","Whitelists","Fila Virtual (Queue)","Ninguna"],"description":"Mecanismos que la plataforma usa para controlar quién puede comprar o cuántos pueden acceder simultáneamente.","optionDescriptions":{"Blacklists":"Lista de usuarios bloqueados de comprar. menta debe respetar estas restricciones en la reventa.","Whitelists":"Solo usuarios en lista aprobada pueden comprar. Requiere validación previa.","Fila Virtual (Queue)":"Sistema de cola virtual para alta demanda. Puede afectar el timing de disponibilidad en reventa.","Ninguna":"Sin control de acceso especial."},"category_en":"Access / Demand Control","category_es":"Control de Acceso / Demanda","description_en":"Mechanisms the platform uses to control who can purchase or how many can access simultaneously.","description_es":"Mecanismos que la plataforma usa para controlar quién puede comprar o cuántos pueden acceder simultáneamente.","options_en":["Blacklists","Whitelists","Virtual queue","None"],"optionDescriptions_en":{"Blacklists":"List of blocked users. menta must respect these restrictions in resale.","Whitelists":"Only approved users can purchase. Requires prior validation.","Fila Virtual (Queue)":"Virtual queue system for high demand. May affect resale availability timing.","Ninguna":"No special access control."}},{"id":"19.0","category":"Gestión de Cuotas","options":["Gestiona el Sistema","Gestiona el Procesador","No permite cuotas"],"description":"Cómo se manejan los pagos en cuotas en la plataforma. Los tickets con cuotas pendientes no deben estar disponibles para reventa.","optionDescriptions":{"Gestiona el Sistema":"El sistema de ticketing administra las cuotas. Debe excluir tickets con cuotas pendientes del endpoint de tickets enviado a menta.","Gestiona el Procesador":"El procesador de pagos administra las cuotas. La plataforma debe indicar el estado de pago completo al enviar tickets a menta.","No permite cuotas":"Sin pagos en cuotas. Todos los tickets están completamente pagados al ser emitidos."},"category_en":"Installment Management","category_es":"Gestión de Cuotas","description_en":"How installment payments are handled on the platform. Tickets with pending installments must not be available for resale.","description_es":"Cómo se manejan los pagos en cuotas en la plataforma. Los tickets con cuotas pendientes no deben estar disponibles para reventa.","options_en":["Managed by the system","Managed by payment processor","No installments"],"optionDescriptions_en":{"Gestiona el Sistema":"The ticketing system manages installments. Must exclude tickets with pending installments from the ticket endpoint sent to menta.","Gestiona el Procesador":"The payment processor manages installments. The platform must indicate full payment status when sending tickets to menta.","No permite cuotas":"No installment payments. All tickets are fully paid at issuance."}},{"id":"20.0","category":"Prevención de Fraude","options":["3D Secure / Auth Reforzada","Reglas Propias / Manuales","Herramientas del Procesador","Ninguna"],"description":"Mecanismos de prevención de fraude que utiliza la plataforma en transacciones de compra.","optionDescriptions":{"3D Secure / Auth Reforzada":"Autenticación adicional del banco (3DS). Puede generar fricción extra en el flujo de compra de reventa.","Reglas Propias / Manuales":"Reglas de fraude definidas internamente por el partner.","Herramientas del Procesador":"Herramientas antifraude del procesador de pagos (ej. Stripe Radar, Mercado Pago).","Ninguna":"Sin mecanismos especiales de prevención de fraude."},"category_en":"Fraud Prevention","category_es":"Prevención de Fraude","description_en":"Fraud prevention mechanisms used by the platform in purchase transactions.","description_es":"Mecanismos de prevención de fraude que utiliza la plataforma en transacciones de compra.","options_en":["3D Secure / Enhanced auth","In-house / Manual rules","Payment processor tools","None"],"optionDescriptions_en":{"3D Secure / Auth Reforzada":"Additional bank authentication (3DS). May add extra friction in the resale purchase flow.","Reglas Propias / Manuales":"Fraud rules defined internally by the partner.","Herramientas del Procesador":"Payment processor antifraud tools (e.g., Stripe Radar, Mercado Pago).","Ninguna":"No specific fraud prevention mechanisms."}},{"id":"21.0","category":"Granularidad de cancelación","options":["Por orden completa","Parcial (por ticket)"],"description":"Cómo gestiona la plataforma la cancelación de tickets comprados. Determina si la ticketera puede cancelar tickets individuales de una orden o si debe cancelar la orden completa.","optionDescriptions":{"Por orden completa":"Solo se pueden cancelar órdenes completas. Si un usuario quiere cancelar 1 ticket de 3, se cancelan los 3. No existe cancelación parcial.","Parcial (por ticket)":"Se pueden cancelar tickets individuales dentro de una orden. Permite excluir tickets específicos (ej: los revendidos en el mercado secundario)."},"category_en":"Cancellation Granularity","category_es":"Granularidad de Cancelación","description_en":"How the platform handles ticket cancellations. Determines whether the platform can cancel individual tickets from an order or must cancel the entire order.","description_es":"Cómo gestiona la plataforma la cancelación de tickets comprados. Determina si la plataforma puede cancelar tickets individuales de una orden o si debe cancelar la orden completa.","options_en":["Full order only","Partial (per ticket)"],"optionDescriptions_en":{"Por orden completa":"Only complete orders can be cancelled. If a user wants to cancel 1 ticket out of 3, all 3 are cancelled. No partial cancellation exists.","Parcial (por ticket)":"Individual tickets within an order can be cancelled. Allows excluding specific tickets (e.g., those resold on the secondary market)."}},{"id":"22.0","category":"Features Extra","options":["Lista de Espera (Waitlist)","Carrito Abandonado"],"description":"Funcionalidades especiales de la plataforma que impactan la gestión del inventario de reventa.","optionDescriptions":{"Lista de Espera (Waitlist)":"Cola para eventos sold-out. Los tickets de reventa pueden notificarse a usuarios en waitlist.","Carrito Abandonado":"Recuperación de carritos abandonados. Puede afectar disponibilidad de tickets reservados en reventa."},"category_en":"Extra Features","category_es":"Features Extra","description_en":"Special platform features that impact resale inventory management.","description_es":"Funcionalidades especiales de la plataforma que impactan la gestión del inventario de reventa.","options_en":["Waitlist","Abandoned cart"],"optionDescriptions_en":{"Lista de Espera (Waitlist)":"Queue for sold-out events. Resale tickets can be notified to users on the waitlist.","Carrito Abandonado":"Abandoned cart recovery. May affect availability of reserved tickets in resale."}},{"id":"23.0","category":"Event structure","options":["multi show","one show"],"description":"Cómo se estructuran los eventos en la plataforma. Define si se requiere showId en todos los endpoints de menta.","optionDescriptions":{"multi show":"Un evento puede contener múltiples funciones/shows (ej. una gira con varias fechas). Se requiere showId en todos los endpoints.","one show":"Cada evento corresponde a una única función. No es necesario incluir showId."},"category_en":"Event Structure","category_es":"Estructura de Eventos","description_en":"How events are structured on the platform. Defines whether showId is required in all menta endpoints.","description_es":"Cómo se estructuran los eventos en la plataforma. Define si se requiere showId en todos los endpoints de menta.","options_en":["Multi show","One show"],"optionDescriptions_en":{"multi show":"An event can contain multiple shows/dates (e.g., a tour with several dates). showId is required in all endpoints.","one show":"Each event corresponds to a single show. showId is not required."}},{"id":"23.1","category":"Show activation","options":["Always active","Pause sale","Web visibility"],"description":"Cómo gestiona la plataforma la activación/pausa de shows. Determina si menta necesita recibir flags de webvisibility para no habilitar reventa en shows que no están a la venta.","optionDescriptions":{"Always active":"Los shows están siempre activos una vez creados. No hay mecanismo de pausa.","Pause sale":"La plataforma puede pausar la venta de un show sin cancelarlo. menta necesita reflejar la pausa en el mercado secundario.","Web visibility":"La plataforma puede configurar la visibilidad web de categorías/shows. menta necesita el flag de webvisibility para sincronizar."},"category_en":"Show Activation","category_es":"Activación de Shows","description_en":"How the platform manages show activation/pausing. Determines whether menta needs webvisibility flags to avoid enabling resale on shows not yet on sale.","description_es":"Cómo gestiona la plataforma la activación/pausa de shows. Determina si menta necesita recibir flags de webvisibility para no habilitar reventa en shows que no están a la venta.","options_en":["Always active","Pause sale","Web visibility"],"optionDescriptions_en":{"Always active":"Shows are always active once created. No pause mechanism exists.","Pause sale":"The platform can pause sales for a show without cancelling it. menta needs to reflect the pause in the secondary market.","Web visibility":"The platform can configure web visibility per category/show. menta needs the webvisibility flag to sync."}},{"id":"24.0","category":"Authentication method","options":["SSO enabled","SSO not available"],"description":"Whether the ticketing platform uses Single Sign-On (SSO) for user authentication. Affects how menta handles authentication flows and user session management.","optionDescriptions":{"SSO enabled":"The platform uses SSO (e.g., OAuth, SAML, OpenID Connect) for user authentication. menta must integrate with the SSO provider or delegate auth to the platform.","SSO not available":"The platform uses traditional username/password authentication or other non-SSO methods. menta handles authentication directly or uses simpler credential management."},"category_en":"Authentication Method (SSO)","category_es":"Método de Autenticación (SSO)","description_en":"Whether the ticketing platform uses Single Sign-On (SSO) for user authentication. Affects how menta handles authentication flows and user session management.","description_es":"Si la plataforma de ticketing utiliza Single Sign-On (SSO) para la autenticación de usuarios. Afecta cómo menta maneja los flujos de autenticación y la gestión de sesiones.","options_en":["SSO enabled","SSO not available"],"optionDescriptions_en":{"SSO enabled":"The platform uses SSO (e.g., OAuth, SAML, OpenID Connect). menta must integrate with the SSO provider or delegate auth to the platform.","SSO not available":"Traditional username/password or other non-SSO methods. menta handles authentication directly or uses simpler credential management."}},{"id":"25.0","category":"App","options":["enabled (ticketera tiene app nativa)","no app"],"description":"Whether the partner platform has a native mob
