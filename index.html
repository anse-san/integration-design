ile app. Affects deep-link behavior in the 'My Tickets' section.","optionDescriptions":{"enabled (ticketera tiene app nativa)":"The partner has a native iOS/Android app. My Tickets links must deep-link to open or download the app.","no app":"Platform is web-only. Standard web redirects apply."},"category_en":"Native App","category_es":"App Nativa","description_en":"Whether the partner platform has a native mobile app. Affects deep-link behavior in the 'My Tickets' section.","description_es":"Si la plataforma del partner tiene una app móvil nativa. Afecta el comportamiento de deep-links en la sección 'Mis Tickets'.","options_en":["Enabled (partner has native app)","No app"],"optionDescriptions_en":{"enabled (ticketera tiene app nativa)":"The partner has a native iOS/Android app. My Tickets links must deep-link to open or download the app.","no app":"Platform is web-only. Standard web redirects apply."}},{"id":"26.0","category":"Múltiples API keys por país/operación","options":["Sí","No","Una key por entidad legal (ruteo VAT/jurisdicción)"],"description":"Whether the partner uses multiple API keys depending on country or operation. Requires a routing system to select the correct key per event.","optionDescriptions":{"Sí":"Different API keys are used per country or operation. The platform must implement routing logic to select the correct key based on the event.","No":"Single API key for all operations.","Una key por entidad legal (ruteo VAT/jurisdicción)":"El partner opera con múltiples entidades legales (por ejemplo, una por país o por régimen fiscal). Se emite una menta API key por entidad. Los eventos se crean con la key correspondiente y automáticamente heredan la VAT y jurisdicción aplicables — sin configuración per-evento. Es el patrón preferido para partners con operaciones cross-border. El partner es responsable de seleccionar la key correcta en su lado al crear el evento."},"category_en":"Multiple API Keys per Country","category_es":"Múltiples API Keys por País","description_en":"Whether the partner uses multiple API keys depending on country or operation. Requires a routing system to select the correct key per event.","description_es":"Si el partner usa múltiples API keys según el país u operación. Requiere un sistema de routing para seleccionar la key correcta por evento.","options_en":["Yes","No","One key per legal entity (VAT/jurisdiction routing)"],"optionDescriptions_en":{"Sí":"Different API keys are used per country or operation. The platform must implement routing logic to select the correct key based on the event.","No":"Single API key for all operations.","Una key por entidad legal (ruteo VAT/jurisdicción)":"The partner operates with multiple legal entities (for example, one per country or per tax regime). One menta API key is issued per entity. Events are created with the corresponding key and automatically inherit the applicable VAT and jurisdiction — no per-event configuration is required. This is the preferred pattern for partners with cross-border operations. The partner is responsible for selecting the correct key on their side when creating the event."}},{"id":"27.0","category":"Ticketera tiene categorías no disponibilizadas para compra primaria","options":["Sí","No"],"description":"Whether the platform has ticket categories that are not available for primary sales but may appear in integrations. A webvisibility flag is required to handle these correctly.","optionDescriptions":{"Sí":"Some ticket categories exist but are not available for primary sales. The platform must send a webvisibility flag per ticketOption.","No":"All ticket categories are available for primary sales."},"category_en":"Categories Not Available for Primary Sale","category_es":"Categorías No Disponibles para Venta Primaria","description_en":"Whether the platform has ticket categories that are not available for primary sales but may appear in integrations. A webvisibility flag is required to handle these correctly.","description_es":"Si la plataforma tiene categorías de tickets que no están disponibles para venta primaria pero pueden aparecer en integraciones. Se requiere un flag de webvisibility para manejarlas correctamente.","options_en":["Yes","No"],"optionDescriptions_en":{"Sí":"Some ticket categories exist but are not available for primary sales. The platform must send a webvisibility flag per ticketOption.","No":"All ticket categories are available for primary sales."}},{"id":"28.0","category":"Ticketera no tiene obligatorio el input de imagen en creación de eventos","options":["Imagen no obligatoria","Imagen obligatoria"],"description":"Whether the platform requires an image when creating events. If not required, a fallback image must be configured per integrator.","optionDescriptions":{"Imagen no obligatoria":"Events can be created without an image. A fallback image must be configured in menta per integrator.","Imagen obligatoria":"All events must have an image. No fallback needed."},"category_en":"Event Image Requirement","category_es":"Requisito de Imagen en Eventos","description_en":"Whether the platform requires an image when creating events. If not required, a fallback image must be configured per integrator.","description_es":"Si la plataforma requiere una imagen al crear eventos. Si no es obligatoria, se debe configurar una imagen de respaldo por integrador.","options_en":["Image not required","Image required"],"optionDescriptions_en":{"Imagen no obligatoria":"Events can be created without an image. A fallback image must be configured in menta per integrator.","Imagen obligatoria":"All events must have an image. No fallback needed."}},{"id":"29.0","category":"Ticket transfer limit","options":["1 (solo una transferencia permitida)","Ilimitado","Configurable por evento"],"description":"How many times a ticket can be transferred. Affects whether a resale buyer can re-list the ticket on the secondary market.","optionDescriptions":{"1 (solo una transferencia permitida)":"Ticket can only be transferred once. A buyer who received a ticket via Change Ticket Owner cannot re-list it for resale.","Ilimitado":"Tickets can be transferred any number of times. Resale buyers can re-list.","Configurable por evento":"Transfer limit is set per event. Must be checked before rendering resale CTA."},"category_en":"Ticket Transfer Limit","category_es":"Límite de Transferencias","description_en":"How many times a ticket can be transferred. Affects whether a resale buyer can re-list the ticket on the secondary market.","description_es":"Cuántas veces se puede transferir un ticket. Afecta si un comprador de reventa puede volver a listar el ticket en el mercado secundario.","options_en":["1 (only one transfer allowed)","Unlimited","Configurable per event"],"optionDescriptions_en":{"1 (solo una transferencia permitida)":"Ticket can only be transferred once. A buyer who received a ticket via Change Ticket Owner cannot re-list it for resale.","Ilimitado":"Tickets can be transferred any number of times. Resale buyers can re-list.","Configurable por evento":"Transfer limit is set per event. Must be checked before rendering resale CTA."}},{"id":"21.1","category":"Detección de tickets en reventa durante cancelación","options":["Detecta y excluye automáticamente","Detecta pero no excluye","No detecta"],"description":"Si la plataforma puede identificar automáticamente cuáles tickets de una orden están publicados o fueron vendidos en el mercado secundario antes de ejecutar una cancelación. Determina si la ticketera puede excluir tickets en reventa de forma automática.","optionDescriptions":{"Detecta y excluye automáticamente":"La plataforma consulta el estado de reventa de cada ticket antes de cancelar. Puede excluir tickets listados o vendidos del proceso de cancelación automáticamente.","Detecta pero no excluye":"La plataforma puede ver el estado de reventa pero no tiene lógica para excluir tickets del proceso de cancelación. Requiere intervención manual del equipo de soporte.","No detecta":"La plataforma no tiene visibilidad del estado de reventa al momento de ejecutar una cancelación. Cancelar una orden podría afectar tickets listados o vendidos sin saberlo."},"category_en":"Resale Ticket Detection on Cancellation","category_es":"Detección de Tickets en Reventa durante Cancelación","description_en":"Whether the platform can automatically identify which tickets from an order are listed or sold on the secondary market before executing a cancellation. Determines whether the platform can exclude resale tickets automatically.","description_es":"Si la plataforma puede identificar automáticamente cuáles tickets de una orden están publicados o fueron vendidos en el mercado secundario antes de ejecutar una cancelación. Determina si la plataforma puede excluir tickets en reventa de forma automática.","options_en":["Detects and excludes automatically","Detects but does not exclude","Does not detect"],"optionDescriptions_en":{"Detecta y excluye automáticamente":"The platform queries the resale status of each ticket before cancelling. Can exclude listed or sold tickets from the cancellation process automatically.","Detecta pero no excluye":"The platform can see resale status but has no logic to exclude tickets from the cancellation process. Requires manual intervention from the support team.","No detecta":"The platform has no visibility into resale status at cancellation time. Cancelling an order could affect listed or sold tickets unknowingly."}},{"id":"21.2","category":"Capacidad de reembolso de dinero","options":["Reembolso total únicamente","Reembolso parcial habilitado","Con retención de fee"],"description":"Qué tipos de reembolsos monetarios puede realizar la plataforma. Determina las opciones disponibles cuando se aprueba una devolución de una compra primaria o secundaria.","optionDescriptions":{"Reembolso total únicamente":"Solo puede devolver el monto total de la orden. No puede devolver parcialmente.","Reembolso parcial habilitado":"Puede devolver un monto parcial de la orden (ej: devolver 2 de 3 tickets).","Con retención de fee":"Puede devolver el monto del ticket reteniendo el service charge."},"category_en":"Refund Capability","category_es":"Capacidad de Reembolso","description_en":"What types of monetary refunds the platform can perform. Determines the options available when a primary or secondary purchase refund is approved.","description_es":"Qué tipos de reembolsos monetarios puede realizar la plataforma. Determina las opciones disponibles cuando se aprueba una devolución de una compra primaria o secundaria.","options_en":["Full refund only","Partial refund supported","With fee retention"],"optionDescriptions_en":{"Reembolso total únicamente":"Can only refund the full order amount. Cannot refund partially.","Reembolso parcial habilitado":"Can refund a partial amount from the order (e.g., refund 2 of 3 tickets).","Con retención de fee":"Can refund the ticket amount while retaining the service charge."}},{"id":"30.0","category":"Atributos de asientos","options":["Sí (tiene atributos)","No"],"description":"Si la plataforma gestiona atributos especiales en los asientos como silla de ruedas, apoyabrazos removible, vista obstruida, etc. Afecta la información que se muestra en el mapa interactivo durante la compra secundaria.","optionDescriptions":{"Sí (tiene atributos)":"La plataforma asocia atributos a los asientos (ej: wheelchair, removable armchair, obstructed view, companion seat). Estos atributos deben mostrarse en el mapa interactivo del mercado secundario.","No":"Los asientos no tienen atributos especiales o no se gestionan en el sistema."},"category_en":"Seat Attributes","category_es":"Atributos de Asientos","description_en":"Whether the platform manages special seat attributes such as wheelchair, removable armchair, obstructed view, etc. Affects the information displayed in the interactive map during secondary market purchases.","description_es":"Si la plataforma gestiona atributos especiales en los asientos como silla de ruedas, apoyabrazos removible, vista obstruida, etc. Afecta la información que se muestra en el mapa interactivo durante la compra secundaria.","options_en":["Yes (has attributes)","No"],"optionDescriptions_en":{"Sí (tiene atributos)":"The platform associates attributes to seats (e.g., wheelchair, removable armchair, obstructed view, companion seat). These attributes must be displayed in the secondary market interactive map.","No":"Seats have no special attributes or they are not managed in the system."}},{"id":"31.0","category":"Sección Mis Tickets","options":["Sección dedicada","Sin sección dedicada (solo email)"],"options_en":["Dedicated section","No dedicated section (email only)"],"description":"Si la plataforma del partner ofrece una sección dedicada donde el usuario puede ver y gestionar sus tickets después de la compra, o si el acceso es únicamente vía email post-compra.","optionDescriptions":{"Sección dedicada":"El usuario ingresa con su cuenta a una sección del sitio o la aplicación donde visualiza sus tickets activos y su historial de compras. Permite integrar CTAs de reventa directamente.","Sin sección dedicada (solo email)":"El usuario accede a los tickets únicamente a través del correo electrónico recibido luego de la compra. No hay interfaz donde inyectar CTAs de reventa — requiere Static URL o Generic URL."},"optionDescriptions_en":{"Sección dedicada":"The user logs into a dedicated section of the website or app where they can view active tickets and purchase history. Allows integrating resale CTAs directly.","Sin sección dedicada (solo email)":"The user accesses tickets only via the email received after purchase. No interface exists to inject resale CTAs — requires Static URL or Generic URL."},"category_en":"My Tickets Section","category_es":"Sección Mis Tickets","description_en":"Whether the partner platform offers a dedicated section where the user can view and manage tickets after purchase, or if access is only via post-purchase email.","description_es":"Si la plataforma del partner ofrece una sección dedicada donde el usuario puede ver y gestionar sus tickets después de la compra, o si el acceso es únicamente vía email post-compra."},{"id":"32.0","category":"Reemisión de tickets","options":["Sí — regenera QR","Sí — mantiene mismo QR","No"],"options_en":["Yes — regenerates QR","Yes — keeps same QR","No"],"description":"Si la plataforma permite reemitir o regenerar tickets luego de la compra y qué sucede con el código de acceso (QR) al hacerlo.","optionDescriptions":{"Sí — regenera QR":"La plataforma puede reemitir tickets y genera un nuevo código de acceso, dejando sin validez el anterior.","Sí — mantiene mismo QR":"La plataforma puede reemitir tickets pero mantiene el mismo código de acceso original.","No":"La plataforma no permite reemisión de tickets luego de la compra."},"optionDescriptions_en":{"Sí — regenera QR":"The platform can reissue tickets and generates a new access code, invalidating the previous one.","Sí — mantiene mismo QR":"The platform can reissue tickets but keeps the same original access code.","No":"The platform does not allow ticket reissue after purchase."},"category_en":"Ticket Reissue","category_es":"Reemisión de Tickets","description_en":"Whether the platform allows ticket reissue/regeneration after purchase and what happens to the access code (QR).","description_es":"Si la plataforma permite reemitir o regenerar tickets luego de la compra y qué sucede con el código de acceso (QR) al hacerlo."},{"id":"33.0","category":"Restricción por edad","options":["Valida edad","Sin restricciones de edad"],"options_en":["Validates age","No age restrictions"],"description":"Si la plataforma valida la edad del usuario antes o durante la compra de tickets. Puede afectar el flujo de compra en el mercado secundario si existen categorías con restricción etaria.","optionDescriptions":{"Valida edad":"El sistema verifica la edad del usuario antes o durante la compra. Puede afectar la reventa de tickets con categorías restringidas por edad (ej. menores, jubilados).","Sin restricciones de edad":"El sistema no aplica restricciones por edad en la compra."},"optionDescriptions_en":{"Valida edad":"The system verifies the user's age before or during purchase. May affect resale of tickets with age-restricted categories (e.g., minors, seniors).","Sin restricciones de edad":"The system does not apply age restrictions on purchase."},"category_en":"Age Restrictions","category_es":"Restricción por Edad","description_en":"Whether the platform validates the user's age before or during ticket purchase. May affect the secondary market purchase flow if age-restricted categories exist.","description_es":"Si la plataforma valida la edad del usuario antes o durante la compra de tickets. Puede afectar el flujo de compra en el mercado secundario si existen categorías con restricción etaria."},{"id":"34.0","category":"Notificación de cancelación de eventos","options":["Notificación automática","Notificación manual"],"options_en":["Automatic notification","Manual notification only"],"description":"Si la plataforma puede notificar automáticamente a menta cuando un evento es cancelado o suspendido. Necesario para detener pagos a vendedores del mercado secundario.","optionDescriptions":{"Notificación automática":"El sistema puede enviar una notificación automática y en tiempo real a menta a través de la interfaz de integración cuando un evento es cancelado o suspendido.","Notificación manual":"El equipo debe informar la cancelación de manera manual, fuera del sistema. Mayor riesgo de retraso en la detención de pagos."},"optionDescriptions_en":{"Notificación automática":"The system can send an automatic real-time notification to menta through the integration interface when an event is cancelled or suspended.","Notificación manual":"The team must notify cancellations manually, outside the system. Higher risk of delayed payout stops."},"category_en":"Event Cancellation Notification","category_es":"Notificación de Cancelación de Eventos","description_en":"Whether the platform can automatically notify menta when an event is cancelled or suspended. Required to stop payouts to secondary market sellers.","description_es":"Si la plataforma puede notificar automáticamente a menta cuando un evento es cancelado o suspendido. Necesario para detener pagos a vendedores del mercado secundario."},{"id":"35.0","category":"Créditos / saldo a favor","options":["Permite créditos","Solo reembolso monetario"],"options_en":["Supports credits","Monetary refunds only"],"description":"Si la plataforma permite realizar reembolsos mediante créditos o saldo a favor del usuario en lugar de devoluciones monetarias. Informacional — no afecta directamente la integración con menta pero es relevante para el contexto operativo.","optionDescriptions":{"Permite créditos":"El sistema puede acreditar el monto de la devolución como crédito/saldo a favor para uso futuro.","Solo reembolso monetario":"El sistema únicamente realiza devoluciones mediante reembolso monetario (mismo medio de pago u otros métodos)."},"optionDescriptions_en":{"Permite créditos":"The system can credit the refund amount as balance for future use.","Solo reembolso monetario":"The system refunds only as monetary refunds (same payment method or other methods)."},"category_en":"Credits / Balance Refunds","category_es":"Créditos / Saldo a Favor","description_en":"Whether the platform supports refunding via credits/balance instead of monetary refunds. Informational — does not directly affect the menta integration but is relevant for operational context.","description_es":"Si la plataforma permite realizar reembolsos mediante créditos o saldo a favor del usuario en lugar de devoluciones monetarias. Informacional — no afecta directamente la integración con menta pero es relevante para el contexto operativo."},{"id":"36.0","category":"Historial de operaciones","options":["Historial accesible","Historial no accesible","Sin historial"],"options_en":["Accessible history","History not accessible","No history"],"description":"Si la plataforma registra y conserva historial de transferencias, cambios de titularidad, reemisiones y cancelaciones, y si ese historial es accesible para el equipo operativo.","optionDescriptions":{"Historial accesible":"El sistema registra y el equipo operativo puede consultar el historial de transferencias, cambios de titular, reemisiones y cancelaciones.","Historial no accesible":"El sistema registra las operaciones pero el equipo operativo no tiene acceso al historial.","Sin historial":"El sistema no registra historial de estas operaciones."},"optionDescriptions_en":{"Historial accesible":"The system records and the operational team can query the history of transfers, ownership changes, reissues, and cancellations.","Historial no accesible":"The system records operations but the operational team has no access to the history.","Sin historial":"The system does not record history for these operations."},"category_en":"Operation History","category_es":"Historial de Operaciones","description_en":"Whether the platform records and maintains history of transfers, ownership changes, reissues, and cancellations, and whether that history is accessible to the operational team.","description_es":"Si la plataforma registra y conserva historial de transferencias, cambios de titularidad, reemisiones y cancelaciones, y si ese historial es accesible para el equipo operativo."},{"id":"37.0","category":"Procesador de pagos","options":["Procesador único","Múltiples procesadores"],"options_en":["Single processor","Multiple processors"],"description":"Qué procesador o procesadores de pagos utiliza la plataforma. Informacional — afecta los flujos de contracargo, reembolso y las herramientas antifraude disponibles.","optionDescriptions":{"Procesador único":"La plataforma utiliza un único procesador de pagos para todas las transacciones.","Múltiples procesadores":"La plataforma utiliza más de un procesador de pagos (ej. por país, por tipo de transacción, o por volumen)."},"optionDescriptions_en":{"Procesador único":"The platform uses a single payment processor for all transactions.","Múltiples procesadores":"The platform uses more than one payment processor (e.g., by country, transaction type, or volume)."},"category_en":"Payment Processor","category_es":"Procesador de Pagos","description_en":"Which payment processor(s) the platform uses. Informational — affects chargeback, refund, and antifraud tool flows.","description_es":"Qué procesador o procesadores de pagos utiliza la plataforma. Informacional — afecta los flujos de contracargo, reembolso y las herramientas antifraude disponibles."},{"id":"38.0","category":"Facturación","options":["Sí","No","Obligatorio con sistema conectado a autoridades"],"options_en":["Yes","No"],"description":"Si la plataforma utiliza algún software o servicio específico para la emisión de facturas o comprobantes fiscales. Informacional — relevante para la operación de pagos del mercado secundario.","optionDescriptions":{"Sí":"La plataforma utiliza un software o servicio de facturación específico.","No":"La plataforma no utiliza software de facturación específico.","Obligatorio con sistema conectado a autoridades":"La legislación local obliga a la ticketera a emitir facturas a través de un sistema conectado a las autoridades fiscales (ej. számlázz.hu en Hungría). Requiere acordar datos de activación y formato antes del go-live. En mercados donde el software de facturación debe estar conectado directamente a la autoridad tributaria (ej. Hungría), menta envía los datos de cada transacción de reventa vía webhook para que el partner emita las facturas correspondientes."},"optionDescriptions_en":{"Sí":"The platform uses a specific invoicing software or service.","No":"The platform does not use specific invoicing software.","Government-connected system required":"Local legislation requires the partner to issue invoices through a system connected to tax authorities (e.g., számlázz.hu in Hungary). Requires agreeing on trigger data and format before go-live. In markets where invoicing software must be directly connected to the tax authority (e.g. Hungary), menta sends transaction data via webhook so the partner can issue the corresponding invoices."},"category_en":"Invoicing","category_es":"Facturación","description_en":"Whether the platform uses specific invoicing software/service for fiscal compliance. Informational — relevant for secondary market payment operations.","description_es":"Si la plataforma utiliza algún software o servicio específico para la emisión de facturas o comprobantes fiscales. Informacional — relevante para la operación de pagos del mercado secundario."},{"id":"39.0","category":"Verificación de identidad (KYC)","options":["Sí","No"],"options_en":["Yes","No"],"description":"Si la plataforma utiliza algún mecanismo o proveedor para la verificación de identidad de usuarios. Informacional — relevante para la seguridad y compliance del mercado secundario.","optionDescriptions":{"Sí":"La plataforma utiliza mecanismos o proveedores de verificación de identidad (KYC).","No":"La plataforma no utiliza mecanismos de verificación de identidad."},"optionDescriptions_en":{"Sí":"The platform uses identity verification mechanisms or providers (KYC).","No":"The platform does not use identity verification mechanisms."},"category_en":"Identity Verification (KYC)","category_es":"Verificación de Identidad (KYC)","description_en":"Whether the platform uses any identity verification mechanism or provider. Informational — relevant for secondary market security and compliance.","description_es":"Si la plataforma utiliza algún mecanismo o proveedor para la verificación de identidad de usuarios. Informacional — relevante para la seguridad y compliance del mercado secundario."},{"id":"40.0","category":"Países de operación","options":["País único","Múltiples países — todos con entidad local","Múltiples países — algunos sin entidad local"],"options_en":["Single country","Multiple countries — all with local entity","Multiple countries — some without local entity"],"description":"En qué países opera actualmente la plataforma con eventos activos y si tiene estructura legal local. Afecta requisitos regulatorios, fiscales y de compliance para el mercado secundario.","optionDescriptions":{"País único":"La plataforma opera en un único país con eventos activos.","Múltiples países — todos con entidad local":"La plataforma opera en varios países y tiene una entidad legal local en cada uno de ellos.","Múltiples países — algunos sin entidad local":"La plataforma opera en varios países pero no tiene entidad legal local en todos ellos. Cuando existen múltiples entidades legales (una por país con operación local), menta emite una API key por entidad. Los eventos creados con una API key determinada se asocian automáticamente a esa entidad legal."},"optionDescriptions_en":{"País único":"The platform operates in a single country with active events.","Múltiples países — todos con entidad local":"The platform operates in multiple countries and has a local legal entity in each.","Múltiples países — algunos sin entidad local":"The platform operates in multiple countries but does not have a local legal entity in all of them. When multiple legal entities exist (one per country with local operation), menta issues one API key per entity. Events created with a given API key are automatically associated with that legal entity."},"category_en":"Countries of Operation","category_es":"Países de Operación","description_en":"In which countries the platform currently operates with active events and whether it has a local legal entity structure. Affects regulatory, tax, and compliance requirements for the secondary market.","description_es":"En qué países opera actualmente la plataforma con eventos activos y si tiene estructura legal local. Afecta requisitos regulatorios, fiscales y de compliance para el mercado secundario."},{"id":"42.0","category":"Validación de check-in","options":["Real-time (online)","Offline (batch sync)","Ninguna"],"description":"Whether the partner can query ticket check-in status in real-time during the resale lifecycle. Determines market close requirements, delist obligations after check-in, and CTO rejection logic.","description_en":"Whether the partner can query ticket check-in status in real-time during the resale lifecycle. Determines market close requirements, delist obligations after check-in, and CTO rejection logic.","optionDescriptions":{"Real-time (online)":"La plataforma puede consultar el estado de check-in de un ticket en tiempo real. Permite mantener el mercado abierto durante el evento si se implementa la cadena completa de validación: (1) validar al momento de listar, (2) deslistar proactivamente tickets escaneados, (3) rechazar CTO si el ticket fue escaneado.","Offline (batch sync)":"La plataforma descarga la base de ticket holders a dispositivos offline antes del evento. Una vez sincronizado, no hay validación en tiempo real. Requiere market close antes de la sincronización.","Ninguna":"La plataforma no tiene forma de consultar si un ticket fue escaneado. El mercado secundario debe cerrarse antes del evento con un margen de seguridad."},"optionDescriptions_en":{"Real-time (online)":"The platform can query a ticket's check-in status in real-time. Allows the market to remain open during the event if the full validation chain is implemented: (1) validate at listing time, (2) proactively delist checked-in tickets, (3) reject CTO if the ticket was scanned.","Offline (batch sync)":"The platform downloads the ticket holder database to offline scanners before the event. Once synced, no real-time validation is available. Requires hard market close before the sync.","Ninguna":"The platform has no way to query whether a ticket was scanned. The secondary market must close before the event with a safety margin."}},{"id":"43.0","category":"Idiomas / Traducciones","options":["Idioma único","Múltiples idiomas"],"options_en":["Single language","Multiple languages"],"description":"Si la plataforma del partner ofrece contenido (nombres de eventos, categorías, venues) en más de un idioma. Afecta cómo menta debe recibir y mostrar información localizada.","optionDescriptions":{"Idioma único":"La plataforma opera en un solo idioma. No se requiere lógica de localización adicional.","Múltiples idiomas":"La plataforma ofrece contenido en más de un idioma. menta necesita recibir el idioma del usuario para mostrar la información correcta."},"optionDescriptions_en":{"Idioma único":"The platform operates in a single language. No additional localization logic required.","Múltiples idiomas":"The platform offers content in more than one language. menta needs to receive the user's language to display the correct information."},"category_en":"Languages / Translations","category_es":"Idiomas / Traducciones","description_en":"Whether the partner platform offers content (event names, categories, venues) in more than one language. Affects how menta must receive and display localized information.","description_es":"Si la plataforma del partner ofrece contenido (nombres de eventos, categorías, venues) en más de un idioma. Afecta cómo menta debe recibir y mostrar información localizada."},{"id":"44.0","category":"Selección de moneda en checkout","options":["Moneda fija","Selección de moneda por el comprador"],"options_en":["Fixed currency","Buyer currency selection"],"description":"Si la plataforma permite al comprador elegir en qué moneda pagar durante el checkout del flujo de compra primaria. Afecta cómo menta debe manejar precios y monedas en el mercado secundario.","optionDescriptions":{"Moneda fija":"El checkout opera en una única moneda predeterminada (generalmente la moneda local del evento o del país de operación). No hay selección de moneda por parte del comprador.","Selección de moneda por el comprador":"El comprador puede elegir entre múltiples monedas al momento del pago. Implica que los precios de los tickets pueden estar expresados en distintas monedas y menta debe considerar esto para el pricing del mercado secundario."},"optionDescriptions_en":{"Moneda fija":"Checkout operates in a single predetermined currency (usually the local currency of the event or country of operation). No buyer currency selection.","Selección de moneda por el comprador":"The buyer can choose among multiple currencies at payment time. Implies ticket prices may be expressed in different currencies and menta must account for this in secondary market pricing."},"category_en":"Currency selection at checkout","category_es":"Selección de moneda en checkout","description_en":"Whether the platform allows the buyer to choose which currency to pay in during the primary purchase flow checkout. Affects how menta must handle prices and currencies in the secondary market.","description_es":"Si la plataforma permite al comprador elegir en qué moneda pagar durante el checkout del flujo de compra primaria. Afecta cómo menta debe manejar precios y monedas en el mercado secundario."}],"acceptance_criteria":[{"id":"AC-01","category":"Buyer confirmation email","category_en":"Buyer confirmation email","category_es":"Email de confirmación al comprador","options":["Enabled (menta-sent)","Disabled (partner-only communication)"],"options_en":["Enabled (menta-sent)","Disabled (partner-only communication)"],"description":"Acuerdo sobre si menta envía un email de confirmación de compra al comprador de reventa, o si la única comunicación post-compra viene del partner (vía su email de entrega del ticket).","description_en":"Agreement on whether menta sends a purchase confirmation email to the resale buyer, or whether the only post-purchase communication comes from the partner (via its ticket delivery email).","description_es":"Acuerdo sobre si menta envía un email de confirmación de compra al comprador de reventa, o si la única comunicación post-compra viene del partner (vía su email de entrega del ticket).","optionDescriptions":{"Enabled (menta-sent)":"menta envía un email de confirmación al comprador (sin el ticket — la entrega del ticket es responsabilidad del partner).","Disabled (partner-only communication)":"menta no envía email de confirmación. El partner envía un único email que contiene la entrega del ticket y toda la información de la compra."},"optionDescriptions_en":{"Enabled (menta-sent)":"menta sends a confirmation email to the buyer (without the ticket — ticket delivery is the partner's responsibility).","Disabled (partner-only communication)":"menta does not send a confirmation email. The partner sends a single email containing both ticket delivery and all purchase information."}},{"id":"AC-02","category":"Event image propagation","category_en":"Event image propagation","category_es":"Propagación de imagen del evento","options":["Required","Not required"],"options_en":["Required","Not required"],"description":"Acuerdo sobre si el partner debe proveer una imagen del evento y ésta debe renderizarse correctamente en el marketplace de reventa de menta.","description_en":"Agreement on whether the partner must provide an event image and whether that image must render correctly on menta's resale marketplace.","description_es":"Acuerdo sobre si el partner debe proveer una imagen del evento y ésta debe renderizarse correctamente en el marketplace de reventa de menta.","optionDescriptions":{"Required":"El partner debe incluir una imagen en cada evento sincronizado. La imagen debe propagarse al dashboard de menta y al marketplace customer-facing.","Not required":"La imagen del evento es opcional. menta puede operar sin imagen o aplicar un placeholder por defecto."},"optionDescriptions_en":{"Required":"The partner must include an image on each synced event. The image must propagate to menta's dashboard and customer-facing marketplace.","Not required":"The event image is optional. menta can operate without an image or apply a default placeholder."}}],"rules":[{"id":"R6","section":"TICKET DATA & INGEST MODEL","if":"DEC[Ticket data] = API menta (Only resellers)","connector":"IMPLIES","then":"CTA 'Vender' determinado por Render Ticket + reglas dashboard. Data de tickets se envía a menta recién al presionar 'Vender'. La ticketera debe registrar todos los tickets enviados a menta para notificar cancelaciones/ediciones.","because":"La ticketera solo envía vía API POST los tickets de usuarios que quieren vender — no el inventario completo. Render Ticket determina si el CTA aparece, y recién al presionar \"Vender\" se envía la data. La ticketera es la única fuente de verdad para saber qué tickets ya fueron enviados a menta — cualquier modificación posterior debe comunicarse solo respecto de esos tickets.","status":"CLEAN","then_es":"El CTA 'Vender' se determina por Render Ticket + reglas del dashboard. Los datos de tickets se envían a menta recién al presionar 'Vender'. La plataforma debe registrar todos los tickets enviados a menta para notificar cancelaciones/ediciones.","then_en":"The 'Sell' CTA is determined by Render Ticket + dashboard rules. Ticket data is sent to menta only when the user presses 'Sell'. The platform must track all tickets sent to menta to notify cancellations/edits.","because_es":"La plataforma solo envía vía API POST los tickets de usuarios que quieren vender — no el inventario completo. Render Ticket determina si el CTA aparece, y recién al presionar \"Vender\" se envía la data. La plataforma es la única fuente de verdad para saber qué tickets ya fueron enviados a menta — cualquier modificación posterior debe comunicarse solo respecto de esos tickets.","because_en":"The platform only sends via API POST the tickets of users who want to sell — not the full inventory. Render Ticket determines whether the CTA appears, and only when 'Sell' is pressed is the data sent. The platform is the single source of truth for knowing which tickets were already sent to menta — any subsequent modification must be communicated only for those tickets.","section_es":"DATOS DE TICKETS Y MODELO DE INGESTA","section_en":"TICKET DATA & INGEST MODEL"},{"id":"R1","section":"VISUALIZACIÓN & ACCESS TO SELL","if":"PREC[Visualización de tickets] = Agrupados por orden","connector":"REQUIRES","then":"Activar Ticket Management","because":"Cuando los tickets están agrupados por orden, la interfaz no puede mostrar CTAs correctos por ticket individual. Si una orden tiene tickets en distintos estados de reventa, la vista a nivel orden no permite gestionar correctamente. Ticket Management provee una pantalla donde el usuario gestiona la reventa a nivel ticket individual.","status":"CLEAN","then_es":"Activar Ticket Management","then_en":"Enable Ticket Management","because_es":"Cuando los tickets están agrupados por orden, la interfaz no puede mostrar CTAs correctos por ticket individual. Si una orden tiene tickets en distintos estados de reventa, la vista a nivel orden no permite gestionar correctamente. Ticket Management provee una pantalla donde el usuario gestiona la reventa a nivel ticket individual.","because_en":"When tickets are grouped by order, the interface cannot display correct CTAs per individual ticket. If an order has tickets in different resale states, the order-level view cannot manage them properly. Ticket Management provides a screen where the user manages resale at the individual ticket level.","section_es":"VISUALIZACIÓN Y ACCESO A VENDER","section_en":"VISUALIZATION & ACCESS TO SELL"},{"id":"R2","section":"VISUALIZACIÓN & ACCESS TO SELL","if":"DEC[Access to sell] = API menta (SAL)","connector":"REQUIRES","then":"PREC[Visualización de tickets] = Interfaz ticket details","because":"SAL devuelve componentes dinámicos (acciones, estados, condiciones) que deben colocarse en una interfaz que represente cada ticket de forma independiente. Sin interfaz de ticket details, no hay punto de anclaje para los CTAs de Vender, Cancelar, Editar precio, ni para mostrar el estado actual del ticket.","status":"CLEAN","then_es":"Se requiere una interfaz de detalle de ticket (ticket details) en la plataforma","then_en":"A ticket detail interface (ticket details) is required on the platform","because_es":"SAL devuelve componentes dinámicos (acciones, estados, condiciones) que deben colocarse en una interfaz que represente cada ticket de forma independiente. Sin interfaz de ticket details, no hay punto de anclaje para los CTAs de Vender, Cancelar, Editar precio, ni para mostrar el estado actual del ticket.","because_en":"SAL returns dynamic components (actions, statuses, conditions) that must be placed in an interface representing each ticket independently. Without a ticket details interface, there is no anchor point for the Sell, Cancel, Edit price CTAs, nor for displaying the ticket's current status.","section_es":"VISUALIZACIÓN Y ACCESO A VENDER","section_en":"VISUALIZATION & ACCESS TO SELL"},{"id":"R24","section":"VISUALIZACIÓN & ACCESS TO SELL","if":"DEC[Access to sell] = Static URL\nOR DEC[Access to sell] = Generic URL (Login Trust)","connector":"REQUIRES","then":"Activar Ticket Management","because":"Cuando el acceso a vender es via Static URL o Generic URL con Login Trust, el usuario no llega a través de SAL sino directo a un flujo de menta. Ticket Management es necesario para que el usuario pueda ver y gestionar sus tickets dentro de ese flujo, seleccionando cuáles vender. Ambas opciones comparten el mismo flujo de Ticket Management — la diferencia es solo el método de autenticación (OTP vs Login Trust).","status":"CLEAN","then_es":"Activar Ticket Management","then_en":"Enable Ticket Management","because_es":"Cuando el acceso a vender es vía Static URL o Generic URL con Login Trust, el usuario no llega a través de SAL sino directo a un flujo de menta. Ticket Management es necesario para que el usuario pueda ver y gestionar sus tickets dentro de ese flujo, seleccionando cuáles vender. Ambas opciones comparten el mismo flujo de Ticket Management — la diferencia es solo el método de autenticación (OTP vs Login Trust).","because_en":"When sell access is via Static URL or Generic URL with Login Trust, the user doesn't arrive through SAL but directly into a menta flow. Ticket Management is necessary so the user can view and manage their tickets within that flow, selecting which ones to sell. Both options share the same Ticket Management flow — the only difference is the authentication method (OTP vs Login Trust).","section_es":"VISUALIZACIÓN Y ACCESO A VENDER","section_en":"VISUALIZATION & ACCESS TO SELL"},{"id":"R25","section":"VISUALIZACIÓN & ACCESS TO SELL","if":"PREC[Visualización de tickets] = Ninguna interfaz","connector":"REQUIRES","then":"DEC[Access to sell] = Static URL | Generic URL (Login Trust)","because":"Si la ticketera no tiene ninguna interfaz de ticket details, no hay lugar donde inyectar los componentes de SAL. Las alternativas son Static URL o Generic URL con Login Trust, donde menta provee la interfaz completa de gestión de tickets mediante Ticket Management. Generic URL es preferible si el partner puede hacer API calls (evita OTP friction).","status":"CLEAN","then_es":"El acceso a vender debe ser Static URL o Generic URL (Login Trust)","then_en":"Access to sell must be Static URL or Generic URL (Login Trust)","because_es":"Si la plataforma no tiene ninguna interfaz de ticket details, no hay lugar donde inyectar los componentes de SAL. Las alternativas son Static URL o Generic URL con Login Trust, donde menta provee la interfaz completa de gestión de tickets mediante Ticket Management. Generic URL es preferible si el partner puede hacer API calls (evita OTP friction).","because_en":"If the platform has no ticket details interface, there is no place to inject SAL components. The alternatives are Static URL or Generic URL with Login Trust, where menta provides the full ticket management interface via Ticket Management. Generic URL is preferred if the partner can make API calls (avoids OTP friction).","section_es":"VISUALIZACIÓN Y ACCESO A VENDER","section_en":"VISUALIZATION & ACCESS TO SELL"},{"id":"R13","section":"AUTHENTICATION","if":"AC[Resale buyers need account on partner platform]","connector":"REQUIRES","then":"Auth = Login Force. Solo aplica si PREC[Change Ticket Owner] = Cuenta completa obligatoria. Si el CTO acepta guest o solo identificador, Login Force no es necesario — ver R16 y R17.","because":"Login Force solo se justifica cuando el partner exige explícitamente que todo comprador tenga una cuenta completa con login previo. En los demás casos (CTO acepta guest o solo email), hay alternativas de menor fricción que preservan mejor la conversión.","status":"CLEAN","then_es":"Auth = Login Force. Solo aplica si PREC[Change Ticket Owner] = Cuenta completa obligatoria. Si el CTO acepta guest o solo identificador, Login Force no es necesario — ver R16 y R17.","then_en":"Auth = Login Force. Only applies if PREC[Change Ticket Owner] = Full account required. If CTO accepts guest or identifier only, Login Force is not needed — see R16 and R17.","because_es":"Login Force solo se justifica cuando el partner exige explícitamente que todo comprador tenga una cuenta completa con login previo. En los demás casos (CTO acepta guest o solo email), hay alternativas de menor fricción que preservan mejor la conversión.","because_en":"Login Force is only justified when the partner explicitly requires every buyer to have a full account with prior login. In other cases (CTO accepts guest or email only), there are lower-friction alternatives that better preserve conversion.","section_es":"AUTENTICACIÓN","section_en":"AUTHENTICATION"},{"id":"R14","section":"AUTHENTICATION","if":"AC[Users must not re-authenticate on menta]","connector":"REQUIRES","then":"Auth = Login Trust","because":"Si el usuario no puede autenticarse nuevamente en menta, la única forma es que menta confíe en la autenticación ya realizada en la ticketera, reutilizando su sesión o token como fuente de identidad. Eso es exactamente lo que habilita Login Trust.","status":"CLEAN","then_es":"Auth = Login Trust","then_en":"Auth = Login Trust","because_es":"Si el usuario no puede autenticarse nuevamente en menta, la única forma es que menta confíe en la autenticación ya realizada en la plataforma, reutilizando su sesión o token como fuente de identidad. Eso es exactamente lo que habilita Login Trust.","because_en":"If the user cannot re-authenticate on menta, the only way is for menta to trust the authentication already performed on the platform, reusing their session or token as the identity source. This is exactly what Login Trust enables.","section_es":"AUTENTICACIÓN","section_en":"AUTHENTICATION"},{"id":"R16","section":"AUTHENTICATION","if":"PREC[Auth methodology] = Checkout Guest\nAND PREC[Change Ticket Owner] = Cuenta guest suficiente","connector":"REQUIRES","then":"El partner debe exponer un endpoint o proceso para crear usuarios guest programáticamente. Flujo: (1) menta completa la compra del comprador, (2) menta envía webhook de reventa completada al partner con el email del comprador, (3) el partner crea la cuenta guest con ese email, (4) el partner ejecuta el CTO. El comprador no ve ningún redirect ni login — la creación es invisible.","because":"El CTO requiere que exista un usuario guest en la plataforma, pero la plataforma permite compra como guest (sin cuenta previa). En lugar de usar Login Force (que destruye conversión con un redirect visible), el partner crea la cuenta programáticamente al recibir la notificación de reventa. Esto mantiene zero fricción para el comprador y cumple el requisito del CTO.","status":"CLEAN","then_es":"El partner debe exponer un endpoint o proceso para crear usuarios guest programáticamente. Flujo: (1) menta completa la compra del comprador, (2) menta envía webhook de reventa completada al partner con el email del comprador, (3) el partner crea la cuenta guest con ese email, (4) el partner ejecuta el CTO. El comprador no ve ningún redirect ni login — la creación es invisible.","then_en":"The partner must expose an endpoint or process to create guest users programmatically. Flow: (1) menta completes the buyer purchase, (2) menta sends completed resale webhook to partner with buyer email, (3) partner creates guest account with that email, (4) partner executes CTO. The buyer sees no redirect or login — creation is invisible.","because_es":"El CTO requiere que exista un usuario guest en la plataforma, pero la plataforma permite compra como guest (sin cuenta previa). En lugar de usar Login Force (que destruye conversión con un redirect visible), el partner crea la cuenta programáticamente al recibir la notificación de reventa. Esto mantiene zero fricción para el comprador y cumple el requisito del CTO.","because_en":"CTO requires a guest user record on the platform, but the platform allows guest checkout (no prior account). Instead of using Login Force (which destroys conversion with a visible redirect), the partner creates the account programmatically upon receiving the resale notification. This maintains zero friction for the buyer while fulfilling the CTO requirement.","section_es":"AUTENTICACIÓN","section_en":"AUTHENTICATION","if_es":"PREC[Auth methodology] = Checkout Guest\nAND PREC[Change Ticket Owner] = Requires account (Cuenta obligatoria)","if_en":"PREC[Auth methodology] = Checkout Guest\nAND PREC[Change Ticket Owner] = Requires account (Cuenta obligatoria)"},{"id":"R17","section":"AUTHENTICATION","if":"PREC[Auth methodology] = Checkout Guest\nAND PREC[Change Ticket Owner] = Solo identificador (email)","connector":"IMPLIES","then":"No se requiere creación de cuenta ni Login Force. menta pasa el email del comprador directamente al CTO del partner. El partner ejecuta la transferencia usando solo el identificador. Es el escenario de menor fricción posible.","because":"Si el CTO solo necesita un email para ejecutar la transferencia, no hay razón para crear una cuenta ni para forzar autenticación. El comprador compra en menta, menta notifica al partner con el email, y el partner transfiere el ticket sin más.","status":"CLEAN","then_es":"No se requiere creación de cuenta ni Login Force. menta pasa el email del comprador directamente al CTO del partner. El partner ejecuta la transferencia usando solo el identificador. Es el escenario de menor fricción posible.","then_en":"No account creation or Login Force required. menta passes the buyer email directly to the partner CTO. The partner executes the transfer using only the identifier. This is the lowest friction scenario possible.","because_es":"Si el CTO solo necesita un email para ejecutar la transferencia, no hay razón para crear una cuenta ni para forzar autenticación. El comprador compra en menta, menta notifica al partner con el email, y el partner transfiere el ticket sin más.","because_en":"If CTO only needs an email to execute the transfer, there is no reason to create an account or force authentication. The buyer purchases on menta, menta notifies the partner with the email, and the partner transfers the ticket directly.","section_es":"AUTENTICACIÓN","section_en":"AUTHENTICATION","if_es":"PREC[Auth methodology] = Checkout Guest\nAND PREC[Change Ticket Owner] = Doesnt require account (Guest)","if_en":"PREC[Auth methodology] = Checkout Guest\nAND PREC[Change Ticket Owner] = Doesnt require account (Guest)"},{"id":"R26","section":"AUTHENTICATION","if":"PREC[Auth methodology] = Guest checkout","connector":"IMPLIES","then":"DEC[Access to sell] = Static URL (hasta que el usuario cree cuenta)","because":"Un usuario que compró como guest no tiene sesión ni cuenta en la ticketera. Si el access to sell es via SAL, necesita estar autenticado. Sin cuenta, SAL no puede funcionar. Static URL permite que el usuario acceda al flujo de venta sin depender de una sesión preexistente.","status":"CLEAN","then_es":"El acceso a vender = Static URL (hasta que el usuario cree cuenta)","then_en":"Access to sell = Static URL (until the user creates an account)","because_es":"Un usuario que compró como guest no tiene sesión ni cuenta en la plataforma. Si el acceso a vender es vía SAL, necesita estar autenticado. Sin cuenta, SAL no puede funcionar. Static URL permite que el usuario acceda al flujo de venta sin depender de una sesión preexistente.","because_en":"A user who purchased as guest has no session or account on the platform. If sell access is via SAL, they need to be authenticated. Without an account, SAL cannot work. Static URL allows the user to access the sell flow without depending on a pre-existing session.","section_es":"AUTENTICACIÓN","section_en":"AUTHENTICATION"},{"id":"R4","section":"QR PROTECTION","if":"PREC[Protección/Tecnología] = QR dinámico","connector":"IMPLIES","then":"Remover funcionalidad de 'unlock' del dashboard. Exponer solo cierre del mercado secundario.","because":"Con QR dinámico, menta no puede ni debe participar en ningún mecanismo de desbloqueo. Mantener visible el parámetro de unlock genera confusión. El único control relevante es el cierre del mercado secundario.","status":"CLEAN","then_es":"Remover funcionalidad de 'unlock' del dashboard. Exponer solo cierre del mercado secundario.","then_en":"Remove 'unlock' functionality from the dashboard. Expose only secondary market close.","because_es":"Con QR dinámico, menta no puede ni debe participar en ningún mecanismo de desbloqueo. Mantener visible el parámetro de unlock genera confusión. El único control relevante es el cierre del mercado secundario.","because_en":"With dynamic QR, menta cannot and should not participate in any unlock mechanism. Keeping the unlock parameter visible generates confusion. The only relevant control is the secondary market close.","section_es":"PROTECCIÓN DE QR","section_en":"QR PROTECTION"},{"id":"R22","section":"QR PROTECTION","if":"PREC[Protección/Tecnología] = QR dinámico","connector":"IMPLIES","then":"Ocultar 'tiempo de desbloqueo' del dashboard. Exponer solo cierre del mercado secundario con default de 2 horas antes del evento.","because":"Con QR dinámico, el concepto de 'unlock' no existe. Mantener ese parámetro visible genera confusión. El valor por defecto de 2 horas para cierre del mercado secundario provee una configuración segura inicial, ajustable según particularidades del evento.","status":"CLEAN","then_es":"Ocultar 'tiempo de desbloqueo' del dashboard. Exponer solo cierre del mercado secundario con default de 2 horas antes del evento.","then_en":"Hide 'unlock time' from the dashboard. Expose only secondary market close with a default of 2 hours before the event.","because_es":"Con QR dinámico, el concepto de 'unlock' no existe. Mantener ese parámetro visible genera confusión. El valor por defecto de 2 horas para cierre del mercado secundario provee una configuración segura inicial, ajustable según particularidades del evento.","because_en":"With dynamic QR, the concept of 'unlock' does not exist. Keeping that parameter visible generates confusion. The 2-hour default for secondary market close provides a safe initial configuration, adjustable per event specifics.","section_es":"PROTECCIÓN DE QR","section_en":"QR PROTECTION"},{"id":"R23","section":"QR PROTECTION","if":"PREC[Protección/Tecnología] = QR delay | QR lock\nAND AC[Resale must NOT be enabled once users have seen their QR codes]","connector":"REQUIRES","then":"Coordinar el tiempo de desbloqueo del QR con el cierre del mercado secundario en menta. La ticketera debe enviar el tiempo de desbloqueo como parte de la información del show.","because":"Aunque Change Ticket Owner con regeneración de QR elimina riesgos de seguridad estricta, permitir reventa post-QR visible genera fricción operativa: usuarios intentan ingresar con QRs antiguos, conflictos con staff del venue, carga de soporte. Coordinar unlock con cierre previene estos escenarios.","status":"CLEAN","then_es":"Coordinar el tiempo de desbloqueo del QR con el cierre del mercado secundario en menta. La plataforma debe enviar el tiempo de desbloqueo como parte de la información del show.","then_en":"Coordinate the QR unlock time with the secondary market close in menta. The platform must send the unlock time as part of the show information.","because_es":"Aunque Change Ticket Owner con regeneración de QR elimina riesgos de seguridad estricta, permitir reventa post-QR visible genera fricción operativa: usuarios intentan ingresar con QRs antiguos, conflictos con staff del venue, carga de soporte. Coordinar unlock con cierre previene estos escenarios.","because_en":"Although Change Ticket Owner with QR regeneration eliminates strict security risks, allowing resale after QR is visible generates operational friction: users trying to enter with old QRs, conflicts with venue staff, support load. Coordinating unlock with close prevents these scenarios.","section_es":"PROTECCIÓN DE QR","section_en":"QR PROTECTION"},{"id":"R30","section":"QR PROTECTION","if":"PREC[Protección/Tecnología] ≠ QR lock","connector":"REQUIRES","then":"Change Ticket Owner debe regenerar QR code","because":"Con QR lock, el vendedor nunca tuvo acceso visual al QR original, por lo que la regeneración no es un hard requirement (aunque sí recomendable). En cualquier otro modelo (delay, dinámico, estático, código de barras, ninguna), el vendedor ya tuvo o podría tener acceso a su QR. Sin regeneración, existe riesgo de doble acceso.","status":"CLEAN","then_es":"Change Ticket Owner debe regenerar el código QR","then_en":"Change Ticket Owner must regenerate the QR code","because_es":"Con QR lock, el vendedor nunca tuvo acceso visual al QR original, por lo que la regeneración no es un requisito estricto (aunque sí recomendable). En cualquier otro modelo (delay, dinámico, estático, código de barras, ninguna), el vendedor ya tuvo o podría tener acceso a su QR. Sin regeneración, existe riesgo de doble acceso.","because_en":"With QR lock, the seller never had visual access to the original QR, so regeneration is not a strict requirement (though recommended). In any other model (delay, dynamic, static, barcode, none), the seller already had or could have had access to their QR. Without regeneration, there is a risk of double access.","section_es":"PROTECCIÓN DE QR","section_en":"QR PROTECTION"},{"id":"R3","section":"RENDER TICKET","if":"DEC[Ticket data] = External API","connector":"IMPLIES","then":"Todos los tickets que menta no conoce deben mostrar CTA 'Vender' por default (si listing ON para show, ticket option y price type). Render Ticket debe exigir ticketId. Si estructura desacoplada, también ticketOptionId y priceTypeId.","because":"Bajo External API, menta puede no tener sincronizado todo el inventario. Cuando la ticketera llama a Render Ticket, el usuario espera saber si puede vender. Para evitar 'errores falsos', si las reglas de listing están ON, se muestra CTA por default. La validación fuerte ocurre en el click, no en el render.","status":"CLEAN","then_es":"Todos los tickets que menta no conoce deben mostrar CTA 'Vender' por default (si listing ON para show, ticket option y price type). Render Ticket debe exigir ticketId. Si estructura desacoplada, también ticketOptionId y priceTypeId.","then_en":"All tickets unknown to menta must show a 'Sell' CTA by default (if listing is ON for show, ticket option, and price type). Render Ticket must require ticketId. If decoupled structure, also ticketOptionId and priceTypeId.","because_es":"Bajo External API, menta puede no tener sincronizado todo el inventario. Cuando la plataforma llama a Render Ticket, el usuario espera saber si puede vender. Para evitar 'errores falsos', si las reglas de listing están ON, se muestra CTA por default. La validación fuerte ocurre en el click, no en el render.","because_en":"Under External API, menta may not have the full inventory synced. When the platform calls Render Ticket, the user expects to know if they can sell. To avoid 'false errors', if listing rules are ON, the CTA is shown by default. Strong validation happens on click, not on render.","section_es":"RENDER DE TICKETS","section_en":"RENDER TICKET"},{"id":"R28","section":"RENDER TICKET","if":"PREC[Protección/Tecnología] = QR lock | QR delay","connector":"IMPLIES","then":"La ticketera debe seguir llamando a Render Ticket después del desbloqueo de QRs.","because":"Post-unlock, la ticketera podría asumir que ya no necesita consultar Render Ticket. Sin embargo, los tickets vendidos necesitan seguir mostrando 'View Details' para que el vendedor vea información de la venta (monto, dónde recibe el pago). Además, el estado de un ticket puede seguir cambiando post-unlock.","status":"CLEAN","then_es":"La plataforma debe seguir llamando a Render Ticket después del desbloqueo de QRs.","then_en":"The platform must continue calling Render Ticket after QR unlock.","because_es":"Post-unlock, la plataforma podría asumir que ya no necesita consultar Render Ticket. Sin embargo, los tickets vendidos necesitan seguir mostrando 'View Details' para que el vendedor vea información de la venta (monto, dónde recibe el pago). Además, el estado de un ticket puede seguir cambiando post-unlock.","because_en":"Post-unlock, the platform might assume it no longer needs to query Render Ticket. However, sold tickets need to continue showing 'View Details' so the seller can see sale information (amount, where they receive payment). Additionally, a ticket's status can continue changing post-unlock.","section_es":"RENDER DE TICKETS","section_en":"RENDER TICKET"},{"id":"R29","section":"RENDER TICKET","if":"DEC[Access to sell] = API menta (SAL)","connector":"REQUIRES","then":"La ticketera debe implementar handling de error para que un fallo de la API de menta no afecte la visualización de tickets.","because":"Render Ticket es un servicio externo. Si la API tiene downtime o responde lento, la página de 'Mis Tickets' de la ticketera no puede dejar de funcionar. Los tickets deben seguir visibles — solo los CTAs de reventa estarían ausentes. La respuesta de Render Ticket es un componente opcional que enriquece la vista, no una dependencia bloqueante.","status":"CLEAN","then_es":"La plataforma debe implementar manejo de errores para que un fallo de la API de menta no afecte la visualización de tickets.","then_en":"The platform must implement error handling so that a menta API failure does not affect ticket display.","because_es":"Render Ticket es un servicio externo. Si la API tiene downtime o responde lento, la página de 'Mis Tickets' no puede dejar de funcionar. Los tickets deben seguir visibles — solo los CTAs de reventa estarían ausentes. La respuesta de Render Ticket es un componente opcional que enriquece la vista, no una dependencia bloqueante.","because_en":"Render Ticket is an external service. If the API has downtime or responds slowly, the 'My Tickets' page must not stop working. Tickets must remain visible — only the resale CTAs would be absent. The Render Ticket response is an optional component that enriches the view, not a blocking dependency.","section_es":"RENDER DE TICKETS","section_en":"RENDER TICKET"},{"id":"R11","section":"MARKET MAKING","if":"DEC[Market Making — Inventory] = External API (Deferred)","connector":"IMPLIES","then":"Todas las acciones dependientes de esta información (% soldout, ticket holder base, disponibilidad, métricas de demanda) estarán limitadas a la frecuencia de los requests que realiza menta.","because":"Cuando se utiliza External Data, menta depende de requests periódicos (pull), no notificaciones push. Cualquier métrica calculada sobre esa data solo puede ser tan fresca como el intervalo entre requests. Todas las automatizaciones deben diseñarse asumiendo este desfase.","status":"CLEAN","then_es":"Todas las acciones dependientes de esta información (% soldout, ticket holder base, disponibilidad, métricas de demanda) estarán limitadas a la frecuencia de los requests que realiza menta.","then_en":"All actions dependent on this information (% sold-out, ticket holder base, availability, demand metrics) will be limited to the frequency of requests menta makes.","because_es":"Cuando se utiliza External Data, menta depende de requests periódicos (pull), no notificaciones push. Cualquier métrica calculada sobre esa data solo puede ser tan fresca como el intervalo entre requests. Todas las automatizaciones deben diseñarse asumiendo este desfase.","because_en":"When using External Data, menta depends on periodic requests (pull), not push notifications. Any metric calculated on this data can only be as fresh as the interval between requests. All automations must be designed assuming this lag.","section_es":"MARKET MAKING","section_en":"MARKET MAKING"},{"id":"R12","section":"INFO STRUCTURE / PRICE TYPES","if":"PREC[Estructura de precios] = Only category (no price types)","connector":"EXCLUDES","then":"DEC[Price info structure] = Decoupled simple | Decoupled complex","because":"Los modelos decoupled requieren que la ticketera maneje price types como entidad diferenciada. Si no tiene price types, no se puede representar estructura desacoplada ya que la información necesaria no está disponible.","status":"CLEAN","then_es":"Se excluyen los modelos Decoupled simple y Decoupled complex de la estructura de precios","then_en":"Decoupled simple and Decoupled complex price structures are excluded","because_es":"Los modelos decoupled requieren que la plataforma maneje price types como entidad diferenciada. Si no tiene price types, no se puede representar estructura desacoplada ya que la información necesaria no está disponible.","because_en":"Decoupled models require the platform to handle price types as a differentiated entity. If it has no price types, a decoupled structure cannot be represented since the required information is not available.","section_es":"ESTRUCTURA DE PRECIOS","section_en":"PRICE STRUCTURE"},{"id":"R27","section":"INFO STRUCTURE / PRICE TYPES","if":"DEC[Price info structure] = Decouple simple","connector":"IMPLIES","then":"Existe un máximo práctico de combinaciones ticket options × price types que el sistema puede gestionar.","because":"En el modelo desacoplado simple, todas las combinaciones posibles se crean explícitamente. Si hay muchas categorías y price types, las combinaciones crecen exponencialmente, generando problemas de UX y performance. Se debe validar con la ticketera cuántas combinaciones reales existen.","status":"CLEAN","then_es":"Existe un máximo práctico de combinaciones ticket options × price types que el sistema puede gestionar.","then_en":"There is a practical maximum of ticket options × price types combinations the system can manage.","because_es":"En el modelo desacoplado simple, todas las combinaciones posibles se crean explícitamente. Si hay muchas categorías y price types, las combinaciones crecen exponencialmente, generando problemas de UX y performance. Se debe validar con la plataforma cuántas combinaciones reales existen.","because_en":"In the simple decoupled model, all possible combinations are explicitly created. If there are many categories and price types, combinations grow exponentially, causing UX and performance issues. The actual number of real combinations must be validated with the platform.","section_es":"ESTRUCTURA DE PRECIOS","section_en":"PRICE STRUCTURE"},{"id":"R32","section":"EVENT ACTIVATION","if":"DEC[Event Activation] = Selected events","connector":"IMPLIES","then":"La ticketera solo debe hacer requests a SAL (Sell/Buy) para eventos que tienen menta activado.","because":"Si la ticketera hace requests de SAL para eventos no sincronizados con menta, recibirá errores o respuestas vacías, generando confusión en la UI o carga innecesaria en la API. La ticketera debe verificar el flag de sincronización antes de llamar a SAL.","status":"CLEAN","then_es":"La plataforma solo debe hacer requests a SAL (Sell/Buy) para eventos que tienen menta activado.","then_en":"The platform must only make SAL (Sell/Buy) requests for events that have menta activated.","because_es":"Si la plataforma hace requests de SAL para eventos no sincronizados con menta, recibirá errores o respuestas vacías, generando confusión en la UI o carga innecesaria en la API. La plataforma debe verificar el flag de sincronización antes de llamar a SAL.","because_en":"If the platform makes SAL requests for events not synced with menta, it will receive errors or empty responses, generating UI confusion or unnecessary API load. The platform must verify the sync flag before calling SAL.","section_es":"ACTIVACIÓN DE EVENTOS","section_en":"EVENT ACTIVATION"},{"id":"R37","section":"EVENT ACTIVATION","if":"DEC[Event Activation] = All events\nAND PREC[Event structure] = multi show","connector":"REQUIRES","then":"La ticketera debe incluir una variable de webvisibility en los shows que aún no están a la venta.","because":"Si la ticketera envía todos los shows incluyendo los que no salieron a venta primaria, menta podría habilitar reventa para shows que el público todavía no puede comprar. El flag de webvisibility permite que menta reciba la data pero no active la reventa hasta que el show esté disponible.","status":"CLEAN","then_es":"La plataforma debe incluir una variable de webvisibility en los shows que aún no están a la venta.","then_en":"The platform must include a webvisibility variable for shows that are not yet on sale.","because_es":"Si la plataforma envía todos los shows incluyendo los que no salieron a venta primaria, menta podría habilitar reventa para shows que el público todavía no puede comprar. El flag de webvisibility permite que menta reciba la data pero no active la reventa hasta que el show esté disponible.","because_en":"If the platform sends all shows including those not yet on primary sale, menta could enable resale for shows the public cannot yet purchase. The webvisibility flag allows menta to receive the data but not activate resale until the show is available.","section_es":"ACTIVACIÓN DE EVENTOS","section_en":"EVENT ACTIVATION","if_es":"DEC[Event Activation] = All events\nAND PREC[Event structure] = multi show","if_en":"DEC[Event Activation] = All events\nAND PREC[Event structure] = multi show"},{"id":"R15","section":"TRANSFER, ABONOS & CUOTAS","if":"PREC[Transfer/share] = enabled\nAND DEC[Ticket data] = GetUserData","connector":"REQUIRES","then":"Los tickets transferidos deben ser excluidos del endpoint GetUserData.","because":"Si GetUserData incluyera tickets transferidos, menta podría mostrar tickets que el usuario ya no posee, permitir intentar vender tickets que no le pertenecen, y generar errores de ownership. GetUserData debe reflejar únicamente los tickets que pertenecen efectivamente al usuario.","status":"CLEAN","then_es":"Los tickets transferidos deben ser excluidos del endpoint GetUserData.","then_en":"Transferred tickets must be excluded from the GetUserData endpoint.","because_es":"Si GetUserData incluyera tickets transferidos, menta podría mostrar tickets que el usuario ya no posee, permitir intentar vender tickets que no le pertenecen, y generar errores de ownership. GetUserData debe reflejar únicamente los tickets que pertenecen efectivamente al usuario.","because_en":"If GetUserData included transferred tickets, menta could show tickets the user no longer owns, allow attempting to sell tickets that don't belong to them, and generate ownership errors. GetUserData must reflect only the tickets that effectively belong to the user.","section_es":"TRANSFERENCIAS, ABONOS Y CUOTAS","section_en":"TRANSFERS, SEASON PASSES & INSTALLMENTS"},{"id":"R18","section":"TRANSFER, ABONOS & CUOTAS","if":"PREC[Abonos] = Un QR por abono","connector":"REQUIRES","then":"Change Ticket Owner debe generar nuevo QR para el comprador. El QR original del abono debe perder acceso al show vendido. En el frontend debe reflejarse que el vendedor ya no tiene acceso a ese show.","because":"Con un único QR para múltiples shows, si un show se revende sin invalidar el acceso del QR original, se genera doble acceso. El Change Ticket Owner debe regenerar QR para el comprador y remover acceso del original al show vendido.","status":"CLEAN","then_es":"Change Ticket Owner debe generar nuevo QR para el comprador. El QR original del abono debe perder acceso al show vendido. En el frontend debe reflejarse que el vendedor ya no tiene acceso a ese show.","then_en":"Change Ticket Owner must generate a new QR for the buyer. The original season pass QR must lose access to the sold show. The frontend must reflect that the seller no longer has access to that show.","because_es":"Con un único QR para múltiples shows, si un show se revende sin invalidar el acceso del QR original, se genera doble acceso. El Change Ticket Owner debe regenerar QR para el comprador y remover acceso del original al show vendido.","because_en":"With a single QR for multiple shows, if a show is resold without invalidating the original QR's access, double access is generated. The Change Ticket Owner must regenerate the QR for the buyer and remove access from the original to the sold show.","section_es":"TRANSFERENCIAS, ABONOS Y CUOTAS","section_en":"TRANSFERS, SEASON PASSES & INSTALLMENTS"},{"id":"R19","section":"TRANSFER, ABONOS & CUOTAS","if":"PREC[Gestión de Cuotas] = Gestiona el Sistema\nOR PREC[Gestión de Cuotas] = Gestiona el Procesador","connector":"IMPLIES","then":"Si Ticket data = GetUserData: el ticket NO debe aparecer en la respuesta mientras existan cuotas pendientes.\nSi Ticket data = API menta: la ticketera NO debe enviar el ticket hasta que todas las cuotas estén pagadas.","because":"Cuando un ticket fue adquirido con cuotas, el pago no está finalizado hasta que se abonan todos los installments. La restricción se modela a nivel data source: el ticket no existe para menta hasta que se paguen las cuotas. Así no se pueden crear listings inválidos y se evitan inconsistencias.","status":"CLEAN","then_es":"Si Ticket data = GetUserData: el ticket NO debe aparecer en la respuesta mientras existan cuotas pendientes.\nSi Ticket data = API menta: la plataforma NO debe enviar el ticket hasta que todas las cuotas estén pagadas.","then_en":"If Ticket data = GetUserData: the ticket must NOT appear in the response while installments are pending.\nIf Ticket data = API menta: the platform must NOT send the ticket until all installments are paid.","because_es":"Cuando un ticket fue adquirido con cuotas, el pago no está finalizado hasta que se abonan todos los installments. La restricción se modela a nivel data source: el ticket no existe para menta hasta que se paguen las cuotas. Así no se pueden crear listings inválidos y se evitan inconsistencias.","because_en":"When a ticket was purchased in installments, payment is not finalized until all installments are paid. The restriction is modeled at the data source level: the ticket does not exist for menta until installments are paid. This prevents invalid listings and avoids inconsistencies.","section_es":"TRANSFERENCIAS, ABONOS Y CUOTAS","section_en":"TRANSFERS, SEASON PASSES & INSTALLMENTS","if_es":"PREC[Gestión de Cuotas] = Gestiona el Sistema\nOR PREC[Gestión de Cuotas] = Gestiona el Procesador","if_en":"PREC[Gestión de Cuotas] = Gestiona el Sistema\nOR PREC[Gestión de Cuotas] = Gestiona el Procesador"},{"id":"R40","section":"TRANSFER, ABONOS & CUOTAS","if":"PREC[Abonos] ≠ No tienen","connector":"IMPLIES","then":"Cada sesión/partido del abono debe venir con el precio prorrateado (precio total del abono ÷ cantidad de partidos contenidos).","because":"Para que un usuario pueda vender una sesión individual, menta necesita el face value de esa sesión para calcular reglas de precio min/max y comisiones. Como el abono se vendió como paquete, la ticketera debe enviar el precio prorrateado por sesión.","status":"CLEAN","then_es":"Cada sesión/partido del abono debe venir con el precio prorrateado (precio total del abono ÷ cantidad de partidos contenidos).","then_en":"Each session/match of the season pass must include the prorated price (total season pass price ÷ number of included matches).","because_es":"Para que un usuario pueda vender una sesión individual, menta necesita el face value de esa sesión para calcular reglas de precio min/max y comisiones. Como el abono se vendió como paquete, la plataforma debe enviar el precio prorrateado por sesión.","because_en":"For a user to sell an individual session, menta needs the face value of that session to calculate min/max price rules and commissions. Since the season pass was sold as a package, the platform must send the prorated price per session.","section_es":"TRANSFERENCIAS, ABONOS Y CUOTAS","section_en":"TRANSFERS, SEASON PASSES & INSTALLMENTS"},{"id":"R20","section":"AUTH DATA, APP & INFRAESTRUCTURA","if":"PREC[App] = enabled (ticketera tiene app nativa)","connector":"REQUIRES","then":"El link 'My tickets' debe redirigir al usuario a descargar/abrir la app mediante deeplink.","because":"Si la ticketera es app-first, el usuario accede a la gestión de tickets desde la app. El entrypoint 'My tickets' no puede quedar en una vista web incompleta. El link debe redirigir via deeplink, y si la app no está instalada, llevar al store.","status":"CLEAN","then_es":"El link 'My tickets' debe redirigir al usuario a descargar/abrir la app mediante deeplink.","then_en":"The 'My tickets' link must redirect the user to download/open the app via deeplink.","because_es":"Si la plataforma es app-first, el usuario accede a la gestión de tickets desde la app. El entrypoint 'My tickets' no puede quedar en una vista web incompleta. El link debe redirigir vía deeplink, y si la app no está instalada, llevar al store.","because_en":"If the platform is app-first, the user accesses ticket management from the app. The 'My tickets' entrypoint cannot remain as an incomplete web view. The link must redirect via deeplink, and if the app is not installed, redirect to the store.","section_es":"AUTH DATA, APP E INFRAESTRUCTURA","section_en":"AUTH DATA, APP & INFRASTRUCTURE"},{"id":"R21","section":"AUTH DATA, APP & INFRAESTRUCTURA","if":"PREC[Auth Data] = Phone number","connector":"REQUIRES","then":"El número de teléfono debe incluirse en el campo buyerEmail.\nAND menta debe tener acceso a enviar y validar códigos OTP al teléfono del usuario.","because":"Cuando el identificador principal es el teléfono y no el email, menta requiere un identificador único. El teléfono se mapea en buyerEmail como alias técnico para identificación. Adicionalmente, menta necesita poder verificar la identidad del usuario via OTP al teléfono.","status":"CLEAN","then_es":"El número de teléfono debe incluirse en el campo buyerEmail.\nY menta debe tener acceso a enviar y validar códigos OTP al teléfono del usuario.","then_en":"The phone number must be included in the buyerEmail field.\nAND menta must have access to send and validate OTP codes to the user's phone.","because_es":"Cuando el identificador principal es el teléfono y no el email, menta requiere un identificador único. El teléfono se mapea en buyerEmail como alias técnico para identificación. Adicionalmente, menta necesita poder verificar la identidad del usuario vía OTP al teléfono.","because_en":"When the primary identifier is the phone and not the email, menta requires a unique identifier. The phone is mapped in buyerEmail as a technical alias for identification. Additionally, menta needs to verify the user's identity via OTP to their phone.","section_es":"AUTH DATA, APP E INFRAESTRUCTURA","section_en":"AUTH DATA, APP & INFRASTRUCTURE"},{"id":"R36","section":"AUTH DATA, APP & INFRAESTRUCTURA","if":"PREC[Múltiples API keys por país/operación] = Sí","connector":"REQUIRES","then":"La ticketera debe implementar un sistema de routing que según el evento utilice la API key correspondiente.","because":"Cuando una ticketera opera en múltiples países con diferentes API keys de menta, los reque
