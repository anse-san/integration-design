sts deben dirigirse al entorno correcto. Si un evento de Argentina se envía con el API key de México, los datos se indexan en el tenant incorrecto.","status":"CLEAN","then_es":"La plataforma debe implementar un sistema de routing que según el evento utilice la API key correspondiente.","then_en":"The platform must implement a routing system that uses the corresponding API key based on the event.","because_es":"Cuando una plataforma opera en múltiples países con diferentes API keys de menta, los requests deben dirigirse al entorno correcto. Si un evento de Argentina se envía con el API key de México, los datos se indexan en el tenant incorrecto.","because_en":"When a platform operates in multiple countries with different menta API keys, requests must be directed to the correct environment. If an event from Argentina is sent with the Mexico API key, the data is indexed in the wrong tenant.","section_es":"AUTH DATA, APP E INFRAESTRUCTURA","section_en":"AUTH DATA, APP & INFRASTRUCTURE"},{"id":"R42","section":"AUTH DATA, APP & INFRAESTRUCTURA","if":"AC[Opera en US]","connector":"REQUIRES","then":"Country, ISO code y Postal Code en la ubicación del show.","because":"En Estados Unidos, los requisitos regulatorios dependen de la jurisdicción. El postal code es necesario para el cálculo de sales tax, que varía por estado, condado y ciudad. Sin estos datos, menta no puede calcular impuestos correctamente.","status":"CLEAN","then_es":"Country, ISO code y Postal Code en la ubicación del show.","then_en":"Country, ISO code, and Postal Code in the show location.","because_es":"En Estados Unidos, los requisitos regulatorios dependen de la jurisdicción. El postal code es necesario para el cálculo de sales tax, que varía por estado, condado y ciudad. Sin estos datos, menta no puede calcular impuestos correctamente.","because_en":"In the United States, regulatory requirements depend on the jurisdiction. The postal code is necessary for sales tax calculation, which varies by state, county, and city. Without this data, menta cannot calculate taxes correctly.","section_es":"AUTH DATA, APP E INFRAESTRUCTURA","section_en":"AUTH DATA, APP & INFRASTRUCTURE"},{"id":"R34","section":"PLANIMETRÍA / MAPA INTERACTIVO","if":"PREC[Planimetría] = Desarrollo propio | Tercero","connector":"REQUIRES","then":"Bloquear asientos en el mapa una vez que un usuario los seleccionó y procedió al checkout.","because":"Sin bloqueo durante el checkout, dos usuarios podrían seleccionar el mismo asiento simultáneamente. En un mapa interactivo, el usuario seleccionó un asiento específico, generando una expectativa concreta. El bloqueo temporal previene esta race condition.","status":"CLEAN","then_es":"Bloquear asientos en el mapa una vez que un usuario los seleccionó y procedió al checkout.","then_en":"Lock seats on the map once a user selects them and proceeds to checkout.","because_es":"Sin bloqueo durante el checkout, dos usuarios podrían seleccionar el mismo asiento simultáneamente. En un mapa interactivo, el usuario seleccionó un asiento específico, generando una expectativa concreta. El bloqueo temporal previene esta race condition.","because_en":"Without locking during checkout, two users could select the same seat simultaneously. In an interactive map, the user selected a specific seat, creating a concrete expectation. Temporary locking prevents this race condition.","section_es":"PLANIMETRÍA / MAPA INTERACTIVO","section_en":"SEAT MAP / INTERACTIVE MAP"},{"id":"R38","section":"PLANIMETRÍA / MAPA INTERACTIVO","if":"PREC[Planimetría] = Desarrollo propio | Tercero","connector":"REQUIRES","then":"Utilizar el parámetro de orphan tickets en la response de SAL. Si la ticketera no lo usa, remover la configuración del dashboard.","because":"SAL expone un parámetro para configurar si se bloquean asientos que generarían huérfanos. Si la ticketera no lo consume, la configuración en el dashboard no tiene efecto. Se debe remover para evitar dar la impresión de que está funcionando.","status":"CLEAN","then_es":"Utilizar el parámetro de orphan tickets en la response de SAL. Si la plataforma no lo usa, remover la configuración del dashboard.","then_en":"Use the orphan tickets parameter in the SAL response. If the platform does not use it, remove the configuration from the dashboard.","because_es":"SAL expone un parámetro para configurar si se bloquean asientos que generarían huérfanos. Si la plataforma no lo consume, la configuración en el dashboard no tiene efecto. Se debe remover para evitar dar la impresión de que está funcionando.","because_en":"SAL exposes a parameter to configure whether seats that would generate orphans are blocked. If the platform does not consume it, the dashboard configuration has no effect. It should be removed to avoid giving the impression that it is working.","section_es":"PLANIMETRÍA / MAPA INTERACTIVO","section_en":"SEAT MAP / INTERACTIVE MAP"},{"id":"R46","section":"CANCELACIÓN / DEVOLUCIÓN","if":"PREC[Granularidad de cancelación] = Por orden completa","connector":"IMPLIES","then":"La ticketera debe excluir de la cancelación los tickets revendidos via menta. Si no puede excluirlos, debe notificar a menta para cancelar la reventa y gestionar el payout.","because":"Al cancelar una orden completa, si algún ticket ya fue revendido, el comprador de reventa ya pagó y espera su ticket. Cancelar sin gestionar la reventa genera: comprador sin ticket, payout pendiente incorrecto, y potencialmente un chargeback.","status":"CLEAN","then_es":"La plataforma debe excluir de la cancelación los tickets revendidos vía menta. Si no puede excluirlos, debe notificar a menta para cancelar la reventa y gestionar el payout.","then_en":"The platform must exclude tickets resold via menta from cancellation. If it cannot exclude them, it must notify menta to cancel the resale and manage the payout.","because_es":"Al cancelar una orden completa, si algún ticket ya fue revendido, el comprador de reventa ya pagó y espera su ticket. Cancelar sin gestionar la reventa genera: comprador sin ticket, payout pendiente incorrecto, y potencialmente un chargeback.","because_en":"When cancelling a complete order, if any ticket was already resold, the resale buyer has already paid and expects their ticket. Cancelling without managing the resale generates: buyer without ticket, incorrect pending payout, and potentially a chargeback.","section_es":"CANCELACIÓN / DEVOLUCIÓN","section_en":"CANCELLATION / REFUNDS"},{"id":"R47","section":"CANCELACIÓN / DEVOLUCIÓN","if":"PREC[Granularidad de cancelación] = Parcial (por ticket)\nAND PREC[Capacidad de reembolso de dinero] = Reembolso total únicamente","connector":"IMPLIES","then":"No se debe permitir cancelar tickets que fueron revendidos. Si se intenta, la ticketera debe notificar a menta para cancelar el payout correspondiente.","because":"En cancelación parcial con reembolso total, si un ticket ya fue revendido y se cancela, afecta al comprador de reventa. La ticketera debe bloquear la cancelación de tickets revendidos, o si la cancela, avisar a menta para cancelar el payout.","status":"CLEAN","then_es":"No se debe permitir cancelar tickets que fueron revendidos. Si se intenta, la plataforma debe notificar a menta para cancelar el payout correspondiente.","then_en":"Cancelling tickets that were resold must not be allowed. If attempted, the platform must notify menta to cancel the corresponding payout.","because_es":"En cancelación parcial con reembolso total, si un ticket ya fue revendido y se cancela, afecta al comprador de reventa. La plataforma debe bloquear la cancelación de tickets revendidos, o si la cancela, avisar a menta para cancelar el payout.","because_en":"In partial cancellation with total refund, if a ticket was already resold and is cancelled, it affects the resale buyer. The platform must block cancellation of resold tickets, or if cancelled, notify menta to cancel the payout.","section_es":"CANCELACIÓN / DEVOLUCIÓN","section_en":"CANCELLATION / REFUNDS"},{"id":"R48","section":"CANCELACIÓN / DEVOLUCIÓN","if":"PREC[Granularidad de cancelación] = Parcial (por ticket)\nAND PREC[Capacidad de reembolso de dinero] = Reembolso parcial habilitado","connector":"IMPLIES","then":"Tickets revendidos no se cancelan ni se devuelven. La ticketera debe excluirlos del flujo de cancelación/devolución.","because":"Los tickets revendidos ya cambiaron de dueño. El vendedor original ya vendió y el comprador de reventa espera usarlo. Incluir tickets revendidos en una cancelación parcial genera inconsistencias de ownership, payouts incorrectos y experiencia rota.","status":"CLEAN","then_es":"Tickets revendidos no se cancelan ni se devuelven. La plataforma debe excluirlos del flujo de cancelación/devolución.","then_en":"Resold tickets are not cancelled or refunded. The platform must exclude them from the cancellation/refund flow.","because_es":"Los tickets revendidos ya cambiaron de dueño. El vendedor original ya vendió y el comprador de reventa espera usarlo. Incluir tickets revendidos en una cancelación parcial genera inconsistencias de ownership, payouts incorrectos y experiencia rota.","because_en":"Resold tickets have already changed ownership. The original seller already sold and the resale buyer expects to use it. Including resold tickets in a partial cancellation generates ownership inconsistencies, incorrect payouts, and a broken experience.","section_es":"CANCELACIÓN / DEVOLUCIÓN","section_en":"CANCELLATION / REFUNDS"},{"id":"R43","section":"WEBVISIBILITY, CONTENT & MISC","if":"PREC[Change Ticket Owner] = Solo acepta una vez por ticket (comprador de reventa no puede re-vender)","connector":"IMPLIES","then":"No renderizar SAL para el resale buyer en ese ticket.","because":"Si el Change Ticket Owner solo se ejecuta una vez, el comprador de reventa no puede re-vender. Renderizar SAL generaría un flujo roto donde el usuario intenta vender y Change Ticket Owner falla. Es mejor no mostrar la opción.","status":"CLEAN","then_es":"No renderizar SAL para el comprador de reventa en ese ticket.","then_en":"Do not render SAL for the resale buyer on that ticket.","because_es":"Si el Change Ticket Owner solo se ejecuta una vez, el comprador de reventa no puede re-vender. Renderizar SAL generaría un flujo roto donde el usuario intenta vender y Change Ticket Owner falla. Es mejor no mostrar la opción.","because_en":"If the Change Ticket Owner only executes once, the resale buyer cannot re-sell. Rendering SAL would generate a broken flow where the user tries to sell and Change Ticket Owner fails. It is better not to show the option.","section_es":"WEBVISIBILITY, CONTENIDO Y MISCELÁNEOS","section_en":"WEBVISIBILITY, CONTENT & MISC"},{"id":"R44","section":"WEBVISIBILITY, CONTENT & MISC","if":"PREC[Ticketera tiene categorías no disponibilizadas para compra primaria] = Sí","connector":"REQUIRES","then":"La ticketera debe enviar un flag de webvisibility en cada ticketOption.","because":"Si la ticketera crea categorías pero no las habilita para venta primaria y las envía a menta sin distinción, menta podría habilitar reventa para categorías fantasma. El flag permite que menta solo active reventa para categorías realmente activas.","status":"CLEAN","then_es":"La plataforma debe enviar un flag de webvisibility en cada ticketOption.","then_en":"The platform must send a webvisibility flag for each ticketOption.","because_es":"Si la plataforma crea categorías pero no las habilita para venta primaria y las envía a menta sin distinción, menta podría habilitar reventa para categorías fantasma. El flag permite que menta solo active reventa para categorías realmente activas.","because_en":"If the platform creates categories but does not enable them for primary sale and sends them to menta without distinction, menta could enable resale for phantom categories. The flag allows menta to only activate resale for genuinely active categories.","section_es":"WEBVISIBILITY, CONTENIDO Y MISCELÁNEOS","section_en":"WEBVISIBILITY, CONTENT & MISC"},{"id":"R45","section":"WEBVISIBILITY, CONTENT & MISC","if":"PREC[Ticketera no tiene obligatorio el input de imagen en creación de eventos] = Imagen no obligatoria","connector":"IMPLIES","then":"Se debe configurar una fallback image por integrador.","because":"Sin imagen, el marketplace mostraría placeholders genéricos o espacios vacíos. Una fallback image con branding del integrador mantiene una experiencia visual consistente y profesional.","status":"CLEAN","then_es":"Se debe configurar una fallback image por integrador.","then_en":"A fallback image must be configured per integrator.","because_es":"Sin imagen, el marketplace mostraría placeholders genéricos o espacios vacíos. Una fallback image con branding del integrador mantiene una experiencia visual consistente y profesional.","because_en":"Without an image, the marketplace would show generic placeholders or empty spaces. A fallback image with integrator branding maintains a consistent and professional visual experience.","section_es":"WEBVISIBILITY, CONTENIDO Y MISCELÁNEOS","section_en":"WEBVISIBILITY, CONTENT & MISC"},{"id":"R49","section":"WEBVISIBILITY, CONTENT & MISC","if":"PREC[Show activation] = Pause sale | Web visibility","connector":"REQUIRES","then":"La ticketera debe enviar la data de webvisibility (true/false) por cada categoría/ticketOption.","because":"Cuando la ticketera puede pausar la venta o cambiar visibilidad de categorías, menta necesita reflejar esos estados en el mercado secundario. Sin esta data, una categoría pausada en primaria podría seguir activa en reventa.","status":"CLEAN","then_es":"La plataforma debe enviar la data de webvisibility (true/false) por cada categoría/ticketOption.","then_en":"The platform must send the webvisibility data (true/false) for each category/ticketOption.","because_es":"Cuando la plataforma puede pausar la venta o cambiar visibilidad de categorías, menta necesita reflejar esos estados en el mercado secundario. Sin esta data, una categoría pausada en primaria podría seguir activa en reventa.","because_en":"When the platform can pause sales or change category visibility, menta needs to reflect those states in the secondary market. Without this data, a category paused in primary could remain active in resale.","section_es":"WEBVISIBILITY, CONTENIDO Y MISCELÁNEOS","section_en":"WEBVISIBILITY, CONTENT & MISC"},{"id":"R50","section":"WEBVISIBILITY, CONTENT & MISC","if":"PREC[Change Ticket Owner] = Transfers AND PREC[Ticket transfer limit] = 1 (solo una transferencia permitida)","connector":"IMPLIES","then":"Un ticket comprado en reventa no puede ser listado para venta (resale). No renderizar SAL para el resale buyer en ese ticket, ya que la transferencia ya fue consumida.","because":"Si el Change Ticket Owner utiliza transfers y el ticket solo puede ser transferido una vez, la transferencia original (del vendedor al comprador de reventa) consume el unico transfer permitido. El comprador de reventa no puede volver a transferir el ticket a un nuevo comprador, por lo tanto no puede listarlo en el mercado secundario. Renderizar SAL para ese ticket generaria un flujo roto donde el usuario intenta vender pero la transferencia falla. Es mejor no mostrar la opcion de reventa.","status":"CLEAN","then_es":"Un ticket comprado en reventa no puede ser listado para venta (resale). No renderizar SAL para el comprador de reventa en ese ticket, ya que la transferencia ya fue consumida.","then_en":"A ticket purchased in resale cannot be listed for sale. Do not render SAL for the resale buyer on that ticket, as the transfer has already been consumed.","because_es":"Si el Change Ticket Owner utiliza transfers y el ticket solo puede ser transferido una vez, la transferencia original (del vendedor al comprador de reventa) consume el único transfer permitido. El comprador de reventa no puede volver a transferir el ticket a un nuevo comprador, por lo tanto no puede listarlo en el mercado secundario. Renderizar SAL para ese ticket generaría un flujo roto donde el usuario intenta vender pero la transferencia falla. Es mejor no mostrar la opción de reventa.","because_en":"If the Change Ticket Owner uses transfers and the ticket can only be transferred once, the original transfer (from seller to resale buyer) consumes the only permitted transfer. The resale buyer cannot transfer the ticket to a new buyer again, therefore cannot list it on the secondary market. Rendering SAL for that ticket would generate a broken flow where the user tries to sell but the transfer fails. It is better not to show the resale option.","section_es":"WEBVISIBILITY, CONTENIDO Y MISCELÁNEOS","section_en":"WEBVISIBILITY, CONTENT & MISC"},{"id":"R58","section":"TICKET DATA & INGEST MODEL","if":"PREC[Atributos de asientos] = Sí (tiene atributos)","connector":"REQUIRES","then":"La plataforma debe incluir los atributos del asiento (wheelchair, apoyabrazos removible, vista obstruida, companion seat, etc.) en la data de tickets enviada a menta o expuesta en el endpoint de verificación.","because":"Si la plataforma gestiona atributos especiales en los asientos, menta necesita esa información para mostrarla al comprador de reventa. Sin estos atributos en la data de tickets, el marketplace no puede comunicar restricciones o características del asiento, generando expectativas incorrectas en el comprador.","status":"CLEAN","then_es":"La plataforma debe incluir los atributos del asiento (silla de ruedas, apoyabrazos removible, vista obstruida, asiento acompañante, etc.) en la data de tickets enviada a menta o expuesta en el endpoint de verificación.","then_en":"The platform must include seat attributes (wheelchair, removable armchair, obstructed view, companion seat, etc.) in the ticket data sent to menta or exposed in the verification endpoint.","because_es":"Si la plataforma gestiona atributos especiales en los asientos, menta necesita esa información para mostrarla al comprador de reventa. Sin estos atributos en la data de tickets, el marketplace no puede comunicar restricciones o características del asiento, generando expectativas incorrectas en el comprador.","because_en":"If the platform manages special seat attributes, menta needs this information to display it to the resale buyer. Without these attributes in the ticket data, the marketplace cannot communicate seat restrictions or characteristics, creating incorrect expectations for the buyer.","section_es":"DATOS DE TICKETS Y MODELO DE INGESTA","section_en":"TICKET DATA & INGEST MODEL"},{"id":"R60","section":"EVENT DATA","if":"DEC[Events data] = External API\nAND DEC[Market Making — Inventory] = API menta (Live)","connector":"REQUIRES","then":"Partner must provide a fallback polling interval configuration so menta knows how often to retry if the external API becomes unavailable.","because":"When using External API for events data, menta polls the partner's endpoint. If that API goes down and polling fails, menta has no signal about what retry cadence to use. A configured fallback interval ensures graceful degradation and prevents data staleness from unexpected outages.","status":"CLEAN","then_es":"El partner debe proveer una configuración de intervalo de polling de respaldo para que menta sepa con qué frecuencia reintentar si la API externa no está disponible.","then_en":"The partner must provide a fallback polling interval configuration so menta knows how often to retry if the external API becomes unavailable.","because_es":"Cuando se usa External API para datos de eventos, menta consulta el endpoint del partner. Si esa API se cae y el polling falla, menta no tiene señal sobre qué cadencia de reintento usar. Un intervalo de respaldo configurado asegura degradación elegante y previene datos obsoletos por caídas inesperadas.","because_en":"When using External API for events data, menta polls the partner's endpoint. If that API goes down and polling fails, menta has no signal about what retry cadence to use. A configured fallback interval ensures graceful degradation and prevents data staleness from unexpected outages.","section_es":"DATOS DE EVENTOS","section_en":"EVENT DATA"},{"id":"R61","section":"CANCELACIÓN / DEVOLUCIÓN","if":"PREC[Granularidad de cancelación] = Por orden completa\nAND PREC[Detección de tickets en reventa durante cancelación] = No detecta","connector":"IMPLIES","then":"Si un usuario con tickets vendidos en reventa solicita devolución, la ticketera no puede excluir automáticamente los tickets vendidos. Se requiere intervención manual o aceptar el riesgo de cancelar tickets vendidos.","because":"Sin detección automática ni cancelación parcial, la ticketera no tiene forma de proteger los tickets vendidos en el proceso de devolución. Cualquier cancelación afectará todos los tickets de la orden incluyendo los que están en el mercado secundario.","status":"CLEAN","then_es":"Si un usuario con tickets vendidos en reventa solicita devolución, la plataforma no puede excluir automáticamente los tickets vendidos. Se requiere intervención manual o aceptar el riesgo de cancelar tickets vendidos.","then_en":"If a user with tickets sold in resale requests a refund, the platform cannot automatically exclude the sold tickets. Manual intervention is required or the risk of cancelling sold tickets must be accepted.","because_es":"Sin detección automática ni cancelación parcial, la plataforma no tiene forma de proteger los tickets vendidos en el proceso de devolución. Cualquier cancelación afectará todos los tickets de la orden incluyendo los que están en el mercado secundario.","because_en":"Without automatic detection or partial cancellation, the platform has no way to protect sold tickets in the refund process. Any cancellation will affect all tickets in the order including those on the secondary market.","section_es":"CANCELACIÓN / DEVOLUCIÓN","section_en":"CANCELLATION / REFUNDS"},{"id":"R62","section":"CANCELACIÓN / DEVOLUCIÓN","if":"DEC[Devoluciones, cancelaciones y contracargos] = Excluir vendidos de cancelación","connector":"REQUIRES","then":"PREC[Granularidad de cancelación] = Parcial (por ticket)\nAND PREC[Detección de tickets en reventa durante cancelación] = Detecta y excluye automáticamente","because":"Para excluir tickets vendidos de una cancelación, la ticketera necesita: (1) poder cancelar tickets individuales (no toda la orden), y (2) poder detectar cuáles tickets fueron vendidos. Sin ambas capacidades, la exclusión no es técnicamente posible.","status":"CLEAN","then_es":"Se requiere cancelación parcial (por ticket) Y detección automática de tickets en reventa","then_en":"Partial cancellation (per ticket) AND automatic resale ticket detection are required","because_es":"Para excluir tickets vendidos de una cancelación, la plataforma necesita: (1) poder cancelar tickets individuales (no toda la orden), y (2) poder detectar cuáles tickets fueron vendidos. Sin ambas capacidades, la exclusión no es técnicamente posible.","because_en":"To exclude sold tickets from a cancellation, the platform needs: (1) ability to cancel individual tickets (not the entire order), and (2) ability to detect which tickets were sold. Without both capabilities, exclusion is not technically possible.","section_es":"CANCELACIÓN / DEVOLUCIÓN","section_en":"CANCELLATION / REFUNDS"},{"id":"R63","section":"CANCELACIÓN / DEVOLUCIÓN","if":"DEC[Devoluciones, cancelaciones y contracargos] = Cancelar todo — proteger comprador","connector":"IMPLIES","then":"Cuando se cancela una orden con tickets vendidos: el ticket del comprador de reventa se mantiene válido. Se anula el payout del vendedor. Si el payout ya fue ejecutado, la ticketera absorbe el costo. El valor del payout pendiente se reparte según contrato entre menta y la ticketera.","because":"Si la ticketera solo puede cancelar órdenes completas, no puede excluir los tickets vendidos. Para proteger al comprador de reventa (que ya pagó), el ticket debe mantenerse válido aunque la orden original fue cancelada. El vendedor pierde el derecho al payout porque su compra fue devuelta.","status":"CLEAN","then_es":"Cuando se cancela una orden con tickets vendidos: el ticket del comprador de reventa se mantiene válido. Se anula el payout del vendedor. Si el payout ya fue ejecutado, la plataforma absorbe el costo. El valor del payout pendiente se reparte según contrato entre menta y la plataforma.","then_en":"When an order with sold tickets is cancelled: the resale buyer's ticket remains valid. The seller's payout is cancelled. If the payout was already executed, the platform absorbs the cost. The pending payout value is split per contract between menta and the platform.","because_es":"Si la plataforma solo puede cancelar órdenes completas, no puede excluir los tickets vendidos. Para proteger al comprador de reventa (que ya pagó), el ticket debe mantenerse válido aunque la orden original fue cancelada. El vendedor pierde el derecho al payout porque su compra fue devuelta.","because_en":"If the platform can only cancel complete orders, it cannot exclude sold tickets. To protect the resale buyer (who already paid), the ticket must remain valid even though the original order was cancelled. The seller loses the right to payout because their purchase was refunded.","section_es":"CANCELACIÓN / DEVOLUCIÓN","section_en":"CANCELLATION / REFUNDS"},{"id":"R64","section":"CANCELACIÓN / DEVOLUCIÓN","if":"DEC[Devoluciones, cancelaciones y contracargos] = Contracargo: notificación automática","connector":"REQUIRES","then":"La ticketera debe poder marcar tickets como anulados/contracargueados en su sistema y esa acción debe fluir a menta vía la integración de cancelación de tickets existente.","because":"Para que los contracargos sean escalables, menta no puede depender de notificaciones manuales. Los contracargos deben seguir el mismo canal que las cancelaciones normales de tickets. Si la ticketera cancela el ticket en su sistema, menta ejecuta las acciones correspondientes automáticamente (desliste, anulación de payout).","status":"CLEAN","then_es":"La plataforma debe poder marcar tickets como anulados/contracargueados en su sistema y esa acción debe fluir a menta vía la integración de cancelación de tickets existente.","then_en":"The platform must be able to mark tickets as voided/chargebacked in its system and that action must flow to menta via the existing ticket cancellation integration.","because_es":"Para que los contracargos sean escalables, menta no puede depender de notificaciones manuales. Los contracargos deben seguir el mismo canal que las cancelaciones normales de tickets. Si la plataforma cancela el ticket en su sistema, menta ejecuta las acciones correspondientes automáticamente (desliste, anulación de payout).","because_en":"For chargebacks to be scalable, menta cannot depend on manual notifications. Chargebacks must follow the same channel as normal ticket cancellations. If the platform cancels the ticket in its system, menta executes the corresponding actions automatically (delist, payout cancellation).","section_es":"CANCELACIÓN / DEVOLUCIÓN","section_en":"CANCELLATION / REFUNDS"},{"id":"R65","section":"QR PROTECTION","if":"PREC[Validación de check-in] = Real-time (online)\nAND DEC[Ticket data] = GetUserData()","connector":"IMPLIES","then":"El endpoint GetUserData() NO debe incluir tickets escaneados (checked-in) en la respuesta. El mercado secundario puede permanecer abierto durante el evento si el endpoint refleja el estado de check-in en tiempo real. menta se encarga del resto: cleansing periódico, gate requests durante checkout, y verificación final antes del CTO.","then_en":"The GetUserData() endpoint must NOT include checked-in tickets in the response. The secondary market can remain open during the event if the endpoint reflects check-in status in real-time. menta handles the rest: periodic cleansing, gate requests during checkout, and final verification before CTO.","because":"Con QR estático y GetUserData, la defensa contra la venta de tickets usados se concentra en la exactitud del endpoint. Si un ticket fue escaneado, simplemente no aparece en la respuesta — menta nunca lo ve. menta complementa con: (1) cleansing periódico que detecta tickets desaparecidos y deslista automáticamente, (2) requests más frecuentes durante el checkout (cada 1 minuto durante la reserva de ~15 min), y (3) una verificación final justo antes de enviar el webhook ticket.updated. Si el endpoint es preciso, no se necesita market close fijo. Si el endpoint no puede reflejar check-in en tiempo real, se debe imponer market close obligatorio.","because_en":"With static QR and GetUserData, the defense against selling used tickets is concentrated in endpoint accuracy. If a ticket was scanned, it simply does not appear in the response — menta never sees it. menta complements with: (1) periodic cleansing that detects disappeared tickets and automatically delists, (2) more frequent requests during checkout (every 1 minute during the ~15 min reservation), and (3) a final verification right before sending the ticket.updated webhook. If the endpoint is accurate, no fixed market close is needed. If the endpoint cannot reflect check-in status in real-time, mandatory market close must be enforced.","status":"CLEAN"},{"id":"R66","section":"QR PROTECTION","if":"PREC[Validación de check-in] = Offline (batch sync)","connector":"REQUIRES","then":"Market close obligatorio antes de que comience la sincronización offline. Todos los listados activos deben ser deslistados al momento del cierre.","then_en":"Mandatory market close before offline sync begins. All active listings must be delisted at close time.","because":"Cuando la ticketera descarga la base de ticket holders a escáneres offline, la validación en tiempo real deja de estar disponible. Un ticket vendido después de la sincronización tendría al titular incorrecto en la base offline, generando conflictos de acceso en el venue. El cierre previo al sync es el único mecanismo seguro.","because_en":"When the partner downloads the ticket holder database to offline scanners, real-time validation is no longer available. A ticket sold after sync would have the wrong holder in the offline database, creating access conflicts at the venue. Closing before sync is the only safe mechanism.","status":"CLEAN"},{"id":"R67","section":"CANCELACIÓN / DEVOLUCIÓN","if":"PREC[Facturación] = Obligatorio con sistema conectado a autoridades","connector":"IMPLIES","then":"Los detalles de facturación y el mecanismo de activación deben acordarse antes del go-live. menta proporciona los datos de la reventa completada; la ticketera emite facturas a través de su sistema regulado.","then_en":"Invoicing details and trigger mechanism must be agreed before go-live. menta provides resale completion data; the partner issues invoices through their regulated system.","because":"Algunas jurisdicciones requieren facturas emitidas a través de sistemas conectados al gobierno. menta no puede emitir estas facturas — la ticketera debe gestionar la facturación usando datos de activación de reventa provistos por menta. Sin acuerdo previo, la ticketera podría no cumplir con obligaciones legales desde el primer día de operación.","because_en":"Some jurisdictions require invoices issued through government-connected systems. menta cannot issue these invoices — the partner must handle invoicing using resale trigger data from menta. Without prior agreement, the partner could fail to meet legal obligations from day one of operation.","status":"CLEAN"},{"id":"R68","section":"TICKET DATA & INGEST MODEL","if":"DEC[Ticket data] = GetUserData()","connector":"REQUIRES","then":"El endpoint GetUserData() debe retornar únicamente tickets válidos y en posesión actual del usuario. Debe omitir: tickets cancelados, reembolsados, transferidos, escaneados (checked-in), y cualquier producto que no represente un ticket final con acceso al evento. Solo tickets que el usuario posee y puede revender deben aparecer en la respuesta.","then_en":"The GetUserData() endpoint must return only valid tickets currently owned by the user. It must omit: canceled, refunded, transferred, checked-in tickets, and any product that does not represent a final ticket granting event access. Only tickets the user owns and can resell should appear in the response.","because":"GetUserData es la fuente de verdad que menta consulta en múltiples momentos del flujo de reventa. Si el endpoint retorna tickets inválidos (cancelados, escaneados, transferidos, o productos intermedios sin acceso al evento), menta podría crear listings para tickets que no existen o ejecutar un CTO sobre un ticket que el vendedor ya no posee. La precisión del endpoint es el fundamento de toda la integración bajo el modelo pull.","because_en":"GetUserData is the source of truth that menta queries at multiple points during the resale flow. If the endpoint returns invalid tickets (canceled, scanned, transferred, or intermediate products without event access), menta could create listings for tickets that don't exist or execute a CTO on a ticket the seller no longer owns. Endpoint accuracy is the foundation of the entire integration under the pull model.","status":"CLEAN"},{"id":"R69","section":"TICKET DATA & INGEST MODEL","if":"DEC[Ticket data] = GetUserData()","connector":"IMPLIES","then":"menta llama al endpoint GetUserData() en los siguientes momentos:\n• Cuando el vendedor accede al flujo de venta (verificar tickets actuales)\n• Periódicamente para usuarios con listings activos (cleansing — detectar tickets que desaparecieron)\n• Cuando un comprador entra al checkout de un ticket en reventa (gate request)\n• Durante la reserva del carrito (~15 min), cada 1 minuto para los tickets en checkout\n• Justo antes de enviar el webhook ticket.updated (verificación final pre-CTO)\nLa ticketera debe dimensionar el endpoint para soportar este patrón de llamadas.","then_en":"menta calls the GetUserData() endpoint at the following moments:\n• When the seller accesses the sell flow (verify current tickets)\n• Periodically for users with active listings (cleansing — detect disappeared tickets)\n• When a buyer enters checkout for a resale ticket (gate request)\n• During cart reservation (~15 min), every 1 minute for tickets in checkout\n• Right before sending the ticket.updated webhook (final pre-CTO verification)\nThe partner must size the endpoint to support this call pattern.","because":"El modelo pull traslada la responsabilidad de detección de cambios a menta. Para cubrir todos los escenarios de riesgo (ticket cancelado, escaneado, transferido entre listing y compra), menta necesita múltiples puntos de verificación. El patrón de frecuencia — bajo en reposo, alto durante checkout — concentra la carga donde el riesgo es mayor. La ticketera debe conocer este patrón para dimensionar infraestructura y evitar throttling en momentos críticos.","because_en":"The pull model shifts change detection responsibility to menta. To cover all risk scenarios (ticket canceled, scanned, transferred between listing and purchase), menta needs multiple verification points. The frequency pattern — low at rest, high during checkout — concentrates load where risk is highest. The partner must know this pattern to size infrastructure and avoid throttling at critical moments.","status":"CLEAN"},{"id":"R70","section":"TRANSFER, ABONOS & CUOTAS","if":"PREC[Abonos] ≠ No tienen","connector":"REQUIRES","then":"Verificar que el nombre de la categoría del abono no contenga texto como \"Abono de temporada\", \"Season Pass\" o similar. Si el nombre de la categoría en la plataforma del partner incluye la palabra \"abono\" o \"temporada\", se debe renombrar o configurar un nombre alternativo para el mercado secundario. De lo contrario, los compradores de sesiones individuales verán el nombre completo del abono y creerán que están comprando el abono entero en lugar de una sesión individual.","then_es":"Verificar que el nombre de la categoría del abono no contenga texto como \"Abono de temporada\", \"Season Pass\" o similar. Si el nombre de la categoría en la plataforma del partner incluye la palabra \"abono\" o \"temporada\", se debe renombrar o configurar un nombre alternativo para el mercado secundario. De lo contrario, los compradores de sesiones individuales verán el nombre completo del abono y creerán que están comprando el abono entero en lugar de una sesión individual.","then_en":"Verify that the season pass category name does not contain text like \"Season Pass\", \"Abono de temporada\" or similar. If the category name in the partner platform includes the word \"season pass\" or \"subscription\", it must be renamed or an alternative name must be configured for the secondary market. Otherwise, buyers of individual sessions will see the full season pass name and believe they are purchasing the entire season pass rather than a single session.","because":"Cuando se venden sesiones individuales de un abono en el mercado secundario, el nombre de la categoría se muestra tal cual al comprador. Si dice \"Abono de temporada 2025 — Platino\", el comprador interpreta que está comprando todo el abono (todas las sesiones) cuando en realidad solo está comprando una sesión. Esto genera confusión, reclamos y potenciales contracargos.","because_es":"Cuando se venden sesiones individuales de un abono en el mercado secundario, el nombre de la categoría se muestra tal cual al comprador. Si dice \"Abono de temporada 2025 — Platino\", el comprador interpreta que está comprando todo el abono (todas las sesiones) cuando en realidad solo está comprando una sesión. Esto genera confusión, reclamos y potenciales contracargos.","because_en":"When individual sessions of a season pass are sold on the secondary market, the category name is displayed as-is to the buyer. If it says \"Season Pass 2025 — Platinum\", the buyer interprets they are purchasing the entire season pass (all sessions) when in reality they are only buying a single session. This generates confusion, complaints and potential chargebacks.","status":"CLEAN"},{"id":"R71","section":"EVENT DATA","if":"PREC[Países de operación] = Múltiples países — todos con entidad local\nOR PREC[Países de operación] = Múltiples países — algunos sin entidad local","connector":"REQUIRES","then":"The partner must include the timezone field in the show payload (e.g. America/Mexico_City, America/Buenos_Aires). menta needs this to correctly display event dates/times and enforce sale windows in the buyer's local context.","because":"When a partner operates across multiple countries, shows can occur in different timezones. Without an explicit timezone per show, menta would have to assume a default (e.g. the partner's HQ timezone), which leads to incorrect date/time display for events in other countries — wrong sale start/end times, wrong event times shown to buyers, and potential issues with listing windows.","status":"CLEAN"},{"id":"R72","section":"ACCESS TO SELL","if":"PREC[Idiomas / Traducciones] = Múltiples idiomas\nAND DEC[Access to sell] = API menta (SAL)","connector":"REQUIRES","then":"The partner must pass the user's language/locale in the SAL endpoint call so that menta can render the resale experience in the correct language.","because":"When the partner platform supports multiple languages, the user may be browsing in any of them. The SAL button triggers a transition into menta's UI — if menta doesn't know the user's current language, it would default to a potentially wrong locale, breaking the UX continuity between the partner's interface and menta's resale flow.","status":"CLEAN"},{"id":"R73","section":"INFO STRUCTURE / PRICE TYPES","section_es":"ESTRUCTURA DE PRECIOS","section_en":"PRICE STRUCTURE","if":"PREC[Estructura de precios] = Category w/ >1 price AND las dimensiones de pricing son ortogonales y concatenables","if_es":"PREC[Estructura de precios] = Category w/ >1 price AND las dimensiones de pricing son ortogonales y concatenables","if_en":"PREC[Price Structure] = Category w/ >1 price AND pricing dimensions are orthogonal and concatenable","connector":"IMPLIES","then":"DEC[Price info structure] = Simple price detail. Cada ticketOption = combinación única de dimensiones (ej. tier × producto) con su propio face value.","then_es":"DEC[Price info structure] = Simple price detail. Cada ticketOption = combinación única de dimensiones (ej. tier × producto) con su propio face value.","then_en":"DEC[Price Info Structure] = Simple price detail. Each ticketOption = unique combination of dimensions (e.g. tier × product) with its own face value.","because":"Si las dimensiones son ortogonales y cada combinación tiene un face value único, concatenarlas en el ticketOption evita la complejidad del eje priceType separado y del endpoint /events/rules. Advanced Price Detail solo se justifica cuando múltiples priceTypes comparten la misma ticketOption.","because_es":"Si las dimensiones son ortogonales y cada combinación tiene un face value único, concatenarlas en el ticketOption evita la complejidad del eje priceType separado y del endpoint /events/rules. Advanced Price Detail solo se justifica cuando múltiples priceTypes comparten la misma ticketOption.","because_en":"If the dimensions are orthogonal and each combination has a unique face value, concatenating them into the ticketOption avoids the overhead of a separate priceType axis and the /events/rules endpoint. Advanced Price Detail is only justified when multiple priceTypes share the same ticketOption.","status":"CLEAN"}],"tests":[{"id":"DAT-01.a","section":"Event Data","trigger":"Events data=API menta","action":"Crear un evento nuevo con toda la información (Título, Venue, Fechas, Imagen, Precios).","expected":"El evento se crea en el Dashboard de menta con coincidencia exacta de datos.","sanity":"• El precio debe ser el face value (sin service charge).\n• No deben enviarse categorías duplicadas.\n• El nombre del sector debe coincidir con el que ve el usuario en la compra primaria.\n• Venue con todos los campos completos (Calle, Ciudad, País).\n• Event.Name ≠ Show.Name.","action_es":"Crear un evento nuevo con toda la información (Título, Venue, Fechas, Imagen, Precios).","action_en":"Create a new event with all required information (Title, Venue, Dates, Image, Prices).","expected_es":"El evento se crea en el Dashboard de menta con coincidencia exacta de datos.","expected_en":"The event is created in the menta Dashboard with an exact data match.","sanity_es":"• El precio debe ser el face value (sin service charge).\n• No deben enviarse categorías duplicadas.\n• El nombre del sector debe coincidir con el que ve el usuario en la compra primaria.\n• Venue con todos los campos completos (Calle, Ciudad, País).\n• Event.Name ≠ Show.Name.","sanity_en":"• Price must be the face value (no service charge).\n• No duplicate categories should be sent.\n• Sector name must match what the user sees in the primary purchase.\n• Venue with all fields complete (Street, City, Country).\n• Event.Name ≠ Show.Name.","section_es":"Datos de Eventos","section_en":"Event Data"},{"id":"DAT-01.b","section":"Event Data","trigger":"Events data=External API","action":"Crear un evento nuevo y consultar la API Externa.","expected":"El JSON de respuesta contiene el evento con coincidencia exacta de datos.","sanity":"• Precio = face value (sin tasas).\n• Sin categorías duplicadas en el array.\n• Naming de sectores debe coincidir con el frontend.\n• Venue desglosado correctamente.\n• Event.Name ≠ Show.Name.","action_es":"Crear un evento nuevo y consultar la API Externa.","action_en":"Create a new event and query the External API.","expected_es":"El JSON de respuesta contiene el evento con coincidencia exacta de datos.","expected_en":"The response JSON contains the event with an exact data match.","sanity_es":"• Precio = face value (sin tasas).\n• Sin categorías duplicadas en el array.\n• Naming de sectores debe coincidir con el frontend.\n• Venue desglosado correctamente.\n• Event.Name ≠ Show.Name.","sanity_en":"• Price = face value (no fees).\n• No duplicate categories in the array.\n• Sector naming must match the frontend.\n• Venue correctly broken down.\n• Event.Name ≠ Show.Name.","section_es":"Datos de Eventos","section_en":"Event Data"},{"id":"DAT-02.a","section":"Event Data","trigger":"Events data=API menta AND Event structure=Multi show","action":"Crear un Evento Padre (Agrupador) con múltiples funciones/shows.","expected":"En menta aparece un solo Evento (agrupador) conteniendo el array con todos los shows hijos.","sanity":"• Verificar que no falte la data de ningún show dentro del agrupador.","action_es":"Crear un Evento Padre (Agrupador) con múltiples funciones/shows.","action_en":"Create a Parent Event (grouper) with multiple shows/dates.","expected_es":"En menta aparece un solo Evento (agrupador) conteniendo el array con todos los shows hijos.","expected_en":"A single Event (grouper) appears in menta containing the array with all child shows.","sanity_es":"• Verificar que no falte la data de ningún show dentro del agrupador.","sanity_en":"• Verify no show data is missing within the grouper.","section_es":"Datos de Eventos","section_en":"Event Data"},{"id":"DAT-02.b","section":"Event Data","trigger":"Events data=External API AND Event structure=Multi show","action":"Crear un Evento Padre (Agrupador) con múltiples funciones/shows.","expected":"La API Externa devuelve un objeto padre con una lista/array de objetos hijos (shows).","sanity":"• Verificar que no falte la data de ningún show dentro del agrupador.","action_es":"Crear un Evento Padre (Agrupador) con múltiples funciones/shows.","action_en":"Create a Parent Event (grouper) with multiple shows/dates.","expected_es":"La API Externa devuelve un objeto padre con una lista/array de objetos hijos (shows).","expected_en":"The External API returns a parent object with a list/array of child objects (shows).","sanity_es":"• Verificar que no falte la data de ningún show de  Si ya había listings activos, se desactivan automáticamente.","sanity":"• Verificar que el flag webvisibility se envía por ticketOption y por categoría.\n• Verificar que categorías pausadas reflejan su estado pausado.","sanity_en":"• Verify the webvisibility flag is sent per ticketOption and per category.\n• Verify that paused categories reflect their paused state.","sanity_es":"• Verificar que el flag webvisibility se envía por ticketOption y por categoría.\n• Verificar que categorías pausadas reflejan su estado pausado."},{"id":"TKT-01","section":"Ticket Data","section_es":"Ticket Data","section_en":"Ticket Data","trigger":"Ticket data=API menta (Only resellers)","action":"Compra primaria. Verificar que el ticket se envía a menta con el email del comprador.","action_en":"Primary purchase. Verify the ticket is sent to menta with the buyer's email.","action_es":"Compra primaria. Verificar que el ticket se envía a menta con el email del comprador.","expected":"El ticket aparece en menta con el email del comprador visible y correcto.","expected_en":"The ticket appears in menta with the buyer's email visible and correct.","expected_es":"El ticket aparece en menta con el email del comprador visible y correcto.","sanity":"• Verificar formato de email válido.\n• Verificar que tickets de la misma orden no se dupliquen.\n• Verificar que el ticketId enviado coincide con el identificador interno del partner.","sanity_en":"• Verify valid email format.\n• Verify tickets from the same order are not duplicated.\n• Verify the ticketId sent matches the partner's internal identifier.","sanity_es":"• Verificar formato de email válido.\n• Verificar que tickets de la misma orden no se dupliquen.\n• Verificar que el ticketId enviado coincide con el identificador interno del partner."},{"id":"TKT-01.c","section":"Ticket Data","trigger":"Ticket data=GetUserData()","action":"Un usuario inicia el flujo de reventa en menta. Verificar que el sistema consulta los tickets del usuario en tiempo real.","expected":"Se obtiene la lista completa de tickets activos del usuario con toda la información necesaria.","sanity":"• Solo debe devolver tickets activos (no cancelados ni transferidos).\n• Verificar que incluya todos los campos requeridos (ticketId, eventId, sección, precio).","action_es":"Un usuario inicia el flujo de reventa en menta. Verificar que el sistema consulta los tickets del usuario en tiempo real.","action_en":"A user enters the resale flow in menta. Verify the system queries the user's tickets in real time.","expected_es":"Se obtiene la lista completa de tickets activos del usuario con toda la información necesaria.","expected_en":"The complete list of the user's active tickets is obtained with all required information.","sanity_es":"• Solo debe devolver tickets activos (no cancelados ni transferidos).\n• Verificar que incluya todos los campos requeridos (ticketId, eventId, sección, precio).","sanity_en":"• Must only return active tickets (not cancelled or transferred).\n• Verify all required fields are included (ticketId, eventId, section, price).","section_es":"Datos de Tickets","section_en":"Ticket Data"},{"id":"TKT-02","section":"Ticket Data","trigger":"Ticket data=API menta (Only resellers)","action":"Un usuario navega sus tickets sin interactuar con el mercado secundario. Luego presiona 'Vender' por primera vez.","expected":"Antes de presionar 'Vender', menta no tiene información de los tickets de este usuario. Después de presionar, la información se envía y aparece en menta.","sanity":"• Verificar que la ticketera registre internamente qué tickets fueron enviados a menta.","action_es":"Un usuario navega sus tickets sin interactuar con el mercado secundario. Luego presiona 'Vender' por primera vez.","action_en":"A user browses their tickets without interacting with the secondary market. Then presses 'Sell' for the first time.","expected_es":"Antes de presionar 'Vender', menta no tiene información de los tickets de este usuario. Después de presionar, la información se envía y aparece en menta.","expected_en":"Before pressing 'Sell', menta has no information about this user's tickets. After pressing, the information is sent and appears in menta.","sanity_es":"• Verificar que la plataforma registre internamente qué tickets fueron enviados a menta.","sanity_en":"• Verify the platform internally records which tickets were sent to menta.","section_es":"Datos de Tickets","section_en":"Ticket Data"},{"id":"TKT-02.b","section":"Ticket Data","trigger":"Ticket data=GetUserData()","action":"Un usuario que nunca interactuó con el mercado secundario navega su sección de tickets.","expected":"Menta no tiene información de este usuario. La consulta de datos solo ocurre cuando el usuario inicia un flujo en el mercado secundario.","sanity":null,"action_es":"Un usuario que nunca interactuó con el mercado secundario navega su sección de tickets.","action_en":"A user who never interacted with the secondary market browses their tickets section.","expected_es":"Menta no tiene información de este usuario. La consulta de datos solo ocurre cuando el usuario inicia un flujo en el mercado secundario.","expected_en":"menta has no information about this user. Data querying only occurs when the user enters a secondary market flow.","sanity_es":null,"sanity_en":null,"section_es":"Datos de Tickets","section_en":"Ticket Data"},{"id":"TKT-03","section":"Ticket Data","trigger":"Ticket data=API menta (Only resellers)","action":"Modificar un ticket que ya fue sincronizado con menta (cambio de sección, upgrade, cambio de titular).","expected":"La modificación se notifica a menta y los datos del ticket se actualizan correctamente.","sanity":"• El identificador del ticket debe mantenerse consistente.\n• Si cambia el precio, debe reflejar el price paid actualizado (no el face value, que va a nivel evento).","action_es":"Modificar un ticket que ya fue sincronizado con menta (cambio de sección, upgrade, cambio de titular).","action_en":"Modify a ticket that was already synced with menta (section change, upgrade, ownership change).","expected_es":"La modificación se notifica a menta y los datos del ticket se actualizan correctamente.","expected_en":"The modification is notified to menta and the ticket data is updated correctly.","sanity_es":"• El identificador del ticket debe mantenerse consistente.\n• Si cambia el precio, debe reflejar el price paid actualizado (no el face value, que va a nivel evento).","sanity_en":"• The ticket identifier must remain consistent.\n• If the price changes, it must reflect the updated price paid (not the face value, which is at event level).","section_es":"Datos de Tickets","section_en":"Ticket Data"},{"id":"TKT-04","section":"Ticket Data","trigger":"Ticket data=API menta (Only resellers)","action":"Cancelar un ticket que ya fue sincronizado con menta.","expected":"La cancelación se notifica a menta. Si el ticket estaba publicado para venta en el mercado secundario, la publicación se cancela automáticamente.","sanity":"• Si el ticket ya fue vendido en reventa, verificar que se gestione correctamente la cancelación del payout y la notificación al comprador.","action_es":"Cancelar un ticket que ya fue sincronizado con menta.","action_en":"Cancel a ticket that was already synced with menta.","expected_es":"La cancelación se notifica a menta. Si el ticket estaba publicado para venta en el mercado secundario, la publicación se cancela automáticamente.","expected_en":"The cancellation is notified to menta. If the ticket was listed for resale on the secondary market, the listing is automatically cancelled.","sanity_es":"• Si el ticket ya fue vendido en reventa, verificar que se gestione correctamente la cancelación del payout y la notificación al comprador.","sanity_en":"• If the ticket was already sold in resale, verify the payout cancellation and buyer notification are handled correctly.","section_es":"Datos de Tickets","section_en":"Ticket Data"},{"id":"TKT-05","section":"Ticket Data","trigger":"Gestión de Cuotas=Gestiona el Sistema OR Gestión de Cuotas=Gestiona el Procesador","action":"Un usuario con ticket comprado en cuotas (con cuotas pendientes) intenta acceder al flujo de venta.","expected":"El ticket NO aparece como disponible para vender mientras existan cuotas pendientes. Una vez pagadas todas las cuotas, el ticket sí aparece disponible.","sanity":"• Verificar que el bloqueo se aplica a nivel de datos (el ticket no se envía a menta) y no solo a nivel visual.","action_es":"Un usuario con ticket comprado en cuotas (con cuotas pendientes) intenta acceder al flujo de venta.","action_en":"A user with a ticket purchased in installments (with pending installments) attempts to enter the selling flow.","expected_es":"El ticket NO aparece como disponible para vender mientras existan cuotas pendientes. Una vez pagadas todas las cuotas, el ticket sí aparece disponible.","expected_en":"The ticket does NOT appear as available for sale while installments are pending. Once all installments are paid, the ticket appears available.","sanity_es":"• Verificar que el bloqueo se aplica a nivel de datos (el ticket no se envía a menta) y no solo a nivel visual.","sanity_en":"• Verify the block is applied at the data level (the ticket is not sent to menta), not just visually.","section_es":"Datos de Tickets","section_en":"Ticket Data"},{"id":"TKT-06","section":"Ticket Data","trigger":"Transfer/share=Transfer (Cambio Titular) AND Ticket data=GetUserData()","action":"Transferir un ticket del Usuario A al Usuario B a través de la ticketera. Luego ambos usuarios acceden al flujo de reventa.","expected":"El ticket transferido ya NO aparece en la lista del Usuario A. El ticket SÍ aparece en la lista del Usuario B.","sanity":"• Verificar si el cambio es inmediato o documentar el delay si existe.","action_es":"Transferir un ticket del Usuario A al Usuario B a través de la plataforma. Luego ambos usuarios acceden al flujo de reventa.","action_en":"Transfer a ticket from User A to User B through the platform. Then both users access the resale flow.","expected_es":"El ticket transferido ya NO aparece en la lista del Usuario A. El ticket SÍ aparece en la lista del Usuario B.","expected_en":"The transferred ticket no longer appears in User A's list. The ticket DOES appear in User B's list.","sanity_es":"• Verificar si el cambio es inmediato o documentar el delay si existe.","sanity_en":"• Verify whether the change is immediate or document the delay if it exists.","section_es":"Datos de Tickets","section_en":"Ticket Data"},{"id":"TKT-07","section":"Ticket Data","trigger":"Always applies","action":"Delete/void a ticket in the partner platform that was previously synced with menta. For Push: verify the deletion notification is sent. For Pull (External API): verify the deleted ticket no longer appears in the endpoint response.","expected":"menta receives or detects the deletion. If the ticket was listed for resale, the listing is automatically cancelled. If the ticket was already sold, the cancellation triggers the appropriate payout/refund handling.","sanity":"• Verify the ticket disappears from the seller's menta view, not just from the partner platform.\n• If the ticket was listed, verify the listing status changes to cancelled (not just hidden).\n• Confirm the deletion notification uses the same ticketId originally synced — not a new identifier.","action_es":"Eliminar/anular un ticket en la plataforma del partner que fue previamente sincronizado con menta. Para Push: verificar que se envía la notificación de eliminación. Para Pull (API Externa): verificar que el ticket eliminado ya no aparece en la respuesta del endpoint.","action_en":"Delete/void a ticket in the partner platform that was previously synced with menta. For Push: verify the deletion notification is sent. For Pull (External API): verify the deleted ticket no longer appears in the endpoint response.","expected_es":"menta recibe o detecta la eliminación. Si el ticket estaba listado para reventa, la publicación se cancela automáticamente. Si el ticket ya fue vendido, la cancelación activa el manejo correspondiente de payout/reembolso.","expected_en":"menta receives or detects the deletion. If the ticket was listed for resale, the listing is automatically cancelled. If the ticket was already sold, the cancellation triggers the appropriate payout/refund handling.","sanity_es":"• Verificar que el ticket desaparece de la vista de menta del vendedor, no solo de la plataforma del partner.\n• Si el ticket estaba listado, verificar que el estado del listado cambie a cancelado (no solo oculto).\n• Confirmar que la notificación de eliminación usa el mismo ticketId sincronizado originalmente — no un identificador nuevo.","sanity_en":"• Verify the ticket disappears from the seller's menta view, not just from the partner platform.\n• If the ticket was listed, verify the listing status changes to cancelled (not just hidden).\n• Confirm the deletion notification uses the same ticketId originally synced — not a new identifier.","section_es":"Datos de Tickets","section_en":"Ticket Data"},{"id":"QR-01","section":"QRs y Desbloqueo","trigger":"Protección/Tecnología=QR lock","action":"Un usuario tiene tickets comprados. Verificar que los QRs NO son accesibles antes del horario de desbloqueo configurado.","expected":"El usuario no puede ver, descargar ni compartir el QR antes del desbloqueo. Se muestra un mensaje indicando cuándo estará disponible.","sanity":null,"action_es":"Un usuario tiene tickets comprados. Verificar que los QRs NO son accesibles antes del horario de desbloqueo configurado.","action_en":"A user has purchased tickets. Verify that QRs are NOT accessible before the configured unlock time.","expected_es":"El usuario no puede ver, descargar ni compartir el QR antes del desbloqueo. Se muestra un mensaje indicando cuándo estará disponible.","expected_en":"The user cannot view, download, or share the QR before unlock. A message is displayed indicating when it will be available.","sanity_es":null,"sanity_en":null,"section_es":"QRs y Desbloqueo","section_en":"QRs & Unlock"},{"id":"QR-02","section":"QRs y Desbloqueo","trigger":"Protección/Tecnología=QR lock","action":"Llega el horario de desbloqueo configurado para el evento.","expected":"Los QRs se desbloquean y están disponibles para el usuario.","sanity":"• Verificar que el horario de desbloqueo coincida con el configurado.\n• Verificar que TODOS los tickets del usuario se desbloqueen.","action_es":"Llega el horario de desbloqueo configurado para el evento.","action_en":"The configured unlock time for the event arrives.","expected_es":"Los QRs se desbloquean y están disponibles para el usuario.","expected_en":"QRs are unlocked and available to the user.","sanity_es":"• Verificar que el horario de desbloqueo coincida con el configurado.\n• Verificar que TODOS los tickets del usuario se desbloqueen.","sanity_en":"• Verify the unlock time matches the configured time.\n• Verify ALL of the user's tickets are unlocked.","section_es":"QRs y Desbloqueo","section_en":"QRs & Unlock"},{"id":"QR-04","section":"QRs y Desbloqueo","trigger":"Protección/Tecnología=QR lock OR Protección/Tecnología=QR delay (Diferido)","action":"Un ticket se vende en el mercado secundario. Verificar que el Change Ticket Owner se ejecuta correctamente.","expected":"El cambio de titular se completa. No es necesario que se regenere el QR ya que los QRs estaban protegidos (lock o delay) y el comprador recibirá su QR cuando corresponda según el mecanismo de desbloqueo de la ticketera.","sanity":"• Verificar que el Change Ticket Owner actualizó correctamente el titular del ticket en el sistema de la ticketera.","action_es":"Un ticket se vende en el mercado secundario. Verificar que el Change Ticket Owner se ejecuta correctamente.","action_en":"A ticket is sold on the secondary market. Verify the Change Ticket Owner executes correctly.","expected_es":"El cambio de titular se completa. No es necesario que se regenere el QR ya que los QRs estaban protegidos (lock o delay) y el comprador recibirá su QR cuando corresponda según el mecanismo de desbloqueo.","expected_en":"The ownership change completes. QR regeneration is not required since QRs were protected (lock or delay) and the buyer will receive their QR at the appropriate time according to the unlock mechanism.","sanity_es":"• Verificar que el Change Ticket Owner actualizó correctamente el titular del ticket en el sistema de la plataforma.","sanity_en":"• Verify the Change Ticket Owner correctly updated the ticket owner in the platform's system.","section_es":"QRs y Desbloqueo","section_en":"QRs & Unlock"},{"id":"QR-05","section":"QRs y Desbloqueo","trigger":"Protección/Tecnología=QR dinámico","action":"Un ticket se vende en el mercado secundario.","expected":"El cambio de titular se ejecuta correctamente. La ticketera gestiona la generación del nuevo QR dinámico para el comprador. Menta no interviene en el QR.","sanity":"• Verificar que el vendedor pierde acceso al QR dinámico del ticket vendido.\n• Verificar que el comprador recibe un nuevo QR dinámico válido.","action_es":"Un ticket se vende en el mercado secundario.","action_en":"A ticket is sold on the secondary market.","expected_es":"El cambio de titular se ejecuta correctamente. La plataforma gestiona la generación del nuevo QR dinámico para el comprador. Menta no interviene en el QR.","expected_en":"The ownership change executes correctly. The platform manages the generation of the new dynamic QR for the buyer. menta does not intervene in the QR.","sanity_es":"• Verificar que el vendedor pierde acceso al QR dinámico del ticket vendido.\n• Verificar que el comprador recibe un nuevo QR dinámico válido.","sanity_en":"• Verify the seller loses access to the dynamic QR of the sold ticket.\n• Verify the buyer receives a new valid dynamic QR.","section_es":"QRs y Desbloqueo","section_en":"QRs & Unlock"},{"id":"QR-06","section":"QRs y Desbloqueo","trigger":"Protección/Tecnología=QR lock OR Protección/Tecnología=QR delay (Diferido)","action":"Verificar que el tiempo de desbloqueo configurado para el evento coincide con el tiempo de cierre del mercado secundario en menta.","expected":"El cierre del mercado secundario ocurre antes o al mismo tiempo que el desbloqueo de QRs. No existe una ventana donde el mercado esté abierto y los QRs ya estén visibles.","sanity":"• Verificar que la ticketera envía el tiempo de desbloqueo como parte de la información del show.","action_es":"Verificar que el tiempo de desbloqueo configurado para el evento coincide con el tiempo de cierre del mercado secundario en menta.","action_en":"Verify that the configured unlock time for the event matches the secondary market close time in menta.","expected_es":"El cierre del mercado secundario ocurre antes o al mismo tiempo que el desbloqueo de QRs. No existe una ventana donde el mercado esté abierto y los QRs ya estén visibles.","expected_en":"The secondary market closes before or at the same time as QR unlock. There is no window where the market is open and QRs are already visible.","sanity_es":"• Verificar que la plataforma envía el tiempo de desbloqueo como parte de la información del show.","sanity_en":"• Verify the platform sends the unlock time as part of the show information.","section_es":"QRs y Desbloqueo","section_en":"QRs & Unlock"},{"id":"QR-07","section":"QRs y Desbloqueo","trigger":"Protección/Tecnología=QR dinámico","action":"Verificar la configuración del cierre del mercado secundario en el dashboard de menta.","expected":"El dashboard NO muestra la opción de 'tiempo de desbloqueo'. Solo muestra el horario de cierre del mercado secundario.","sanity":"• Verificar que el valor por defecto del cierre sea 2 horas antes del evento.","action_es":"Verificar la configuración del cierre del mercado secundario en el dashboard de menta.","action_en":"Verify the secondary market close configuration in the menta dashboard.","expected_es":"El dashboard NO muestra la opción de 'tiempo de desbloqueo'. Solo muestra el horario de cierre del mercado secundario.","expected_en":"The dashboard does NOT show the 'unlock time' option. It only shows the secondary market close time.","sanity_es":"• Verificar que el valor por defecto del cierre sea 2 horas antes del evento.","sanity_en":"• Verify the default close time is 2 hours before the event.","section_es":"QRs y Desbloqueo","section_en":"QRs & Unlock"},{"id":"QR-08","section":"QRs y Desbloqueo","trigger":"QR ticket delivery=PDF en el mail OR QR ticket delivery=Un PDF por ticket","action":"Un ticket se vende en el mercado secundario y se ejecuta el Change Ticket Owner. Verificar qué sucede con el PDF original del vendedor.","expected":"El PDF/QR original del vendedor ya no es válido para ingreso al evento. La ticketera es responsable de generar y entregar el nuevo PDF/QR al comprador.","sanity":"• Si el vendedor intenta usar el PDF original, el QR no debe ser válido para ingreso.","action_es":"Un ticket se vende en el mercado secundario y se ejecuta el Change Ticket Owner. Verificar qué sucede con el PDF original del vendedor.","action_en":"A ticket is sold on the secondary market and the Change Ticket Owner executes. Verify what happens with the seller's original PDF.","expected_es":"El PDF/QR original del vendedor ya no es válido para ingreso al evento. La plataforma es responsable de generar y entregar el nuevo PDF/QR al comprador.","expected_en":"The seller's original PDF/QR is no longer valid for event entry. The platform is responsible for generating and delivering the new PDF/QR to the buyer.","sanity_es":"• Si el vendedor intenta usar el PDF original, el QR no debe ser válido para ingreso.","sanity_en":"• If the seller attempts to use the original PDF, the QR must not be valid for entry.","section_es":"QRs y Desbloqueo","section_en":"QRs & Unlock"},{"id":"QR-09","section":"QRs y Desbloqueo","trigger":"QR ticket delivery=Add to wallet","action":"Un ticket se vende en el mercado secundario y se ejecuta el Change Ticket Owner. Verificar el comportamiento del ticket en la wallet del vendedor.","expected":"El ticket en la wallet del vendedor se invalida o actualiza para reflejar que ya no le pertenece. La ticketera es responsable de gestionar la actualización de los passes en Apple Wallet / Google Wallet.","sanity":"• Verificar que la ticketera tiene la capacidad de invalidar/actualizar passes de wallet de forma remota.","action_es":"Un ticket se vende en el mercado secundario y se ejecuta el Change Ticket Owner. Verificar el comportamiento del ticket en la wallet del vendedor.","action_en":"A ticket is sold on the secondary market and the Change Ticket Owner executes. Verify the ticket behavior in the seller's wallet.","expected_es":"El ticket en la wallet del vendedor se invalida o actualiza para reflejar que ya no le pertenece. La plataforma es responsable de gestionar la actualización de los passes en Apple Wallet / Google Wallet.","expected_en":"The ticket in the seller's wallet is invalidated or updated to reflect it no longer belongs to them. The platform is responsible for managing the pass updates in Apple Wallet / Google Wallet.","sanity_es":"• Verificar que la plataforma tiene la capacidad de invalidar/actualizar passes de wallet de forma remota.","sanity_en":"• Verify the platform has the capability to invalidate/update wallet passes remotely.","section_es":"QRs y Desbloqueo","section_en":"QRs & Unlock"},{"id":"QR-10","section":"QRs y Desbloqueo","trigger":"QR ticket delivery=App Móvil Propia","action":"Un ticket se vende en el mercado secundario y se ejecuta el Change Ticket Owner. Verificar el comportamiento del ticket en la app del vendedor y del comprador.","expected":"El ticket en la app del vendedor se actualiza para reflejar que fue vendido. La ticketera es responsable de mostrar el nuevo ticket al comprador en su app.","sanity":null,"action_es":"Un ticket se vende en el mercado secundario y se ejecuta el Change Ticket Owner. Verificar el comportamiento del ticket en la app del vendedor y del comprador.","action_en":"A ticket is sold on the secondary market and the Change Ticket Owner executes. Verify ticket behavior in the seller's and buyer's app.","expected_es":"El ticket en la app del vendedor se actualiza para reflejar que fue vendido. La plataforma es responsable de mostrar el nuevo ticket al comprador en su app.","expected_en":"The ticket in the seller's app is updated to reflect it was sold. The platform is responsible for showing the new ticket to the buyer in their app.","sanity_es":null,"sanity_en":null,"section_es":"QRs y Desbloqueo","section_en":"QRs & Unlock"},{"id":"QR-12","section":"QRs y Desbloqueo","trigger":"Protección/Tecnología=Código de Barras OR Protección/Tecnología=QR Estático OR Protección/Tecnología=Ninguna","action":"Un ticket sin protección de QR se vende en el mercado secundario.","expected":"El Change Ticket Owner regenera un nuevo código/QR para el comprador. El código original del vendedor queda invalidado.","sanity":"• Es especialmente crítico en estos casos ya que el vendedor siempre tuvo acceso al código original.","action_es":"Un ticket sin protección de QR se vende en el mercado secundario.","action_en":"A ticket without QR protection is sold on the secondary market.","expected_es":"El Change Ticket Owner regenera un nuevo código/QR para el comprador. El código original del vendedor queda invalidado.","expected_en":"The Change Ticket Owner regenerates a new code/QR for the buyer. The seller's original code is invalidated.","sanity_es":"• Es especialmente crítico en estos casos ya que el vendedor siempre tuvo acceso al código original.","sanity_en":"• This is especially critical in these cases since the seller always had access to the original code.","section_es":"QRs y Desbloqueo","section_en":"QRs & Unlock"},{"id":"TRF-01","section":"Transferencia/Compartir","trigger":"Transfer/share=Transfer (Cambio Titular)","action":"Un usuario tiene un ticket publicado para venta en el mercado secundario. Intentar transferir ese ticket a través de la ticketera.","expected":"La transferencia debe estar bloqueada mientras el ticket esté publicado para venta.","sanity":null,"action_es":"Un usuario tiene un ticket publicado para venta en el mercado secundario. Intentar transferir ese ticket a través de la plataforma.","action_en":"A user has a ticket listed for sale on the secondary market. Attempt to transfer that ticket through the platform.","expected_es":"La transferencia debe estar bloqueada mientras el ticket esté publicado para venta.","expected_en":"The transfer must be blocked while the ticket is listed for sale.","sanity_es":null,"sanity_en":null,"section_es":"Transferencia / Compartir","section_en":"Transfer / Share"},{"id":"TRF-02","section":"Transferencia/Compartir","trigger":"Transfer/share=Transfer (Cambio Titular)","action":"Un usuario tiene un ticket que ya fue vendido en el mercado secundario. Intentar transferir ese ticket a través de la ticketera.","expected":"La transferencia debe estar bloqueada para tickets vendidos en reventa.","sanity":null,"action_es":"Un usuario tiene un ticket que ya fue vendido en el mercado secundario. Intentar transferir ese ticket a través de la plataforma.","action_en":"A user has a ticket that was already sold on the secondary market. Attempt to transfer that ticket through the platform.","expected_es":"La transferencia debe estar bloqueada para tickets vendidos en reventa.","expected_en":"The transfer must be blocked for tickets sold in resale.","sanity_es":null,"sanity_en":null,"section_es":"Transferencia / Compartir","section_en":"Transfer / Share"},{"id":"TRF-03","section":"Transferencia/Compartir","trigger":"Transfer/share=Transfer (Cambio Titular)","action":"Un usuario transfiere un ticket que NO está publicado ni vendido en el mercado secundario.","expected":"La transferencia se completa correctamente. Si el ticket estaba sincronizado con menta, menta recibe la notificación de que el ticket cambió de titular.","sanity":"• Verify the buyerEmail in menta updates to the transfer recipient's email, not the original purchaser's.","action_es":"Un usuario transfiere un ticket que NO está publicado ni vendido en el mercado secundario.","action_en":"A user transfers a ticket that is NOT listed or sold on the secondary market.","expected_es":"La transferencia se completa correctamente. Si el ticket estaba sincronizado con menta, menta recibe la notificación de que el ticket cambió de titular.","expected_en":"The transfer completes successfully. If the ticket was synced with menta, menta receives the notification that the ticket changed ownership.","sanity_es":"• Verificar que el buyerEmail en menta se actualice al email del receptor de la transferencia, no del comprador original.","sanity_en":"• Verify the buyerEmail in menta updates to the transfer recipient's email, not the original purchaser's.","section_es":"Transferencia / Compartir","section_en":"Transfer / Share"},{"id":"TRF-04","section":"Transferencia/Compartir","trigger":"Transfer/share=Share (Compartir)","action":"Un usuario comparte un ticket con otro usuario. Verificar si el ticket compartido puede publicarse para venta en el mercado secundario.","expected":"Definir el comportamiento esperado según la integración: ¿el ticket compartido puede listarse para venta? ¿Solo el titular original puede vender?","sanity":null,"action_es":"Un usuario comparte un ticket con otro usuario. Verificar si el ticket compartido puede publicarse para venta en el mercado secundario.","action_en":"A user shares a ticket with another user. Verify whether the shared ticket can be listed for sale on the secondary market.","expected_es":"Definir el comportamiento esperado según la integración: ¿el ticket compartido puede listarse para venta? ¿Solo el titular original puede vender?","expected_en":"Define the expected behavior for the integration: can the shared ticket be listed for sale? Can only the original owner sell?","sanity_es":null,"sanity_en":null,"section_es":"Transferencia / Compartir","section_en":"Transfer / Share"},{"id":"TRF-05","section":"Transferencia/Compartir","trigger":"Transfer/share=Transfer accepted","action":"Un usuario inicia una transferencia de un ticket que está publicado para venta. El receptor aún no aceptó.","expected":"El ticket debe despublicarse al iniciar la transferencia, o la transferencia debe bloquearse mientras esté publicado.","sanity":"• Definir el comportamiento: ¿la transferencia bloquea la venta o la venta bloquea la transferencia?","action_es":"Un usuario inicia una transferencia de un ticket que está publicado para venta. El receptor aún no aceptó.","action_en":"A user initiates a transfer of a ticket that is listed for sale. The recipient has not yet accepted.","expected_es":"El ticket debe despublicarse al iniciar la transferencia, o la transferencia debe bloquearse mientras esté publicado.","expected_en":"The ticket must be delisted when the transfer is initiated, or the transfer must be blocked while the ticket is listed.","sanity_es":"• Definir el comportamiento: ¿la transferencia bloquea la venta o la venta bloquea la transferencia?","sanity_en":"• Define the behavior: does the transfer block the sale or does the sale block the transfer?","section_es":"Transferencia / Compartir","section_en":"Transfer / Share"},{"id":"TRF-06","section":"Transferencia/Compartir","trigger":"Transfer/share=Regenerate QR","action":"Un ticket se transfiere y la ticketera regenera el QR al transferir. Luego el receptor publica el ticket para venta y se vende en reventa.","expected":"El QR de la transferencia queda invalidado. El Change Ticket Owner genera un nuevo QR para el comprador de reventa.","sanity":"• Verificar que el mecanismo de regeneración de QR en transferencia es compatible con el mecanismo de regeneración en reventa (Change Ticket Owner).","action_es":"Un ticket se transfiere y la plataforma regenera el QR al transferir. Luego el receptor publica el ticket para venta y se vende en reventa.","action_en":"A ticket is transferred and the platform regenerates the QR on transfer. Then the recipient lists the ticket for sale and it sells in resale.","expected_es":"El QR de la transferencia queda invalidado. El Change Ticket Owner genera un nuevo QR para el comprador de reventa.","expected_en":"The transfer QR is invalidated. The Change Ticket Owner generates a new QR for the resale buyer.","sanity_es":"• Verificar que el mecanismo de regeneración de QR en transferencia es compatible con el mecanismo de regeneración en reventa (Change Ticket Owner).","sanity_en":"• Verify the QR regeneration mechanism on transfer is compatible with the regeneration mechanism on resale (Change Ticket Owner).","section_es":"Transferencia / Compartir","section_en":"Transfer / Share"},{"id":"TRF-07","section":"Transferencia/Compartir","trigger":"Transfer/share=No regen QR","action":"Un ticket se transfiere sin regeneración de QR. Luego el receptor publica el ticket para venta y se vende.","expected":"El Change Ticket Owner de la reventa debe regenerar el QR para el comprador de reventa, aunque la transferencia original no lo haya hecho.","sanity":"• Verificar que el QR final (post-reventa) sea válido y los anteriores queden invalidados.","action_es":"Un ticket se transfiere sin regeneración de QR. Luego el receptor publica el ticket para venta y se vende.","action_en":"A ticket is transferred without QR regeneration. Then the recipient lists the ticket for sale and it sells.","expected_es":"El Change Ticket Owner de la reventa debe regenerar el QR para el comprador de reventa, aunque la transferencia original no lo haya hecho.","expected_en":"The resale Change Ticket Owner must regenerate the QR for the resale buyer, even though the original transfer did not.","sanity_es":"• Verificar que el QR final (post-reventa) sea válido y los anteriores queden invalidados.","sanity_en"
