:"• Verify the final QR (post-resale) is valid and all previous ones are invalidated.","section_es":"Transferencia / Compartir","section_en":"Transfer / Share"},{"id":"RND-01","section":"Render Tickets","trigger":"Access to sell=API menta (SAL)","action":"Un usuario accede a 'Mis Tickets'. Verificar que la plataforma llama al endpoint SAL y renderiza los CTAs correctos para cada ticket según su estado en el mercado secundario.","expected":"La ticketera muestra correctamente los CTAs correspondientes para cada ticket según su estado en el mercado secundario (Vender, Ver detalle de venta, Editar precio, Cancelar publicación, etc.).","sanity":"• Verificar que la consulta se realiza en cada carga de página, no con datos cacheados.","action_es":"Un usuario accede a 'Mis Tickets'. Verificar que la plataforma llama al endpoint SAL y renderiza los CTAs correctos para cada ticket según su estado en el mercado secundario.","action_en":"A user accesses 'My Tickets' in the platform. Verify the platform calls the SAL endpoint and renders the correct CTAs for each ticket based on its secondary market status.","expected_es":"La plataforma muestra correctamente los CTAs correspondientes para cada ticket según su estado en el mercado secundario (Vender, Ver detalle de venta, Editar precio, Cancelar publicación, etc.).","expected_en":"The platform correctly displays the corresponding CTAs for each ticket based on its secondary market status (Sell, View sale details, Edit price, Cancel listing, etc.).","sanity_es":"• Verificar que la consulta se realiza en cada carga de página, no con datos cacheados.","sanity_en":"• Verify the query is made on each page load, not with cached data.","section_es":"Render de Tickets","section_en":"Render Tickets"},{"id":"RND-02","section":"Render Tickets","trigger":"Access to sell=API menta (SAL)","action":"Simular una caída o timeout del endpoint SAL de menta mientras el usuario accede a 'Mis Tickets'.","expected":"La página de tickets de la ticketera carga normalmente. Los tickets son visibles con toda su información. Únicamente los CTAs del mercado secundario no están disponibles.","sanity":null,"action_es":"Simular una caída o timeout del endpoint SAL de menta mientras el usuario accede a 'Mis Tickets'.","action_en":"Simulate an API outage or timeout on menta's SAL endpoint while the user accesses 'My Tickets'.","expected_es":"La página de tickets de la plataforma carga normalmente. Los tickets son visibles con toda su información. Únicamente los CTAs del mercado secundario no están disponibles.","expected_en":"The platform's ticket page loads normally. Tickets are visible with all their information. Only the secondary market CTAs are unavailable.","sanity_es":null,"sanity_en":null,"section_es":"Render de Tickets","section_en":"Render Tickets"},{"id":"RND-03","section":"Render Tickets","trigger":"Ticket data=GetUserData()","action":"Un usuario tiene tickets que aún no fueron sincronizados con menta. Accede a 'Mis Tickets'. La ticketera consulta la API pasando el contexto del evento y la categoría (sin ticketId, ya que menta aún no conoce el ticket).","expected":"En base al contexto (evento + categoría + tipo de precio), menta determina si la venta está habilitada. Si lo está, se muestra el CTA de 'Vender'. Al hacer click en el CTA, se ejecuta la sincronización del ticket (enviando el ticketId) y a partir de ahí el flujo continúa normalmente con el ticket ya identificado en menta.","sanity":"• La diferencia clave es que permite operar sin ticketId en la consulta inicial, usando solo el contexto de evento y categoría.","action_es":"Un usuario tiene tickets que aún no fueron sincronizados con menta. Accede a 'Mis Tickets'. La plataforma consulta la API pasando el contexto del evento y la categoría (sin ticketId, ya que menta aún no conoce el ticket).","action_en":"A user has tickets not yet synced with menta. They access 'My Tickets'. The platform queries the API with event and category context (without ticketId, since menta doesn't know the ticket yet).","expected_es":"En base al contexto (evento + categoría + tipo de precio), menta determina si la venta está habilitada. Si lo está, se muestra el CTA de 'Vender'. Al hacer click, se ejecuta la sincronización del ticket y el flujo continúa normalmente.","expected_en":"Based on context (event + category + price type), menta determines if selling is enabled. If so, the 'Sell' CTA is shown. On click, the ticket sync executes and the flow continues normally.","sanity_es":"• La diferencia clave es que permite operar sin ticketId en la consulta inicial, usando solo el contexto de evento y categoría.","sanity_en":"• The key difference is it allows operating without ticketId in the initial query, using only event and category context.","section_es":"Render de Tickets","section_en":"Render Tickets"},{"id":"RND-04","section":"Render Tickets","trigger":"Protección/Tecnología=QR lock OR Protección/Tecnología=QR delay (Diferido)","action":"Los QRs del evento ya fueron desbloqueados. El usuario accede a 'Mis Tickets'.","expected":"La ticketera sigue consultando el estado de los tickets en el mercado secundario. Los tickets vendidos siguen mostrando el CTA de 'Ver detalle' con la información de la venta (monto, estado del pago, etc.).","sanity":null,"action_es":"Los QRs del evento ya fueron desbloqueados. El usuario accede a 'Mis Tickets'.","action_en":"The event's QRs have already been unlocked. The user accesses 'My Tickets'.","expected_es":"La plataforma sigue consultando el estado de los tickets en el mercado secundario. Los tickets vendidos siguen mostrando el CTA de 'Ver detalle' con la información de la venta (monto, estado del pago, etc.).","expected_en":"The platform continues querying the ticket status on the secondary market. Sold tickets continue showing the 'View details' CTA with sale information (amount, payment status, etc.).","sanity_es":null,"sanity_en":null,"section_es":"Render de Tickets","section_en":"Render Tickets"},{"id":"RND-05","section":"Render Tickets","section_es":"Render Tickets","section_en":"Render Tickets","trigger":"Access to sell=Generic URL (Login Trust)","action":"Un usuario accede al flujo de reventa vía Generic URL. Verificar que el partner envía TODOS los tickets del usuario en la llamada API (no solo los listados o vendidos).","action_en":"A user accesses the resale flow via Generic URL. Verify the partner sends ALL of the user's tickets in the API call (not just listed or sold ones).","action_es":"Un usuario accede al flujo de reventa vía Generic URL. Verificar que el partner envía TODOS los tickets del usuario en la llamada API (no solo los listados o vendidos).","expected":"menta recibe la totalidad de los tickets del usuario para el evento. Los tickets aparecen correctamente categorizados: disponibles, listados y vendidos.","expected_en":"menta receives the complete set of the user's tickets for the event. Tickets appear correctly categorized: available, listed, and sold.","expected_es":"menta recibe la totalidad de los tickets del usuario para el evento. Los tickets aparecen correctamente categorizados: disponibles, listados y vendidos.","sanity":"• Verificar que no se omiten tickets que el usuario posee.\n• Verificar que tickets transferidos no se envían.\n• Verificar que tickets cancelados no se envían.","sanity_en":"• Verify no tickets the user owns are omitted.\n• Verify transferred tickets are not sent.\n• Verify cancelled tickets are not sent.","sanity_es":"• Verificar que no se omiten tickets que el usuario posee.\n• Verificar que tickets transferidos no se envían.\n• Verificar que tickets cancelados no se envían."},{"id":"RND-06","section":"Render Tickets","section_es":"Render Tickets","section_en":"Render Tickets","trigger":"Access to sell=Generic URL (Login Trust)","action":"Después de que el evento haya ocurrido, un usuario accede al flujo de reventa vía Generic URL. Verificar que el partner sigue haciendo la llamada API con los tickets del usuario.","action_en":"After the event has occurred, a user accesses the resale flow via Generic URL. Verify the partner still makes the API call with the user's tickets.","action_es":"Después de que el evento haya ocurrido, un usuario accede al flujo de reventa vía Generic URL. Verificar que el partner sigue haciendo la llamada API con los tickets del usuario.","expected":"El usuario puede ver la información de sus ventas en reventa (detalles de venta, estado de pago) incluso después de que el evento haya pasado. La llamada API no se desactiva post-evento.","expected_en":"The user can see their resale information (sale details, payout status) even after the event has passed. The API call is not disabled post-event.","expected_es":"El usuario puede ver la información de sus ventas en reventa (detalles de venta, estado de pago) incluso después de que el evento haya pasado. La llamada API no se desactiva post-evento.","sanity":"• Verificar que el estado de pago se actualiza correctamente (pendiente → pagado).\n• Verificar que el historial de ventas permanece visible.","sanity_en":"• Verify the payout status updates correctly (pending → paid).\n• Verify the sale history remains visible.","sanity_es":"• Verificar que el estado de pago se actualiza correctamente (pendiente → pagado).\n• Verificar que el historial de ventas permanece visible."},{"id":"RND-07","section":"Render Tickets","section_es":"Render Tickets","section_en":"Render Tickets","trigger":"Access to sell=Generic URL (Login Trust)","action":"Simular una falla en la llamada API del partner al generar la URL tokenizada o al enviar los tickets del usuario a menta.","action_en":"Simulate a failure in the partner's API call when generating the tokenized URL or when sending the user's tickets to menta.","action_es":"Simular una falla en la llamada API del partner al generar la URL tokenizada o al enviar los tickets del usuario a menta.","expected":"El partner muestra un mensaje de error claro al usuario. No se muestra una pantalla en blanco ni un error genérico. El usuario puede reintentar.","expected_en":"The partner displays a clear error message to the user. No blank screen or generic error is shown. The user can retry.","expected_es":"El partner muestra un mensaje de error claro al usuario. No se muestra una pantalla en blanco ni un error genérico. El usuario puede reintentar.","sanity":"• Verificar que el error no afecta la vista normal de 'Mis Tickets' del partner.\n• Verificar que se loguea el error para debugging.","sanity_en":"• Verify the error does not affect the partner's normal 'My Tickets' view.\n• Verify the error is logged for debugging.","sanity_es":"• Verificar que el error no afecta la vista normal de 'Mis Tickets' del partner.\n• Verificar que se loguea el error para debugging."},{"id":"SEL-01","section":"Resale Selling","trigger":"Estructura de precios=Category w/ >1 price","action":"Un evento tiene múltiples tipos de precio dentro de la misma categoría. Un usuario publica un ticket para venta.","expected":"El tipo de precio del ticket se identifica correctamente. Los límites de precio aplican según el tipo de precio específico del ticket, no de la categoría general.","sanity":null,"action_es":"Un evento tiene múltiples tipos de precio dentro de la misma categoría. Un usuario publica un ticket para venta.","action_en":"An event has multiple price types within the same category. A user lists a ticket for sale.","expected_es":"El tipo de precio del ticket se identifica correctamente. Los límites de precio aplican según el tipo de precio específico del ticket, no de la categoría general.","expected_en":"The ticket's price type is identified correctly. Price limits apply based on the ticket's specific price type, not the general category.","sanity_es":null,"sanity_en":null,"section_es":"Venta en Reventa","section_en":"Resale Selling"},{"id":"SEL-02","section":"Resale Selling","trigger":"Siempre aplica","action":"Un ticket publicado llega al horario de cierre del mercado secundario sin haberse vendido.","expected":"El ticket se despublica automáticamente. El vendedor es notificado de que su ticket fue retirado del mercado. El ticket vuelve a su estado normal.","sanity":null,"action_es":"Un ticket publicado llega al horario de cierre del mercado secundario sin haberse vendido.","action_en":"A listed ticket reaches the secondary market close time without being sold.","expected_es":"El ticket se despublica automáticamente. El vendedor es notificado de que su ticket fue retirado del mercado. El ticket vuelve a su estado normal.","expected_en":"The ticket is automatically delisted. The seller is notified that their ticket was removed from the market. The ticket returns to its normal state.","sanity_es":null,"sanity_en":null,"section_es":"Venta en Reventa","section_en":"Resale Selling"},{"id":"SEL-03","section":"Resale Selling","trigger":"Siempre aplica","action":"Un comprador adquiere un ticket en el mercado secundario. Luego intenta publicar ese mismo ticket para reventa nuevamente.","expected":"El comprador de reventa puede listar el ticket comprado para venta nuevamente. El nuevo listado aparece en el marketplace normalmente. Un nuevo Change Ticket Owner se ejecuta cuando el ticket re-listado se vende.","sanity":"• Verificar que el nuevo listado usa la identidad del comprador de reventa (no del vendedor original).\n• Verificar que el segundo Change Ticket Owner genera un nuevo QR para el segundo comprador.\n• Verificar que el pago de la segunda venta va al re-vendedor (primer comprador), no al vendedor original.","action_es":"Un comprador adquiere un ticket en el mercado secundario. Luego intenta publicar ese mismo ticket para reventa nuevamente.","action_en":"A buyer purchases a ticket on the secondary market. Then attempts to list that same ticket for resale again.","expected_es":"El comprador de reventa puede listar el ticket comprado para venta nuevamente. El nuevo listado aparece en el marketplace normalmente. Un nuevo Change Ticket Owner se ejecuta cuando el ticket re-listado se vende.","expected_en":"The resale buyer can list the purchased ticket for sale again. The new listing appears on the marketplace normally. A new Change Ticket Owner executes when the re-listed ticket sells.","sanity_es":"• Verificar que el nuevo listado usa la identidad del comprador de reventa (no del vendedor original).\n• Verificar que el segundo Change Ticket Owner genera un nuevo QR para el segundo comprador.\n• Verificar que el pago de la segunda venta va al re-vendedor (primer comprador), no al vendedor original.","sanity_en":"• Verify the new listing uses the resale buyer's identity (not the original seller's).\n• Verify the second Change Ticket Owner generates a new QR for the second buyer.\n• Verify the payout for the second sale goes to the re-seller (first buyer), not the original seller.","section_es":"Venta en Reventa","section_en":"Resale Selling"},{"id":"SEL-04","section":"Resale Selling","trigger":"Always applies","action":"A seller lists a ticket for resale, then withdraws the listing. Attempt to re-list the same ticket.","expected":"The ticket returns to AVAILABLE status after withdrawal. The seller can create a new listing for the same ticket with a new price. The new listing appears on the marketplace normally.","sanity":"• Verify the old listing is fully removed (not just hidden) before the new one is created.\n• Verify the seller receives the withdrawal confirmation email before being able to re-list.\n• Check that the re-listed ticket gets a new listing ID, not the old one reactivated.","action_es":"Un vendedor publica un ticket para reventa, luego retira la publicación. Intentar volver a publicar el mismo ticket.","action_en":"A seller lists a ticket for resale, then withdraws the listing. Attempt to re-list the same ticket.","expected_es":"El ticket vuelve al estado DISPONIBLE después de la retirada. El vendedor puede crear una nueva publicación para el mismo ticket con un nuevo precio. La nueva publicación aparece normalmente en el marketplace.","expected_en":"The ticket returns to AVAILABLE status after withdrawal. The seller can create a new listing for the same ticket with a new price. The new listing appears on the marketplace normally.","sanity_es":"• Verificar que la publicación anterior se elimina completamente (no solo se oculta) antes de crear la nueva.\n• Verificar que el vendedor recibe el email de confirmación de retirada antes de poder volver a publicar.\n• Comprobar que el ticket re-publicado obtiene un nuevo ID de listing, no el anterior reactivado.","sanity_en":"• Verify the old listing is fully removed (not just hidden) before the new one is created.\n• Verify the seller receives the withdrawal confirmation email before being able to re-list.\n• Check that the re-listed ticket gets a new listing ID, not the old one reactivated.","section_es":"Venta en Reventa","section_en":"Resale Selling"},{"id":"SEL-05","section":"Resale Selling","trigger":"Always applies","action":"A seller has a ticket that was sold on the secondary market. The secondary market closes for the event. The seller accesses their ticket view after market close.","expected":"The seller can still see the sale information (amount, payout status, buyer details) after the secondary market has closed. The sale record is not hidden or removed when the market closes.","sanity":"• Verify the sale info remains visible even after the event has occurred.\n• Check that the payout status updates correctly post-event (pending → paid).","action_es":"Un vendedor tiene un ticket que fue vendido en el mercado secundario. El mercado secundario cierra para el evento. El vendedor accede a su vista de tickets después del cierre.","action_en":"A seller has a ticket that was sold on the secondary market. The secondary market closes for the event. The seller accesses their ticket view after market close.","expected_es":"El vendedor puede seguir viendo la información de la venta (monto, estado del payout, detalles del comprador) después de que el mercado secundario haya cerrado. El registro de la venta no se oculta ni se elimina al cerrar el mercado.","expected_en":"The seller can still see the sale information (amount, payout status, buyer details) after the secondary market has closed. The sale record is not hidden or removed when the market closes.","sanity_es":"• Verificar que la información de la venta sigue visible incluso después de que el evento haya ocurrido.\n• Comprobar que el estado del payout se actualiza correctamente post-evento (pendiente → pagado).","sanity_en":"• Verify the sale info remains visible even after the event has occurred.\n• Check that the payout status updates correctly post-event (pending → paid).","section_es":"Venta en Reventa","section_en":"Resale Selling"},{"id":"SEL-06","section":"Resale Selling","section_es":"Resale Selling","section_en":"Resale Selling","trigger":"Always applies","action":"A seller attempts to list a ticket at a price below the configured minimum and above the configured maximum in the menta dashboard.","action_en":"A seller attempts to list a ticket at a price below the configured minimum and above the configured maximum in the menta dashboard.","action_es":"Un vendedor intenta listar un ticket a un precio por debajo del mínimo configurado y por encima del máximo configurado en el dashboard de menta.","expected":"The system prevents the listing at prices outside the configured range. A clear error message indicates the allowed price range. The seller can adjust the price and retry.","expected_en":"The system prevents the listing at prices outside the configured range. A clear error message indicates the allowed price range. The seller can adjust the price and retry.","expected_es":"El sistema impide el listado a precios fuera del rango configurado. Un mensaje claro indica el rango de precios permitido. El vendedor puede ajustar el precio y reintentar.","sanity":"• Verify limits apply per category/priceType, not globally.\n• Verify the face value is shown as a reference point.\n• Verify the fee preview updates when the price changes.","sanity_en":"• Verify limits apply per category/priceType, not globally.\n• Verify the face value is shown as a reference point.\n• Verify the fee preview updates when the price changes.","sanity_es":"• Verificar que los límites aplican por categoría/priceType, no globalmente.\n• Verificar que el face value se muestra como referencia.\n• Verificar que la previsualización de fees se actualiza al cambiar el precio."},{"id":"BUY-01","section":"Resale Buying","trigger":"Siempre aplica","action":"Un comprador completa la compra en el mercado secundario. Verificar que el cambio de titular (Change Ticket Owner) se ejecuta en el sistema de la ticketera.","expected":"El ticket queda asociado al comprador en la ticketera. El comprador puede ver el ticket en su sección de 'Mis Tickets'. El vendedor ya no tiene el ticket en su cuenta.","sanity":"• Verificar que el Change Ticket Owner se ejecutó correctamente.\n• Verificar timing: ¿el cambio es inmediato o hay delay?","action_es":"Un comprador completa la compra en el mercado secundario. Verificar que el cambio de titular (Change Ticket Owner) se ejecuta en el sistema de la plataforma.","action_en":"A buyer completes a purchase on the secondary market. Verify the change of ownership (Change Ticket Owner) executes in the platform's system.","expected_es":"El ticket queda asociado al comprador en la plataforma. El comprador puede ver el ticket en su sección de 'Mis Tickets'. El vendedor ya no tiene el ticket en su cuenta.","expected_en":"The ticket is associated with the buyer in the platform. The buyer can see the ticket in their 'My Tickets' section. The seller no longer has the ticket in their account.","sanity_es":"• Verificar que el Change Ticket Owner se ejecutó correctamente.\n• Verificar timing: ¿el cambio es inmediato o hay delay?","sanity_en":"• Verify the Change Ticket Owner executed correctly.\n• Verify timing: is the change immediate or is there a delay?","section_es":"Compra en Reventa","section_en":"Resale Buying"},{"id":"BUY-02","section":"Resale Buying","trigger":"Siempre aplica","action":"Verificar que el comprador de reventa recibe las comunicaciones correspondientes de la ticketera.","expected":"La ticketera envía al comprador el email de confirmación y el ticket/QR según su mecanismo habitual de delivery. Menta no interviene en este proceso.","sanity":null,"action_es":"Verificar que el comprador de reventa recibe las comunicaciones correspondientes de la plataforma.","action_en":"Verify the resale buyer receives the corresponding communications from the platform.","expected_es":"La plataforma envía al comprador el email de confirmación y el ticket/QR según su mecanismo habitual de delivery. Menta no interviene en este proceso.","expected_en":"The platform sends the buyer the confirmation email and ticket/QR according to its usual delivery mechanism. menta does not intervene in this process.","sanity_es":null,"sanity_en":null,"section_es":"Compra en Reventa","section_en":"Resale Buying"},{"id":"BUY-03","section":"Resale Buying","trigger":"Planimetría=Desarrollo propio OR Planimetría=Tercero","action":"Un comprador accede al marketplace de un evento con mapa interactivo y selecciona un asiento específico.","expected":"El mapa muestra correctamente los asientos disponibles en reventa. Al seleccionar un asiento, se inicia el flujo de compra para ese asiento específico.","sanity":"• Verificar que asientos en proceso de compra por otro usuario no aparecen como disponibles.\n• Verificar que no se generan asientos huérfanos al comprar.","action_es":"Un comprador accede al marketplace de un evento con mapa interactivo y selecciona un asiento específico.","action_en":"A buyer accesses the marketplace of an event with an interactive seat map and selects a specific seat.","expected_es":"El mapa muestra correctamente los asientos disponibles en reventa. Al seleccionar un asiento, se inicia el flujo de compra para ese asiento específico.","expected_en":"The map correctly shows the seats available in resale. When selecting a seat, the purchase flow starts for that specific seat.","sanity_es":"• Verificar que asientos en proceso de compra por otro usuario no aparecen como disponibles.\n• Verificar que no se generan asientos huérfanos al comprar.","sanity_en":"• Verify seats being purchased by another user do not appear as available.\n• Verify orphan seats are not generated when purchasing.","section_es":"Compra en Reventa","section_en":"Resale Buying"},{"id":"BUY-04","section":"Resale Buying","trigger":"Auth=Login Trust","action":"Un comprador ya autenticado en la ticketera accede al marketplace y compra un ticket.","expected":"El comprador no tiene que autenticarse nuevamente. La sesión de la ticketera se utiliza para identificar al comprador durante todo el flujo de compra.","sanity":null,"action_es":"Un comprador ya autenticado en la plataforma accede al marketplace y compra un ticket.","action_en":"A buyer already authenticated on the platform accesses the marketplace and purchases a ticket.","expected_es":"El comprador no tiene que autenticarse nuevamente. La sesión de la plataforma se utiliza para identificar al comprador durante todo el flujo de compra.","expected_en":"The buyer does not have to re-authenticate. The platform's session is used to identify the buyer throughout the purchase flow.","sanity_es":null,"sanity_en":null,"section_es":"Compra en Reventa","section_en":"Resale Buying"},{"id":"BUY-05","section":"Resale Buying","trigger":"Auth=Login Force","action":"Un comprador accede al marketplace para comprar un ticket.","expected":"Antes de completar la compra, el comprador es redirigido a autenticarse en la ticketera. Una vez autenticado, vuelve al punto del flujo donde estaba.","sanity":"• Verificar que no se pierde el contexto (ticket seleccionado) durante la redirección.","action_es":"Un comprador accede al marketplace para comprar un ticket.","action_en":"A buyer accesses the marketplace to purchase a ticket.","expected_es":"Antes de completar la compra, el comprador es redirigido a autenticarse en la plataforma. Una vez autenticado, vuelve al punto del flujo donde estaba.","expected_en":"Before completing the purchase, the buyer is redirected to authenticate on the platform. Once authenticated, they return to the point in the flow where they were.","sanity_es":"• Verificar que no se pierde el contexto (ticket seleccionado) durante la redirección.","sanity_en":"• Verify the context (selected ticket) is not lost during the redirect.","section_es":"Compra en Reventa","section_en":"Resale Buying"},{"id":"BUY-06","section":"Resale Buying","trigger":"Always applies","action":"A buyer enters the resale purchase flow. Verify which personal information fields are required to complete the purchase (name, email, phone, ID, address, etc.).","expected":"Only the fields required by the partner and menta are presented. All required fields are validated before allowing the purchase to proceed. No unnecessary fields are collected.","sanity":"• Compare the fields shown against the partner's primary purchase flow — they should be consistent.\n• Verify that fields required for Change Ticket Owner (e.g., email) are always mandatory, not optional.\n• Check that validation rules (email format, phone format) match the partner's standards.","action_es":"Un comprador ingresa al flujo de compra en reventa. Verificar qué campos de información personal se requieren para completar la compra (nombre, email, teléfono, documento, dirección, etc.).","action_en":"A buyer enters the resale purchase flow. Verify which personal information fields are required to complete the purchase (name, email, phone, ID, address, etc.).","expected_es":"Solo se presentan los campos requeridos por el partner y menta. Todos los campos obligatorios se validan antes de permitir la compra. No se recopilan campos innecesarios.","expected_en":"Only the fields required by the partner and menta are presented. All required fields are validated before allowing the purchase to proceed. No unnecessary fields are collected.","sanity_es":"• Comparar los campos mostrados con el flujo de compra primaria del partner — deben ser consistentes.\n• Verificar que los campos requeridos para el Change Ticket Owner (ej: email) sean siempre obligatorios, no opcionales.\n• Comprobar que las reglas de validación (formato de email, formato de teléfono) coincidan con los estándares del partner.","sanity_en":"• Compare the fields shown against the partner's primary purchase flow — they should be consistent.\n• Verify that fields required for Change Ticket Owner (e.g., email) are always mandatory, not optional.\n• Check that validation rules (email format, phone format) match the partner's standards.","section_es":"Compra en Reventa","section_en":"Resale Buying"},{"id":"BUY-07","section":"Resale Buying","section_es":"Compra en Reventa","section_en":"Resale Buying","trigger":"Atributos de asientos = Sí (tiene atributos)","action":"A seat with special attributes (e.g., wheelchair, obstructed view, removable armchair) is listed for resale. A buyer browses the interactive seat map and selects this seat.","action_es":"Un asiento con atributos especiales (ej: silla de ruedas, vista obstruida, apoyabrazos removible) está publicado en reventa. Un comprador navega el mapa interactivo y selecciona ese asiento.","action_en":"A seat with special attributes (e.g., wheelchair, obstructed view, removable armchair) is listed for resale. A buyer browses the interactive seat map and selects this seat.","expected":"The seat attributes are visible on the interactive map (tooltip or label) and in the purchase flow details before the buyer confirms the purchase. The buyer can make an informed decision based on the seat characteristics.","expected_es":"Los atributos del asiento son visibles en el mapa interactivo (tooltip o etiqueta) y en los detalles del flujo de compra antes de que el comprador confirme la compra. El comprador puede tomar una decisión informada basada en las características del asiento.","expected_en":"The seat attributes are visible on the interactive map (tooltip or label) and in the purchase flow details before the buyer confirms the purchase. The buyer can make an informed decision based on the seat characteristics.","sanity":"• Verify attributes appear both on the map hover/tooltip AND on the checkout confirmation screen.\n• Check that attribute labels are human-readable (not internal codes).\n• If the platform adds new attribute types after integration, verify they propagate correctly.","sanity_es":"• Verificar que los atributos aparecen tanto en el hover/tooltip del mapa COMO en la pantalla de confirmación de compra.\n• Comprobar que las etiquetas de atributos son legibles (no códigos internos).\n• Si la plataforma agrega nuevos tipos de atributos después de la integración, verificar que se propagan correctamente.","sanity_en":"• Verify attributes appear both on the map hover/tooltip AND on the checkout confirmation screen.\n• Check that attribute labels are human-readable (not internal codes).\n• If the platform adds new attribute types after integration, verify they propagate correctly."},{"id":"BUY-08","section":"Resale Buying","section_es":"Resale Buying","section_en":"Resale Buying","trigger":"Planimetría=Desarrollo propio OR Planimetría=Tercero","action":"Un comprador selecciona un asiento de reventa en el mapa interactivo y procede al checkout. Mientras está en checkout, otro comprador intenta seleccionar el mismo asiento.","action_en":"A buyer selects a resale seat on the interactive map and proceeds to checkout. While in checkout, another buyer attempts to select the same seat.","action_es":"Un comprador selecciona un asiento de reventa en el mapa interactivo y procede al checkout. Mientras está en checkout, otro comprador intenta seleccionar el mismo asiento.","expected":"El asiento se bloquea en el mapa en cuanto el primer comprador entra en checkout. El segundo comprador ve el asiento como no disponible. Si el primer comprador abandona el checkout, el asiento se libera automáticamente.","expected_en":"The seat is blocked on the map as soon as the first buyer enters checkout. The second buyer sees the seat as unavailable. If the first buyer abandons checkout, the seat is released automatically.","expected_es":"El asiento se bloquea en el mapa en cuanto el primer comprador entra en checkout. El segundo comprador ve el asiento como no disponible. Si el primer comprador abandona el checkout, el asiento se libera automáticamente.","sanity":"• Verificar el tiempo de bloqueo del asiento (timeout de reserva).\n• Verificar que no se generan asientos huérfanos al completar la compra.","sanity_en":"• Verify the seat blocking timeout (reservation timeout).\n• Verify no orphan seats are generated when completing the purchase.","sanity_es":"• Verificar el tiempo de bloqueo del asiento (timeout de reserva).\n• Verificar que no se generan asientos huérfanos al completar la compra."},{"id":"CBO-01","section":"Change Ticket Owner","trigger":"Siempre aplica","action":"Un ticket se vende en el mercado secundario. Verificar que se ejecuta el cambio de titular en el sistema de la ticketera.","expected":"El ticket queda registrado a nombre del comprador en la ticketera. El vendedor ya no aparece como titular del ticket.","sanity":"• Verificar que el cambio se refleja en todos los sistemas de la ticketera (base de datos, control de acceso, reportería).","action_es":"Un ticket se vende en el mercado secundario. Verificar que se ejecuta el cambio de titular en el sistema de la plataforma.","action_en":"A ticket is sold on the secondary market. Verify the ownership change executes in the platform's system.","expected_es":"El ticket queda registrado a nombre del comprador en la plataforma. El vendedor ya no aparece como titular del ticket.","expected_en":"The ticket is registered under the buyer's name in the platform. The seller no longer appears as the ticket owner.","sanity_es":"• Verificar que el cambio se refleja en todos los sistemas de la plataforma (base de datos, control de acceso, reportería).","sanity_en":"• Verify the change is reflected in all of the platform's systems (database, access control, reporting).","section_es":"Cambio de Titular","section_en":"Change Ticket Owner"},{"id":"CBO-02","section":"Change Ticket Owner","trigger":"Protección/Tecnología≠QR lock","action":"Se ejecuta el Change Ticket Owner de un ticket cuyo vendedor tuvo o pudo tener acceso visual al QR.","expected":"Se genera un nuevo QR/código para el comprador. El QR/código original del vendedor queda invalidado.","sanity":"• Verificar que el QR original efectivamente no permite ingreso al evento post-Change Ticket Owner.","action_es":"Se ejecuta el Change Ticket Owner de un ticket cuyo vendedor tuvo o pudo tener acceso visual al QR.","action_en":"The Change Ticket Owner executes for a ticket whose seller had or could have had visual access to the QR.","expected_es":"Se genera un nuevo QR/código para el comprador. El QR/código original del vendedor queda invalidado.","expected_en":"A new QR/code is generated for the buyer. The seller's original QR/code is invalidated.","sanity_es":"• Verificar que el QR original efectivamente no permite ingreso al evento post-Change Ticket Owner.","sanity_en":"• Verify the original QR does not allow event entry post-Change Ticket Owner.","section_es":"Cambio de Titular","section_en":"Change Ticket Owner"},{"id":"CBO-03","section":"Change Ticket Owner","trigger":"Protección/Tecnología=QR lock","action":"Se ejecuta el Change Ticket Owner de un ticket con QR protegido por lock.","expected":"El cambio de titular se completa correctamente. El comprador recibirá su QR cuando corresponda según el mecanismo de desbloqueo de la ticketera.","sanity":"• Verificar que el titular del ticket en el sistema de control de acceso es el comprador (no el vendedor original).","action_es":"Se ejecuta el Change Ticket Owner de un ticket con QR protegido por lock.","action_en":"The Change Ticket Owner executes for a ticket with a lock-protected QR.","expected_es":"El cambio de titular se completa correctamente. El comprador recibirá su QR cuando corresponda según el mecanismo de desbloqueo de la plataforma.","expected_en":"The ownership change completes correctly. The buyer will receive their QR at the appropriate time according to the platform's unlock mechanism.","sanity_es":"• Verificar que el titular del ticket en el sistema de control de acceso es el comprador (no el vendedor original).","sanity_en":"• Verify the ticket owner in the access control system is the buyer (not the original seller).","section_es":"Cambio de Titular","section_en":"Change Ticket Owner"},{"id":"CBO-04","section":"Change Ticket Owner","trigger":"Siempre aplica","action":"Se ejecuta el Change Ticket Owner. Verificar la trazabilidad del cambio de titular.","expected":"El sistema de la ticketera registra el historial del cambio: titular anterior, titular nuevo, fecha/hora, motivo (reventa vía menta).","sanity":"• Esta trazabilidad es necesaria para resolución de disputas, auditoría y soporte.","action_es":"Se ejecuta el Change Ticket Owner. Verificar la trazabilidad del cambio de titular.","action_en":"The Change Ticket Owner executes. Verify the traceability of the ownership change.","expected_es":"El sistema de la plataforma registra el historial del cambio: titular anterior, titular nuevo, fecha/hora, motivo (reventa vía menta).","expected_en":"The platform's system records the change history: previous owner, new owner, date/time, reason (resale via menta).","sanity_es":"• Esta trazabilidad es necesaria para resolución de disputas, auditoría y soporte.","sanity_en":"• This traceability is necessary for dispute resolution, auditing, and support.","section_es":"Cambio de Titular","section_en":"Change Ticket Owner"},{"id":"CBO-05","section":"Change Ticket Owner","trigger":"Change Ticket Owner — QR=Regenerates QR code","action":"Se ejecuta el Change Ticket Owner con regeneración de QR. Verificar que el nuevo QR es válido para ingreso.","expected":"El nuevo QR generado para el comprador es reconocido por el sistema de control de acceso del venue. El QR anterior queda rechazado.","sanity":null,"action_es":"Se ejecuta el Change Ticket Owner con regeneración de QR. Verificar que el nuevo QR es válido para ingreso.","action_en":"The Change Ticket Owner executes with QR regeneration. Verify the new QR is valid for entry.","expected_es":"El nuevo QR generado para el comprador es reconocido por el sistema de control de acceso del venue. El QR anterior queda rechazado.","expected_en":"The new QR generated for the buyer is recognized by the venue's access control system. The previous QR is rejected.","sanity_es":null,"sanity_en":null,"section_es":"Cambio de Titular","section_en":"Change Ticket Owner"},{"id":"CBO-06","section":"Change Ticket Owner","trigger":"Change Ticket Owner — QR=Only on front","action":"Se ejecuta el Change Ticket Owner donde la regeneración solo ocurre a nivel visual (frontend).","expected":"El comprador ve un nuevo QR en su interfaz. Verificar que a nivel de backend/control de acceso, el cambio de titular también se refleja correctamente.","sanity":"• Si la regeneración es solo frontend, verificar que el sistema de escaneo valida por titular y no por código QR, ya que el código podría no haber cambiado a nivel backend.","action_es":"Se ejecuta el Change Ticket Owner donde la regeneración solo ocurre a nivel visual (frontend).","action_en":"The Change Ticket Owner executes where regeneration only occurs at the visual (frontend) level.","expected_es":"El comprador ve un nuevo QR en su interfaz. Verificar que a nivel de backend/control de acceso, el cambio de titular también se refleja correctamente.","expected_en":"The buyer sees a new QR in their interface. Verify that at the backend/access control level, the ownership change is also correctly reflected.","sanity_es":"• Si la regeneración es solo frontend, verificar que el sistema de escaneo valida por titular y no por código QR, ya que el código podría no haber cambiado a nivel backend.","sanity_en":"• If regeneration is frontend-only, verify the scanning system validates by owner and not by QR code, since the code may not have changed at the backend level.","section_es":"Cambio de Titular","section_en":"Change Ticket Owner"},{"id":"CBO-07","section":"Change Ticket Owner","trigger":"Siempre aplica","action":"Un Change Ticket Owner falla a mitad de ejecución (timeout, error de la ticketera).","expected":"El sistema maneja el error de forma consistente: o se completa la operación con retry, o se revierte completamente. No puede quedar en un estado intermedio donde el vendedor perdió el ticket pero el comprador no lo recibió.","sanity":"• Verificar el mecanismo de retry/rollback.\n• Verificar que el pago al vendedor no se ejecuta si el Change Ticket Owner no se completó.","action_es":"Un Change Ticket Owner falla a mitad de ejecución (timeout, error de la plataforma).","action_en":"A Change Ticket Owner fails mid-execution (timeout, platform error).","expected_es":"El sistema maneja el error de forma consistente: o se completa la operación con retry, o se revierte completamente. No puede quedar en un estado intermedio donde el vendedor perdió el ticket pero el comprador no lo recibió.","expected_en":"The system handles the error consistently: either the operation completes with retry, or it reverts completely. It cannot remain in an intermediate state where the seller lost the ticket but the buyer didn't receive it.","sanity_es":"• Verificar el mecanismo de retry/rollback.\n• Verificar que el pago al vendedor no se ejecuta si el Change Ticket Owner no se completó.","sanity_en":"• Verify the retry/rollback mechanism.\n• Verify the seller payment is not executed if the Change Ticket Owner did not complete.","section_es":"Cambio de Titular","section_en":"Change Ticket Owner"},{"id":"CBO-08","section":"Change Ticket Owner","trigger":"Change Ticket Owner=Requires account (Cuenta obligatoria)","action":"Un comprador que no tiene cuenta en la ticketera intenta comprar en el mercado secundario.","expected":"Si la plataforma requiere cuenta para la titularidad del ticket, el sistema asegura que exista antes o durante el Change Ticket Owner. Puede ser mediante: (a) Login Force — el comprador crea cuenta antes de la compra, o (b) creación programática — el partner crea la cuenta vía su API interna al recibir el webhook de CTO. Ambos caminos deben resultar en que el comprador tenga una cuenta válida con el ticket asignado.","sanity":null,"action_es":"Un comprador que no tiene cuenta en la plataforma intenta comprar en el mercado secundario.","action_en":"A buyer who does not have an account on the platform attempts to purchase on the secondary market.","expected_es":"Si la plataforma requiere cuenta para la titularidad del ticket, el sistema asegura que exista antes o durante el Change Ticket Owner. Puede ser mediante: (a) Login Force — el comprador crea cuenta antes de la compra, o (b) creación programática — el partner crea la cuenta vía su API interna al recibir el webhook de CTO. Ambos caminos deben resultar en que el comprador tenga una cuenta válida con el ticket asignado.","expected_en":"If the platform requires an account for ticket ownership, the system ensures one exists before or during the Change Ticket Owner. This can be via: (a) Login Force — buyer creates account before purchase, or (b) programmatic account creation — partner creates the account via their internal API upon receiving the CTO webhook. Both paths must result in the buyer having a valid account with the ticket assigned.","sanity_es":null,"sanity_en":null,"section_es":"Cambio de Titular","section_en":"Change Ticket Owner"},{"id":"CBO-09","section":"Change Ticket Owner","trigger":"Abonos=Un QR para todo el abono","action":"Se vende una sesión individual de un abono en el mercado secundario. Se ejecuta el Change Ticket Owner.","expected":"Se genera un nuevo QR para el comprador de esa sesión. El QR original del abono pierde acceso únicamente a la sesión vendida, manteniendo el acceso a las demás sesiones.","sanity":"• Verificar que el vendedor puede seguir ingresando a las sesiones no vendidas.\n• Verificar que en la interfaz del vendedor se refleja claramente que perdió acceso a esa sesión.","action_es":"Se vende una sesión individual de un abono en el mercado secundario. Se ejecuta el Change Ticket Owner.","action_en":"A single session of a season pass is sold on the secondary market. The Change Ticket Owner executes.","expected_es":"Se genera un nuevo QR para el comprador de esa sesión. El QR original del abono pierde acceso únicamente a la sesión vendida, manteniendo el acceso a las demás sesiones.","expected_en":"A new QR is generated for the buyer of that session. The original season pass QR loses access only to the sold session, maintaining access to all other sessions.","sanity_es":"• Verificar que el vendedor puede seguir ingresando a las sesiones no vendidas.\n• Verificar que en la interfaz del vendedor se refleja claramente que perdió acceso a esa sesión.","sanity_en":"• Verify the seller can still attend unsold sessions.\n• Verify the seller's interface clearly reflects they lost access to that session.","section_es":"Cambio de Titular","section_en":"Change Ticket Owner"},{"id":"CBO-10","section":"Change Ticket Owner","trigger":"Siempre aplica","action":"Un comprador de reventa intenta poner a la venta el ticket que compró.","expected":"El ticket puede ser re-listado para venta. El Change Ticket Owner se ejecuta correctamente para la segunda venta, transfiriendo la titularidad del primer comprador de reventa al segundo comprador.","sanity":null,"action_es":"Un comprador de reventa intenta poner a la venta el ticket que compró.","action_en":"A resale buyer attempts to list the ticket they purchased for sale.","expected_es":"El ticket puede ser re-listado para venta. El Change Ticket Owner se ejecuta correctamente para la segunda venta, transfiriendo la titularidad del primer comprador de reventa al segundo comprador.","expected_en":"The ticket can be re-listed for sale. The Change Ticket Owner executes correctly for the second sale, transferring ownership from the first resale buyer to the second buyer.","sanity_es":null,"sanity_en":null,"section_es":"Cambio de Titular","section_en":"Change Ticket Owner"},{"id":"CBO-11","section":"Change Ticket Owner","section_es":"Change Ticket Owner","section_en":"Change Ticket Owner","trigger":"Always applies","action":"A user has 3 tickets: one available, one listed for sale, and one already sold via resale. The user requests cancellation of all tickets through the partner's cancellation flow.","action_en":"A user has 3 tickets: one available, one listed for sale, and one already sold via resale. The user requests cancellation of all tickets through the partner's cancellation flow.","action_es":"Un usuario tiene 3 tickets: uno disponible, uno listado para venta, y uno ya vendido por reventa. El usuario solicita la cancelación de todos los tickets a través del flujo de cancelación del partner.","expected":"The partner detects the resold ticket and excludes it from the cancellation. The available ticket is cancelled normally. The listed ticket is delisted and then cancelled. The resold ticket remains intact — the resale buyer's ticket is not affected.","expected_en":"The partner detects the resold ticket and excludes it from the cancellation. The available ticket is cancelled normally. The listed ticket is delisted and then cancelled. The resold ticket remains intact — the resale buyer's ticket is not affected.","expected_es":"El partner detecta el ticket revendido y lo excluye de la cancelación. El ticket disponible se cancela normalmente. El ticket listado se deslista y luego se cancela. El ticket revendido permanece intacto — el ticket del comprador de reventa no se ve afectado.","sanity":"• Verify the seller is notified about which tickets were cancelled and which were excluded.\n• Verify menta is notified to cancel the seller's payout for the excluded ticket.\n• Verify the resale buyer's ticket remains valid for event entry.","sanity_en":"• Verify the seller is notified about which tickets were cancelled and which were excluded.\n• Verify menta is notified to cancel the seller's payout for the excluded ticket.\n• Verify the resale buyer's ticket remains valid for event entry.","sanity_es":"• Verificar que se notifica al vendedor qué tickets fueron cancelados y cuáles excluidos.\n• Verificar que se notifica a menta para cancelar el pago del vendedor del ticket excluido.\n• Verificar que el ticket del comprador de reventa sigue siendo válido para el ingreso."},{"id":"CBO-12","section":"Change Ticket Owner","section_es":"Change Ticket Owner","section_en":"Change Ticket Owner","trigger":"Always applies","action":"A chargeback is reported on a resale transaction. Verify the manual notification process and its effects.","action_en":"A chargeback is reported on a resale transaction. Verify the manual notification process and its effects.","action_es":"Se reporta un contracargo sobre una transacción de reventa. Verificar el proceso de notificación manual y sus efectos.","expected":"The chargeback is communicated to menta through the established support channel. menta reverses the Change Ticket Owner and adjusts or cancels the seller payout. The buyer's ticket is invalidated.","expected_en":"The chargeback is communicated to menta through the established support channel. menta reverses the Change Ticket Owner and adjusts or cancels the seller payout. The buyer's ticket is invalidated.","expected_es":"El contracargo se comunica a menta a través del canal de soporte establecido. menta revierte el Change Ticket Owner y ajusta o cancela el pago al vendedor. El ticket del comprador se invalida.","sanity":"• Verify the seller's original ticket is restored after CTO reversal.\n• Verify the buyer is notified of the ticket invalidation.\n• Verify the timeline: how quickly must the chargeback be communicated?","sanity_en":"• Verify the seller's original ticket is restored after CTO reversal.\n• Verify the buyer is notified of the ticket invalidation.\n• Verify the timeline: how quickly must the chargeback be communicated?","sanity_es":"• Verificar que el ticket original del vendedor se restaura tras la reversión del CTO.\n• Verificar que se notifica al comprador de la invalidación del ticket.\n• Verificar el plazo: ¿con qué rapidez se debe comunicar el contracargo?"},{"id":"AUTH-01","section":"Authentication","trigger":"Auth=Login Trust","action":"Un usuario ya autenticado en la ticketera accede al flujo de venta o compra en el mercado secundario.","expected":"El usuario no tiene que autenticarse nuevamente. La identidad del usuario se obtiene de la sesión de la ticketera de forma transparente.","sanity":"• Verificar que el token/sesión de la ticketera se transmite correctamente a menta.\n• Verificar que la identidad del usuario coincide entre la ticketera y menta.","action_es":"Un usuario ya autenticado en la plataforma accede al flujo de venta o compra en el mercado secundario.","action_en":"A user already authenticated on the platform accesses the sell or buy flow on the secondary market.","expected_es":"El usuario no tiene que autenticarse nuevamente. La identidad del usuario se obtiene de la sesión de la plataforma de forma transparente.","expected_en":"The user does not have to re-authenticate. The user's identity is obtained from the platform's session transparently.","sanity_es":"• Verificar que el token/sesión de la plataforma se transmite correctamente a menta.\n• Verificar que la identidad del usuario coincide entre la plataforma y menta.","sanity_en":"• Verify the platform's token/session is transmitted correctly to menta.\n• Verify the user identity matches between the platform and menta.","section_es":"Autenticación","section_en":"Authentication"},{"id":"AUTH-02","section":"Authentication","trigger":"Auth=Login Trust","action":"Un usuario NO autenticado en la ticketera intenta acceder al mercado secundario.","expected":"El usuario es redirigido al login de la ticketera. Una vez autenticado, vuelve automáticamente al punto del flujo donde estaba.","sanity":"• Verificar que no se pierde el contexto (ticket seleccionado, precio, etc.) durante la redirección.","action_es":"Un usuario NO autenticado en la plataforma intenta acceder al mercado secundario.","action_en":"A user NOT authenticated on the platform attempts to access the secondary market.","expected_es":"El usuario es redirigido al login de la plataforma. Una vez autenticado, vuelve automáticamente al punto del flujo donde estaba.","expected_en":"The user is redirected to the platform login. Once authenticated, they automatically return to the point in the flow where they were.","sanity_es":"• Verificar que no se pierde el contexto (ticket seleccionado, precio, etc.) durante la redirección.","sanity_en":"• Verify the context (selected ticket, price, etc.) is not lost during the redirect.","section_es":"Autenticación","section_en":"Authentication"},{"id":"AUTH-03","section":"Authentication","trigger":"Auth=Login Force","action":"Un usuario accede al flujo de compra o venta en el mercado secundario.","expected":"El sistema redirige obligatoriamente al usuario al login de la ticketera antes de continuar con cualquier acción.","sanity":"• Verificar que después de autenticarse, el usuario vuelve al flujo correcto (venta o compra).\n• Verificar que el usuario queda registrado como cuenta en la ticketera (requisito para Change Ticket Owner).","action_es":"Un usuario accede al flujo de compra o venta en el mercado secundario.","action_en":"A user accesses the buy or sell flow on the secondary market.","expected_es":"El sistema redirige obligatoriamente al usuario al login de la plataforma antes de continuar con cualquier acción.","expected_en":"The system mandatorily redirects the user to the platform login before continuing with any action.","sanity_es":"• Verificar que después de autenticarse, el usuario vuelve al flujo correcto (venta o compra).\n• Verificar que el usuario queda registrado como cuenta en la plataforma (requisito para Change Ticket Owner).","sanity_en":"• Verify that after authenticating, the user returns to the correct flow (sell or buy).\n• Verify the user is registered as an account in the platform (required for Change Ticket Owner).","section_es":"Autenticación","section_en":"Authentication"},{"id":"AUTH-05","section":"Authentication","trigger":"Auth=Menta Auth","action":"Un usuario accede al flujo de compra o venta en el mercado secundario.","expected":"El usuario se autentica directamente en menta con sus credenciales de menta (no de la ticketera).","sanity":"• Verificar que el Change Ticket Owner puede ejecutarse correctamente con un usuario autenticado en menta pero no necesariamente en la ticketera.","action_es":"Un usuario accede al flujo de compra o venta en el mercado secundario.","action_en":"A user accesses the buy or sell flow on the secondary market.","expected_es":"El usuario se autentica directamente en menta con sus credenciales de menta (no de la plataforma).","expected_en":"The user authenticates directly in menta with their menta credentials (not the platform's).","sanity_es":"• Verificar que el Change Ticket Owner puede ejecutarse correctamente con un usuario autenticado en menta pero no necesariamente en la plataforma.","sanity_en":"• Verify the Change Ticket Owner can execute correctly with a user authenticated in menta but not necessarily in the platform.","section_es":"Autenticación","section_en":"Authentication"},{"id":"AUTH-06","section":"Authentication","trigger":"Auth Data=Phone number","action":"Un usuario cuyo identificador principal es el número de teléfono accede al flujo del mercado secundario.","expected":"El sistema identifica al usuario por su número de teléfono. Se envía un código OTP al teléfono para verificación. Una vez validado, el usuario puede operar normalmente.","sanity":"• Verificar que el número de teléfono se mapea correctamente como identificador del usuario.","action_es":"Un usuario cuyo identificador principal es el número de teléfono accede al flujo del mercado secundario.","action_en":"A user whose primary identifier is their phone number accesses the secondary market flow.","expected_es":"El sistema identifica al usuario por su número de teléfono. Se envía un código OTP al teléfono para verificación. Una vez validado, el usuario puede operar normalmente.","expected_en":"The system identifies the user by their phone number. An OTP code is sent to the phone for verification. Once validated, the user can operate normally.","sanity_es":"• Verificar que el número de teléfono se mapea correctamente como identificador del usuario.","sanity_en":"• Verify the phone number is correctly mapped as the user identifier.","section_es":"Autenticación","section_en":"Authentication"},{"id":"AUTH-07","section":"Authentication","trigger":"Auth=Login Trust OR Auth=Login Force","action":"Un usuario se autentica correctamente pero su cuenta en la ticketera está deshabilitada, suspendida o tiene restricciones.","expected":"El sistema muestra un mensaje claro indicando que no puede operar en el mercado secundario debido al estado de su cuenta.","sanity":null,"action_es":"Un usuario se autentica correctamente pero su cuenta en la plataforma está deshabilitada, suspendida o tiene restricciones.","action_en":"A user authenticates correctly but their account on the platform is disabled, suspended, or has restrictions.","expected_es":"El sistema muestra un mensaje claro indicando que no puede operar en el mercado secundario debido al estado de su cuenta.","expected_en":"The system displays a clear message indicating the user cannot operate on the secondary market due to their account status.","sanity_es":null,"sanity_en":null,"section_es":"Autenticación","section_en":"Authentication"},{"id":"ACC-01","section":"Accesos/Redirecciones","trigger":"Siempre aplica","action":"Un comprador completa una compra en el mercado secundario. Verificar la página de confirmación (congratulations).","expected":"Se muestra una página de confirmación con el resumen de la compra. Incluye un enlace o redirección a 'Mis Tickets' en la ticketera donde el comprador puede ver su ticket adquirido.","sanity":null,"action_es":"Un comprador completa una compra en el mercado secundario. Verificar la página de confirmación (congratulations).","action_en":"A buyer completes a purchase on the secondary market. Verify the confirmation page (congratulations).","expected_es":"Se muestra una página de confirmación con el resumen de la compra. Incluye un enlace o redirección a 'Mis Tickets' en la plataforma donde el comprador puede ver su ticket adquirido.","expected_en":"A confirmation page is displayed with the purchase summary. It includes a link or redirect to 'My Tickets' on the platform where the buyer can see their purchased ticket.","sanity_es":null,"sanity_en":null,"section_es":"Accesos y Redirecciones","section_en":"Access & Redirects"},{"id":"ACC-02","section":"Accesos/Redirecciones","trigger":"Siempre aplica","action":"Verificar que los emails transaccionales del mercado secundario contienen los enlaces correctos.","expected":"Los enlaces en los emails redirigen correctamente a la sección correspondiente de la ticketera (Mis Tickets, detalle de venta, etc.). Los enlaces no están rotos ni redirigen a páginas genéricas.","sanity":null,"action_es":"Verificar que los emails transaccionales del mercado secundario contienen los enlaces correctos.","action_en":"Verify that secondary market transactional emails contain the correct links.","expected_es":"Los enlaces en los emails redirigen correctamente a la sección correspondiente de la plataforma (Mis Tickets, detalle de venta, etc.). Los enlaces no están rotos ni redirigen a páginas genéricas.","expected_en":"The links in the emails correctly redirect to the corresponding platform section (My Tickets, sale details, etc.). Links are not broken and do not redirect to generic pages.","sanity_es":null,"sanity_en":null,"section_es":"Accesos y Redirecciones","section_en":"Access & Redirects"},{"id":"ACC-03","section":"Accesos/Redirecciones","trigger":"Siempre aplica","action":"Un usuario accede a un enlace del mercado secundario sin estar autenticado.","expected":"El usuario es redirigido al flujo de autenticación correspondiente y, una vez autenticado, vuelve a la página original a la que intentaba acceder.","sanity":null,"action_es":"Un usuario accede a un enlace del mercado secundario sin estar autenticado.","action_en":"A user accesses a secondary market link without being authenticated.","expected_es":"El usuario es redirigido al flujo de autenticación correspondiente y, una vez autenticado, vuelve a la página original a la que intentaba acceder.","expected_en":"The user is redirected to the corresponding authentication flow and, once authenticated, returns to the original page they were trying to access.","sanity_es":null,"sanity_en":null,"section_es":"Accesos y Redirecciones","section_en":"Access & Redirects"},{"id":"ACC-04","section":"Accesos/Redirecciones","trigger":"QR ticket delivery=App Móvil Propia","action":"Un usuario accede al enlace de 'Mis Tickets' desde un dispositivo móvil.","expected":"El enlace redirige al usuario a la app mediante deeplink. Si la app no está instalada, redirige al store correspondiente (App Store / Google Play).","sanity":null,"action_es":"Un usuario accede al enlace de 'Mis Tickets' desde un dispositivo móvil.","action_en":"A user accesses the 'My Tickets' link from a mobile device.","expected_es":"El enlace redirige al usuario a la app mediante deeplink. Si la app no está instalada, redirige al store correspondiente (App Store / Google Play).","expected_en":"The link redirects the user to the app via deeplink. If the app is not installed, it redirects to the corresponding store (App Store / Google Play).","sanity_es":null,"sanity_en":null,"section_es":"Accesos y Redirecciones","section_en":"Access & Redirects"},{"id":"ACC-05","section":"Accesos/Redirecciones","trigger":"Siempre aplica","action":"Verificar que el footer y los enlaces institucionales del mercado secundario están correctamente configurados.","expected":"Los enlaces de términos y condiciones, política de privacidad, y soporte redirigen a las páginas correctas del partner o de menta según corresponda.","sanity":null,"action_es":"Verificar que el footer y los enlaces institucionales del mercado secundario están correctamente configurados.","action_en":"Verify that the footer and institutional links of the secondary market are correctly configured.","expected_es":"Los enlaces de términos y condiciones, política de privacidad, y soporte redirigen a las páginas correctas del partner o de menta según corresponda.","expected_en":"The terms and conditions, privacy policy, and support links redirect to the correct partner or menta pages as applicable.","sanity_es":null,"sanity_en":null,"section_es":"Accesos y Redirecciones","section_en":"Access & Redirects"},{"id":"ACC-06","section":"Accesos/Redirecciones","trigger":"Siempre aplica","action":"Un usuario intenta acceder al marketplace de un evento cuyo mercado secundario está cerrado.","expected":"Se muestra un mensaje claro indicando que el mercado secundario no está disponible para este evento. No se muestra un error genérico.","sanity":null,"action_es":"Un usuario intenta acceder al marketplace de un evento cuyo mercado secundario está cerrado.","action_en":"A user attempts to access the marketplace of an event whose secondary market is closed.","expected_es":"Se muestra un mensaje claro indicando que el mercado secundario no está disponible para este evento. No se muestra un error genérico.","expected_en":"A clear message is displayed indicating the secondary market is not available for this event. No generic error is shown.","sanity_es":null,"sanity_en":null,"section_es":"Accesos y Redirecciones","section_en":"Access & Redirects"},{"id":"RPT-01","section":"Reporting","trigger":"Acceptance criteria includes invoice emission","action":"A resale transaction completes. Verify that the partner receives the necessary data to emit invoices for the secondary market service charges.","expected":"The partner receives transaction details including: service charge amounts, tax breakdown, buyer and seller identifiers, transaction date, and any other fields required by their invoicing system.","sanity":"• Verify the data format matches what the partner's invoicing system expects.\n• Check that tax amounts are separated from the service charge base amount.\n• Confirm the data is available via API or webhook — not only in the dashboard.","action_es":"Una transacción de reventa se completa. Verificar que el partner recibe los datos necesarios para emitir facturas de los cargos por servicio del mercado secundario.","action_en":"A resale transaction completes. Verify that the partner receives the necessary data to emit invoices for the secondary market service charges.","expected_es":"El partner recibe los detalles de la transacción incluyendo: montos de cargos por servicio, desglose de impuestos, identificadores de comprador y vendedor, fecha de transacción, y cualquier otro campo requerido por su sistema de facturación.","expected_en":"The partner receives transaction details including: service charge amounts, tax breakdown, buyer and seller identifiers, transaction date, and any other fields required by their invoicing system.","sanity_es":"• Verificar que el formato de datos coincida con lo que espera el sistema de facturación del partner.\n• Comprobar que los montos de impuestos están separados del monto base del cargo por servicio.\n• Confirmar que los datos están disponibles vía API o webhook — no solo en el dashboard.","sanity_en":"• Verify the data format matches what the partner's invoicing system expects.\n• Check that tax amounts are separated from the service charge base amount.\n• Confirm the data is available via API or webhook — not only in the dashboard.","section_es":"Reportes","section_en":"Reporting"},{"id":"RPT-02","section":"Reporting","trigger":"Always applies","action":"A resale transaction completes. Verify that the transaction is recorded as a resale (not a primary sale) in the partner's backoffice/reporting system.","expected":"The transaction appears in the partner's reporting with a clear resale indicator. It is distinguishable from primary sales in reports, dashboards, and exports.","sanity":"• Verify the resale label persists in historical reports, not just real-time views.\n• Check that resale transactions don't inflate primary sales metrics.","action_es":"Una transacción de reventa se completa. Verificar que la transacción se registra como reventa (no como venta primaria) en el backoffice/sistema de reportes del partner.","action_en":"A resale transaction completes. Verify that the transaction is recorded as a resale (not a primary sale) in the partner's backoffice/reporting system.","expected_es":"La transacción aparece en los reportes del partner con un indicador claro de reventa. Es distinguible de las ventas primarias en reportes, dashboards y exportaciones.","expected_en":"The transaction appears in the partner's reporting with a clear resale indicator. It is distinguishable from primary sales in reports, dashboards, and exports.","sanity_es":"• Verificar que la etiqueta de reventa persiste en reportes históricos, no solo en vistas en tiempo real.\n• Comprobar que las transacciones de reventa no inflan las métricas de ventas primarias.","sanity_en":"• Verify the resale label persists in historical reports, not just real-time views.\n• Check that resale transactions don't inflate primary sales metrics.","section_es":"Reportes","section_en":"Reporting"},{"id":"RPT-03","section":"Reporting","trigger":"Always applies","action":"A resale transaction completes. Verify that the sale price and commission amounts are correctly recorded in the partner's reporting.","expected":"The report shows: resale price paid by the buyer, seller payout amount, menta commission, partner commission (if applicable), and buyer service fee — all matching the actual transaction.","sanity":"• Verify amounts match the transaction confirmation email sent to the buyer.\n• Check that currency is consistent across all reporting fields.","action_es":"Una transacción de reventa se completa. Verificar que el precio de venta y los montos de comisiones se registran correctamente en los reportes del partner.","action_en":"A resale transaction completes. Verify that the sale price and commission amounts are correctly recorded in the partner's reporting.","expected_es":"El reporte muestra: precio de reventa pagado por el comprador, monto del payout al vendedor, comisión de menta, comisión del partner (si aplica), y cargo por servicio al comprador — todos coincidiendo con la transacción real.","expected_en":"The report shows: resale price paid by the buyer, seller payout amount, menta commission, partner commission (if applicable), and buyer service fee — all matching the actual transaction.","sanity_es":"• Verificar que los montos coinciden con el email de confirmación de la transacción enviado al comprador.\n• Comprobar que la moneda es consistente en todos los campos de reporte.","sanity_en":"• Verify amounts match the transaction confirmation email sent to the buyer.\n• Check that currency is consistent across all reporting fields.","section_es":"Reportes","section_en":"Reporting"},{"id":"RPT-04","section":"Reporting","trigger":"Always applies","action":"A resale transaction completes. Verify that tax amounts are correctly recorded and separated from the base amounts in reporting.","expected":"Tax amounts are visible as a separate line item in reporting. The tax calculation matches the expected rate for the event's jurisdiction.","sanity":"• For US events: verify sales tax varies by state/ZIP as expected.\n• Verify tax is applied to the correct base (service fee, not ticket face value).","action_es":"Una transacción de reventa se completa. Verificar que los montos de impuestos se registran correctamente y se separan de los montos base en los reportes.","action_en":"A resale transaction completes. Verify that tax amounts are correctly recorded and separated from the base amounts in reporting.","expected_es":"Los montos de impuestos son visibles como partida separada en los reportes. El cálculo de impuestos coincide con la tasa esperada para la jurisdicción del evento.","expected_en":"Tax amounts are visible as a separate line item in reporting. The tax calculation matches the expected rate for the event's jurisdiction.","sanity_es":"• Para eventos en US: verificar que el sales tax varía por estado/ZIP según lo esperado.\n• Verificar que el impuesto se aplica sobre la base correcta (cargo por servicio, no face value del ticket).","sanity_en":"• For US events: verify sales tax varies by state/ZIP as expected.\n• Verify tax is applied to the correct base (service fee, not ticket face value).","section_es":"Reportes","section_en":"Reporting"},{"id":"RPT-05","section":"Reporting","trigger":"Always applies","action":"A resale transaction completes. Verify traceability: the partner can identify who sold the ticket and who bought it.","expected":"The partner's reporting shows the full chain: original buyer (seller) → resale buyer, with identifiers (email, name, or user ID) for both parties.","sanity":"• Verify traceability works for tickets that were transferred before being resold (original buyer → transfer recipient → resale buyer).\n• Check that the seller's original order is preserved and linked to the resale transaction.","action_es":"Una transacción de reventa se completa. Verificar la trazabilidad: el partner puede identificar quién vendió el ticket y quién lo compró.","action_en":"A resale transaction completes. Verify traceability: the partner can identify who sold the ticket and who bought it.","expected_es":"Los reportes del partner muestran la cadena completa: comprador original (vendedor) → comprador de reventa, con identificadores (email, nombre o ID de usuario) para ambas partes.","expected_en":"The partner's reporting shows the full chain: original buyer (seller) → resale buyer, with identifiers (email, name, or user ID) for both parties.","sanity_es":"• Verificar que la trazabilidad funciona para tickets que fueron transferidos antes de ser revendidos (comprador original → receptor de transferencia → comprador de reventa).\n• Comprobar que la orden original del vendedor se preserva y está vinculada a la transacción de reventa.","sanity_en":"• Verify traceability works for tickets that were transferred before being resold (original buyer → transfer recipient → resale buyer).\n• Check that the seller's original order is preserved and linked to the resale transaction.","section_es":"Reportes","section_en":"Reporting"},{"id":"RPT-06","section":"Reporting","section_es":"Reporting","section_en":"Reporting","trigger":"Always applies","action":"A resale transaction completes. Verify the seller payout lifecycle from sale to fund release.","action_en":"A resale transaction completes. Verify the seller payout lifecycle from sale to fund release.","action_es":"Se completa una transacción de reventa. Verificar el ciclo de vida del pago al vendedor desde la venta hasta la liberación de fondos.","expected":"The payout status progresses correctly: pending → scheduled → paid. The payout timing matches the configured schedule (typically 72 business hours after the event). The seller can see the payout status in their listing details.","expected_en":"The payout status progresses correctly: pending → scheduled → paid. The payout timing matches the configured schedule (typically 72 business hours after the event). The seller can see the payout status in their listing details.","expected_es":"El estado del pago progresa correctamente: pendiente → programado → pagado. El timing del pago coincide con el cronograma configurado (típicamente 72 horas hábiles después del evento). El vendedor puede ver el estado del pago en los detalles de su listado.","sanity":"• Verify payout account must be configured before funds can be released.\n• Verify what happens if the event is cancelled before payout is released.","sanity_en":"• Verify payout account must be configured before funds can be released.\n• Verify what happens if the event is cancelled before payout is released.","sanity_es":"• Verificar que la cuenta de pago debe estar configurada antes de liberar fondos.\n• Verificar qué sucede si el evento se cancela antes de liberar el pago."},{"id":"MKT-01","section":"Market Data","trigger":"Market Making — Inventory = API menta (Live)","action":"Create a show with defined capacity per sector/category. Send the capacity data to menta via the inventory endpoint.","expected":"menta receives and stores the show capacity (total and per sector/category). Capacity data is reflected in the dashboard and used for sold-out calculations and marketplace signals.","sanity":"• Verify capacity is sent per ticketOption, not just as a single total number.\n• If the show has reserved/held seats (e.g., production holds), verify these are excluded from the released capacity.\n• Check that a show with 0 remaining capacity triggers the sold-out behavior in the marketplace.","action_es":"Crear un show con capacidad definida por sector/categoría. Enviar los datos de capacidad a menta vía el endpoint de inventario.","action_en":"Create a show with defined capacity per sector/category. Send the capacity data to menta via the inventory endpoint.","expected_es":"menta recibe y almacena la capacidad del show (total y por sector/categoría). Los datos de capacidad se reflejan en el dashboard y se utilizan para cálculos de sold-out y señales del marketplace.","expected_en":"menta receives and stores the show capacity (total and per sector/category). Capacity data is reflected in the dashboard and used for sold-out calculations and marketplace signals.","sanity_es":"• Verificar que la capacidad se envía por ticketOption, no solo como un número total.\n• Si el show tiene asientos reservados/retenidos (ej: retenciones de producción), verificar que se excluyen de la capacidad disponible.\n• Comprobar que un show con 0 capacidad restante activa el comportamiento de sold-out en el marketplace.","sanity_en":"• Verify capacity is sent per ticketOption, not just as a single total number.\n• If the show has reserved/held seats (e.g., production holds), verify these are excluded from the released capacity.\n• Check that a show with 0 remaining capacity triggers the sold-out behavior in the marketplace.","section_es":"Datos de Mercado","section_en":"Market Data"},{"id":"QR-13","section":"QR & Protection","trigger":"Validación de check-in=Real-time (online)","priority":"CRITICAL","action":"Scan a ticket at the venue (mark as checked-in). Call GetUserData() for that user.","expected":"The checked-in ticket does not appear in the GetUserData() response. If the user had accessed the sell flow before check-in, menta's cleansing detects the ticket is gone and delists it.","sanity":"• The endpoint must reflect check-in status immediately — not on a delay.\n• Verify that a subsequent SAL sell call for this user also reflects the absence."},{"id":"QR-14","section":"QR & Protection","trigger":"Validación de check-in=Real-time (online)","priority":"CRITICAL","action":"List a ticket for resale. Then scan that ticket at the venue (check-in). Wait for menta's periodic cleansing cycle to run.","expected":"menta's cleansing call to GetUserData() detects the ticket is no longer in the response. The listing is automatically removed from the marketplace.","sanity":"• Verify the cleansing interval is short enough that the listing doesn't stay up for an unreasonable time after check-in.\n• Confirm the ticket disappears from buyer search results after cleansing runs."},{"id":"QR-15","section":"QR & Protection","trigger":"Validación de check-in=Real-time (online)","priority":"CRITICAL","action":"List a ticket for resale. A buyer adds it to cart (reservation starts, ~15 min). Scan the ticket at the venue between cart creation and payment. Observe menta's gate request behavior during the checkout reservation.","expected":"menta calls GetUserData() every ~1 minute during the cart reservation. When the checked-in ticket disappears from the response, menta blocks the purchase before sending the CTO webhook. The buyer is refunded.","sanity":"• This tests the high-frequency gate request pattern during checkout.\n• Also verify the final pre-CTO verification call: even if all 1-minute checks passed, the last check right before ticket.updated must also pass.\n• As a safety net, if the CTO webhook is sent despite the above, Cooltix must still reject the CTO for a checked-in ticket."},{"id":"QR-16","section":"QR & Protection","trigger":"Validación de check-in=Offline (batch sync)","priority":"CRITICAL","action":"Configure an event that uses offline check-in devices. Trigger the offline sync process. Verify that all active listings are delisted before the ticket holder database is downloaded.","expected":"All listings are delisted. No new listings can be created after the sync trigger. The market is effectively closed.","sanity":"• Verify the close happens before (not during or after) the sync download.\n• Confirm primary sales are also stopped at the same time."},{"id":"TKT-08","section":"Ticket Data","trigger":"Gestión de Cuotas=Gestiona el Sistema","p
